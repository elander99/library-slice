<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tile Labeler</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #141210; color: #e8e0d0;
  font-family: 'DM Mono', monospace, sans-serif;
  font-size: 13px; height: 100vh;
  display: flex; flex-direction: column; overflow: hidden;
}
#topbar {
  background: #1e1a14; border-bottom: 1px solid #333;
  padding: 8px 14px; display: flex; align-items: center;
  gap: 16px; flex-shrink: 0;
}
#topbar h1 { font-size: 13px; color: #b8860b; }
#topbar label { color: #888; }
#topbar input[type=text], #topbar input[type=number] {
  background: #0d0b08; border: 1px solid #444; color: #e8e0d0;
  padding: 3px 7px; font-family: inherit; font-size: 12px;
}
#topbar input[type=text]   { width: 110px; }
#topbar input[type=number] { width: 52px; }
#topbar input[type=file]   { color: #aaa; font-size: 12px; }
.sep { width: 1px; background: #333; align-self: stretch; }
#main { display: flex; flex: 1; overflow: hidden; }
#canvas-wrap {
  flex: 1; overflow: auto; background: #0a0806;
  position: relative; cursor: crosshair;
}
canvas { display: block; image-rendering: pixelated; }
#sidebar {
  width: 300px; flex-shrink: 0; background: #1a1612;
  border-left: 1px solid #2a2418;
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar h2 {
  font-size: 11px; color: #888; text-transform: uppercase;
  letter-spacing: 0.08em; padding: 10px 14px 6px;
  border-bottom: 1px solid #2a2418;
}
#labels { padding: 10px 14px; border-bottom: 1px solid #2a2418; }
#label-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.label-btn {
  padding: 4px 10px; border: 2px solid currentColor;
  background: transparent; font-family: inherit; font-size: 12px;
  cursor: pointer; opacity: 0.45; transition: opacity 0.1s;
}
.label-btn.active { opacity: 1; }
.label-btn:hover  { opacity: 0.75; }
#custom-row { display: flex; gap: 6px; align-items: center; }
#custom-row input {
  background: #0d0b08; border: 1px solid #444; color: #e8e0d0;
  padding: 3px 7px; font-family: inherit; font-size: 12px; width: 100px;
}
#actions {
  padding: 8px 14px; border-bottom: 1px solid #2a2418;
  display: flex; gap: 6px; flex-wrap: wrap;
}
.btn {
  padding: 4px 10px; background: #2a2418; border: 1px solid #444;
  color: #e8e0d0; font-family: inherit; font-size: 12px; cursor: pointer;
}
.btn:hover   { background: #3a3020; }
.btn.primary { border-color: #b8860b; color: #b8860b; }
.btn.primary:hover { background: rgba(184,134,11,0.15); }
#output-section {
  flex: 1; display: flex; flex-direction: column;
  padding: 10px 14px; gap: 6px; overflow: hidden; min-height: 0;
}
#output-section label { color: #888; font-size: 11px; text-transform: uppercase; }
#output {
  flex: 1; background: #0d0b08; border: 1px solid #2a2418;
  padding: 8px; overflow: auto; white-space: pre;
  font-size: 11px; line-height: 1.6; color: #c8c0b0; min-height: 0;
}
#status {
  background: #1e1a14; border: 1px solid #2a2418;
  padding: 4px 8px; font-size: 11px; color: #b8860b;
  min-height: 20px; flex-shrink: 0;
}
#coords {
  position: fixed; bottom: 8px; left: 8px;
  background: rgba(0,0,0,0.7); padding: 3px 8px;
  border-radius: 3px; color: #b8860b; font-size: 12px;
  pointer-events: none;
}

/* ── 9-patch mode ─── */
#mode-toggle { display:flex; border-bottom:1px solid #2a2418; flex-shrink:0; }
.mode-btn { flex:1; padding:7px 4px; background:#1a1612; border:none; border-bottom:3px solid transparent;
  color:#888; font-family:inherit; font-size:12px; cursor:pointer; letter-spacing:0.04em; }
.mode-btn:hover { color:#c8b880; }
.mode-btn.active { color:#b8860b; border-bottom-color:#b8860b; background:#1e1a14; }
#section-variants, #section-ninepatch { display:flex; flex-direction:column; flex:1; overflow:hidden; min-height:0; }
#section-ninepatch { padding:10px 14px; gap:8px; }
#np-header { display:flex; align-items:center; gap:8px; flex-shrink:0; }
#np-header label { color:#888; font-size:11px; text-transform:uppercase; }
#np-header input { background:#0d0b08; border:1px solid #444; color:#e8e0d0; padding:3px 7px;
  font-family:inherit; font-size:12px; width:120px; }
#np-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; flex-shrink:0; }
.np-slot { padding:10px 4px; background:#0d0b08; border:2px solid #333; color:#888;
  font-family:inherit; font-size:11px; cursor:pointer; text-align:center; line-height:1.4; border-radius:3px; }
.np-slot:hover { border-color:#666; color:#c8b880; }
.np-slot.active { border-color:#b8860b; color:#b8860b; background:#1e1a10; }
.np-slot.assigned { background:#0d1408; }
.np-slot .coords { font-size:10px; color:#6a8; display:block; margin-top:2px; }
.np-slot .flips  { display:none; gap:2px; margin-top:3px; justify-content:center; }
.np-slot.assigned .flips { display:flex; }
.flip-btn { font-size:10px; padding:1px 4px; background:#1a1612; border:1px solid #444;
  color:#888; cursor:pointer; border-radius:2px; line-height:1.4; }
.flip-btn:hover { border-color:#888; color:#c8b880; }
.flip-btn.on { border-color:#6a8; color:#6a8; background:#0d1408; }
#np-output-section { flex:1; display:flex; flex-direction:column; gap:6px; overflow:hidden; min-height:0; }
#np-output-section label { color:#888; font-size:11px; text-transform:uppercase; flex-shrink:0; }
#np-output { flex:1; background:#0d0b08; border:1px solid #2a2418; padding:8px; overflow:auto;
  white-space:pre; font-size:11px; line-height:1.7; color:#c8c0b0; min-height:0; }
#np-actions { display:flex; gap:6px; flex-shrink:0; }
</style>
</head>
<body>

<div id="topbar">
  <h1>Tile Labeler</h1>
  <div class="sep"></div>
  <label>Sheet</label>
  <input type="text" id="sheet-name" value="terrain">
  <label>Tile px</label>
  <input type="number" id="tile-size" value="16" min="8" max="128">
  <label>Zoom</label>
  <input type="number" id="zoom" value="3" min="1" max="8">
  <div class="sep"></div>
  <label>Load image</label>
  <input type="file" id="file-input" accept="image/*">
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="sidebar">
    <div id="mode-toggle">
      <button class="mode-btn active" id="mode-btn-variants" onclick="setMode('variants')">Floor Variants</button>
      <button class="mode-btn"        id="mode-btn-ninepatch" onclick="setMode('ninepatch')">9-Patch</button>
    </div>

    <!-- ── Floor-variants mode ── -->
    <div id="section-variants">
      <div id="labels">
        <div id="label-btns"></div>
        <div id="custom-row">
          <input type="text" id="custom-label" placeholder="new label…">
          <button class="btn" onclick="addCustomLabel()">Add</button>
        </div>
      </div>
      <div id="actions">
        <button class="btn" onclick="clearCurrent()">Clear label</button>
        <button class="btn" onclick="clearAll()">Clear all</button>
        <button class="btn primary" onclick="copyOutput()">Copy</button>
        <button class="btn" onclick="saveJSON()">Save JSON</button>
        <label class="btn" style="cursor:pointer">
          Load JSON
          <input type="file" id="load-input" accept=".json" style="display:none" onchange="loadJSON(this)">
        </label>
        <button class="btn primary" style="display:none" onclick="pickOutputFile()" title="Pick engine/tiles-labeler.js">Set output file</button>
      </div>
      <div id="output-section">
        <label>Generated code</label>
        <div id="output">(paint some tiles)</div>
        <div id="status">Ready — load an image above or use the embedded terrain sheet</div>
      </div>
    </div>

    <!-- ── 9-patch mode ── -->
    <div id="section-ninepatch" style="display:none">
      <div id="np-header">
        <label>Group name</label>
        <input type="text" id="np-name" value="sand_path" oninput="updateNpOutput()">
      </div>
      <div id="np-grid">
        <button class="np-slot active" data-slot="TL" onclick="selectNpSlot('TL')">TL<span class="coords" id="np-TL">—</span><span class="flips"><span class="flip-btn" id="fx-TL" onclick="toggleFlip(event,'TL','x')">↔</span><span class="flip-btn" id="fy-TL" onclick="toggleFlip(event,'TL','y')">↕</span></span></button>
        <button class="np-slot"        data-slot="TC" onclick="selectNpSlot('TC')">TC<span class="coords" id="np-TC">—</span><span class="flips"><span class="flip-btn" id="fx-TC" onclick="toggleFlip(event,'TC','x')">↔</span><span class="flip-btn" id="fy-TC" onclick="toggleFlip(event,'TC','y')">↕</span></span></button>
        <button class="np-slot"        data-slot="TR" onclick="selectNpSlot('TR')">TR<span class="coords" id="np-TR">—</span><span class="flips"><span class="flip-btn" id="fx-TR" onclick="toggleFlip(event,'TR','x')">↔</span><span class="flip-btn" id="fy-TR" onclick="toggleFlip(event,'TR','y')">↕</span></span></button>
        <button class="np-slot"        data-slot="ML" onclick="selectNpSlot('ML')">ML<span class="coords" id="np-ML">—</span><span class="flips"><span class="flip-btn" id="fx-ML" onclick="toggleFlip(event,'ML','x')">↔</span><span class="flip-btn" id="fy-ML" onclick="toggleFlip(event,'ML','y')">↕</span></span></button>
        <button class="np-slot"        data-slot="MC" onclick="selectNpSlot('MC')">MC<span class="coords" id="np-MC">—</span><span class="flips"><span class="flip-btn" id="fx-MC" onclick="toggleFlip(event,'MC','x')">↔</span><span class="flip-btn" id="fy-MC" onclick="toggleFlip(event,'MC','y')">↕</span></span></button>
        <button class="np-slot"        data-slot="MR" onclick="selectNpSlot('MR')">MR<span class="coords" id="np-MR">—</span><span class="flips"><span class="flip-btn" id="fx-MR" onclick="toggleFlip(event,'MR','x')">↔</span><span class="flip-btn" id="fy-MR" onclick="toggleFlip(event,'MR','y')">↕</span></span></button>
        <button class="np-slot"        data-slot="BL" onclick="selectNpSlot('BL')">BL<span class="coords" id="np-BL">—</span><span class="flips"><span class="flip-btn" id="fx-BL" onclick="toggleFlip(event,'BL','x')">↔</span><span class="flip-btn" id="fy-BL" onclick="toggleFlip(event,'BL','y')">↕</span></span></button>
        <button class="np-slot"        data-slot="BC" onclick="selectNpSlot('BC')">BC<span class="coords" id="np-BC">—</span><span class="flips"><span class="flip-btn" id="fx-BC" onclick="toggleFlip(event,'BC','x')">↔</span><span class="flip-btn" id="fy-BC" onclick="toggleFlip(event,'BC','y')">↕</span></span></button>
        <button class="np-slot"        data-slot="BR" onclick="selectNpSlot('BR')">BR<span class="coords" id="np-BR">—</span><span class="flips"><span class="flip-btn" id="fx-BR" onclick="toggleFlip(event,'BR','x')">↔</span><span class="flip-btn" id="fy-BR" onclick="toggleFlip(event,'BR','y')">↕</span></span></button>
      </div>
      <div id="np-actions">
        <button class="btn" onclick="clearNpSlot()">Clear slot</button>
        <button class="btn" onclick="clearAllNp()">Clear all</button>
        <button class="btn primary" onclick="copyNpOutput()">Copy</button>
      </div>
      <div id="np-output-section">
        <label>Generated code</label>
        <div id="np-output">(click a slot, then click a tile)</div>
      </div>
    </div>
  </div>
</div>

<div id="coords"></div>


<script>
// ── State ────────────────────────────────────────────────────────────────────
let img      = null;
let tileSize = 16;
let zoom     = 3;
let cols     = 0;
let rows     = 0;
let painting = false;
let erasing  = false;
let currentLabel = 'GRASS';

const selections = {};  // label -> Set<"col,row">

// ── DOM refs ─────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const coordsEl = document.getElementById('coords');
const outputEl = document.getElementById('output');
ctx.imageSmoothingEnabled = false;

function setStatus(msg) { statusEl.textContent = msg; }

// ── Labels ───────────────────────────────────────────────────────────────────
const BUILTIN = [
  { name:'GRASS', color:'#4a8' }, { name:'SAND',  color:'#b87' },
  { name:'STONE', color:'#888' }, { name:'WOOD',  color:'#a64' },
];

function addLabel(name, color) {
  if (selections[name]) return;
  selections[name] = new Set();
  const btn = document.createElement('button');
  btn.className = 'label-btn' + (name === currentLabel ? ' active' : '');
  btn.style.color = color || '#aaa';
  btn.textContent = name;
  btn.dataset.name = name;
  btn.addEventListener('click', () => selectLabel(name));
  document.getElementById('label-btns').appendChild(btn);
}

function selectLabel(name) {
  currentLabel = name;
  document.querySelectorAll('.label-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.name === name));
}

function addCustomLabel() {
  const inp = document.getElementById('custom-label');
  const name = inp.value.trim().toUpperCase().replace(/\W/g,'_');
  if (!name) return;
  addLabel(name, '#a8c0d0');
  selectLabel(name);
  inp.value = '';
}

BUILTIN.forEach(l => addLabel(l.name, l.color));

// ── Image loading ─────────────────────────────────────────────────────────────
function applyImage(image) {
  img      = image;
  tileSize = parseInt(document.getElementById('tile-size').value) || 16;
  zoom     = parseInt(document.getElementById('zoom').value)      || 3;
  const w  = image.naturalWidth  || image.width;
  const h  = image.naturalHeight || image.height;
  cols = Math.floor(w / tileSize);
  rows = Math.floor(h / tileSize);
  canvas.width  = w * zoom;
  canvas.height = h * zoom;
  redraw();
  setStatus(`Loaded ${w}×${h}px → ${cols}×${rows} tiles @ ${tileSize}px`);
}

// File picker
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('sheet-name').value =
    file.name.replace(/\.[^.]+$/, '').replace('tileset_', '');
  const image = new Image();
  image.onload = () => applyImage(image);
  image.src    = URL.createObjectURL(file);
});

// Re-render on tile-size / zoom change
['tile-size','zoom'].forEach(id =>
  document.getElementById(id).addEventListener('change', () => {
    if (img) applyImage(img);
  })
);

// ── Drawing ──────────────────────────────────────────────────────────────────
const OVERLAY = {
  GRASS:'rgba(60,200,80,0.45)', SAND:'rgba(220,180,60,0.45)',
  STONE:'rgba(180,180,180,0.45)', WOOD:'rgba(180,100,40,0.45)',
};
function overlayColor(name) { return OVERLAY[name] || 'rgba(120,180,240,0.45)'; }

function redraw() {
  if (!img) return;
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  for (const [label, tiles] of Object.entries(selections)) {
    ctx.fillStyle = overlayColor(label);
    for (const key of tiles) {
      const [c, r] = key.split(',').map(Number);
      ctx.fillRect(c*tileSize*zoom, r*tileSize*zoom, tileSize*zoom, tileSize*zoom);
    }
  }

  // 9-patch overlays
  if (mode === 'ninepatch') {
    const ts = tileSize * zoom;
    for (const [slot, pos] of Object.entries(npAssigned)) {
      const f = npFlip[slot] || {};
      const x = pos.c * ts, y = pos.r * ts;
      ctx.fillStyle = NP_COLORS[slot] || 'rgba(120,180,240,0.5)';
      ctx.fillRect(x, y, ts, ts);
      // flip indicator arrows
      if (f.x || f.y) {
        ctx.font = `bold ${Math.max(8, Math.floor(ts*0.28))}px monospace`;
        ctx.fillStyle = '#6a8';
        ctx.fillText((f.x ? '↔' : '') + (f.y ? '↕' : ''), x + 2, y + ts - 3);
      }
      // slot label
      const fs = Math.max(8, Math.floor(ts * 0.32));
      ctx.font = `bold ${fs}px monospace`;
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillText(slot, x + 2, y + fs + 1);
      ctx.fillStyle = 'white';
      ctx.fillText(slot, x + 2, y + fs);
    }
    // white outline on active slot
    if (npAssigned[npSlot]) {
      const p = npAssigned[npSlot];
      ctx.strokeStyle = 'white'; ctx.lineWidth = 2;
      ctx.strokeRect(p.c*ts+1, p.r*ts+1, ts-2, ts-2);
    }
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath();
    ctx.moveTo(c*tileSize*zoom + 0.5, 0);
    ctx.lineTo(c*tileSize*zoom + 0.5, canvas.height);
    ctx.stroke();
  }
  for (let r = 0; r <= rows; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r*tileSize*zoom + 0.5);
    ctx.lineTo(canvas.width, r*tileSize*zoom + 0.5);
    ctx.stroke();
  }
}

// ── Interaction ───────────────────────────────────────────────────────────────
function tileAt(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const c = Math.floor((clientX - rect.left) / (tileSize * zoom));
  const r = Math.floor((clientY - rect.top)  / (tileSize * zoom));
  if (c < 0 || r < 0 || c >= cols || r >= rows) return null;
  return { c, r, key: `${c},${r}` };
}

function paint(clientX, clientY) {
  const t = tileAt(clientX, clientY);
  if (!t) return;
  if (mode === 'ninepatch') {
    if (!erasing) {
      npAssigned[npSlot] = { c: t.c, r: t.r };
      document.getElementById('np-'+npSlot).textContent = `${t.c},${t.r}`;
      document.querySelector(`.np-slot[data-slot="${npSlot}"]`).classList.add('assigned');
      updateNpOutput();
      advanceNpSlot();
    }
    redraw();
    return;
  }
  for (const s of Object.values(selections)) s.delete(t.key);
  if (!erasing) selections[currentLabel].add(t.key);
  redraw();
  updateOutput();
  scheduleSave();
}

canvas.addEventListener('mousedown', e => {
  e.preventDefault();
  painting = true;
  erasing  = e.button === 2;
  paint(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', e => {
  const t = tileAt(e.clientX, e.clientY);
  coordsEl.textContent = t ? `col ${t.c}, row ${t.r}` : '';
  if (painting) paint(e.clientX, e.clientY);
});
window.addEventListener('mouseup',     () => { painting = false; });
canvas.addEventListener('mouseleave',  () => { painting = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ── Actions ───────────────────────────────────────────────────────────────────
function clearCurrent() { selections[currentLabel]?.clear(); redraw(); updateOutput(); scheduleSave(); }
function clearAll()     { Object.values(selections).forEach(s => s.clear()); redraw(); updateOutput(); scheduleSave(); }

// ── Output ────────────────────────────────────────────────────────────────────
const HEX = { GRASS:'#536c2a', SAND:'#cec284', STONE:'#737373', WOOD:'#66381a' };

function sampleColor(c, r) {
  try {
    const x = c*tileSize*zoom, y = r*tileSize*zoom;
    const d = ctx.getImageData(x, y, tileSize*zoom, tileSize*zoom).data;
    let rs=0, gs=0, bs=0, n=0;
    for (let i=0; i<d.length; i+=4) {
      if (d[i+3] < 128) continue;
      rs+=d[i]; gs+=d[i+1]; bs+=d[i+2]; n++;
    }
    if (!n) return '#888';
    const h = v => Math.round(v/n).toString(16).padStart(2,'0');
    return `#${h(rs)}${h(gs)}${h(bs)}`;
  } catch(_) { return '#888'; }
}

function updateOutput() {
  const sheet = document.getElementById('sheet-name').value.trim() || 'terrain';
  const fn    = tileSize === 16 ? 'T16' : 'T';
  const lines = [];

  for (const [label, tiles] of Object.entries(selections)) {
    if (!tiles.size) continue;
    const sorted = [...tiles].map(k => k.split(',').map(Number))
                             .sort((a,b) => a[1]-b[1] || a[0]-b[0]);
    const base = `F_${label}`;
    const keys = sorted.map((_,i) => i===0 ? base : `${base}_${String.fromCharCode(64+i)}`);
    lines.push(`// ${label} (${sorted.length} tiles)`);
    sorted.forEach(([c,r],i) => {
      const col = sampleColor(c, r);
      lines.push(`  ${keys[i].padEnd(12)}: ${fn}('${sheet}', ${c}, ${r}, false, '${col}'),`);
    });
    lines.push(`  ${base}: [${keys.map(k=>`'${k}'`).join(', ')}],`);
    lines.push('');
  }

  outputEl.textContent = lines.join('\n') || '(paint some tiles)';
  const total = Object.values(selections).reduce((n,s) => n+s.size, 0);
  setStatus(total ? `${total} tile${total===1?'':'s'} selected` : 'Ready');
}

function copyOutput() {
  navigator.clipboard.writeText(outputEl.textContent)
    .then(() => { setStatus('Copied!'); setTimeout(updateOutput, 1500); });
}

// ── File output (File System Access API) ─────────────────────────────────────
let fileHandle = null;

async function pickOutputFile() {
  try {
    fileHandle = await window.showSaveFilePicker({
      suggestedName: 'tiles-labeler.js',
      types: [{ description:'JavaScript', accept:{'application/javascript':['.js']} }],
    });
    setStatus('Output file set — painting now auto-saves');
  } catch(_) {}
}

function generateJS() {
  const sheet = document.getElementById('sheet-name').value.trim() || 'terrain';
  const fn    = tileSize === 16 ? 'T16' : 'T';
  const lines = ['// Auto-generated by tile-labeler', '(function() {'];
  for (const [label, tiles] of Object.entries(selections)) {
    if (!tiles.size) continue;
    const sorted = [...tiles].map(k => k.split(',').map(Number))
                             .sort((a,b) => a[1]-b[1] || a[0]-b[0]);
    const base = `F_${label}`;
    const keys = sorted.map((_,i) => i===0 ? base : `${base}_${String.fromCharCode(64+i)}`);
    const color = HEX[label] || '#888888';
    sorted.forEach(([c,r],i) =>
      lines.push(`  TILES['${keys[i]}'] = ${fn}('${sheet}', ${c}, ${r}, false, '${color}');`)
    );
    lines.push(`  FLOOR_VARIANTS['${base}'] = [${keys.map(k=>`'${k}'`).join(', ')}];`);
  }
  lines.push('})();');
  return lines.join('\n') + '\n';
}

let saveTimer = null;

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    const sheet = document.getElementById('sheet-name').value.trim() || 'terrain';
    const sel = {};
    Object.entries(selections).forEach(([k,v]) => { if (v.size) sel[k]=[...v].map(s=>s); });
    try {
      const res = await fetch('/save-labels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sheet, tileSize, selections: sel }),
      });
      if (res.ok) setStatus('Saved to engine/tiles-labeler.js — refresh the game');
      else setStatus('Save failed: HTTP ' + res.status);
    } catch(e) { setStatus('Save failed: ' + e.message); }
  }, 400);
}

function saveJSON() {
  const sheet = document.getElementById('sheet-name').value.trim() || 'terrain';
  const sel = {};
  Object.entries(selections).forEach(([k,v]) => { if (v.size) sel[k]=[...v]; });
  const blob = new Blob([JSON.stringify({sheet,tileSize,selections:sel},null,2)],
                        {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${sheet}-labels.json`;
  a.click();
}

// ── 9-patch mode ─────────────────────────────────────────────────────────────
let mode = 'variants';
const NP_SLOTS   = ['TL','TC','TR','ML','MC','MR','BL','BC','BR'];
const NP_COLORS  = {
  TL:'rgba(255,80,80,0.55)',  TC:'rgba(255,160,40,0.55)',  TR:'rgba(255,220,40,0.55)',
  ML:'rgba(80,200,80,0.55)',  MC:'rgba(80,200,200,0.55)',  MR:'rgba(80,120,255,0.55)',
  BL:'rgba(200,80,200,0.55)', BC:'rgba(160,80,255,0.55)',  BR:'rgba(255,80,160,0.55)',
};
let npSlot = 'TL';
const npAssigned = {};  // slot -> {c, r}
const npFlip     = {};  // slot -> {x: bool, y: bool}

function setMode(m) {
  mode = m;
  document.getElementById('section-variants').style.display  = m==='variants'  ? 'flex' : 'none';
  document.getElementById('section-ninepatch').style.display = m==='ninepatch' ? 'flex' : 'none';
  document.getElementById('mode-btn-variants').classList.toggle('active',  m==='variants');
  document.getElementById('mode-btn-ninepatch').classList.toggle('active', m==='ninepatch');
  redraw();
}

function selectNpSlot(slot) {
  npSlot = slot;
  document.querySelectorAll('.np-slot').forEach(b =>
    b.classList.toggle('active', b.dataset.slot === slot));
}

function toggleFlip(evt, slot, axis) {
  evt.stopPropagation();  // don't fire selectNpSlot
  if (!npAssigned[slot]) return;
  npFlip[slot] = npFlip[slot] || { x:false, y:false };
  npFlip[slot][axis] = !npFlip[slot][axis];
  document.getElementById(`f${axis}-${slot}`).classList.toggle('on', npFlip[slot][axis]);
  redraw(); updateNpOutput();
}

function clearNpSlot() {
  delete npAssigned[npSlot];
  delete npFlip[npSlot];
  document.getElementById('np-'+npSlot).textContent = '—';
  document.querySelector(`.np-slot[data-slot="${npSlot}"]`).classList.remove('assigned');
  document.getElementById(`fx-${npSlot}`).classList.remove('on');
  document.getElementById(`fy-${npSlot}`).classList.remove('on');
  redraw(); updateNpOutput();
}

function clearAllNp() {
  NP_SLOTS.forEach(s => {
    delete npAssigned[s]; delete npFlip[s];
    document.getElementById('np-'+s).textContent = '—';
    document.querySelector(`.np-slot[data-slot="${s}"]`).classList.remove('assigned');
    document.getElementById(`fx-${s}`).classList.remove('on');
    document.getElementById(`fy-${s}`).classList.remove('on');
  });
  redraw(); updateNpOutput();
}

// Advance to next unassigned slot after a pick
function advanceNpSlot() {
  const idx = NP_SLOTS.indexOf(npSlot);
  for (let i = 1; i <= NP_SLOTS.length; i++) {
    const next = NP_SLOTS[(idx + i) % NP_SLOTS.length];
    if (!npAssigned[next]) { selectNpSlot(next); return; }
  }
}

function updateNpOutput() {
  const name  = (document.getElementById('np-name')?.value || '').trim() || 'sand_path';
  const sheet = (document.getElementById('sheet-name')?.value || '').trim() || 'terrain';
  const fn    = tileSize === 16 ? 'T16' : 'T';
  const rows  = [['TL','TC','TR'],['ML','MC','MR'],['BL','BC','BR']];
  const lines = [`  // ${name}`, `  ${name}: {`];
  for (const row of rows) {
    const parts = row.map(s => {
      const p = npAssigned[s];
      if (!p) return `${s}: null /* pick ${s} */`;
      const f = npFlip[s] || {};
      const base = `${fn}('${sheet}', ${p.c}, ${p.r})`;
      const flags = [f.x && 'flipX:true', f.y && 'flipY:true'].filter(Boolean);
      const val = flags.length ? `{...${base}, ${flags.join(', ')}}` : base;
      return `${s}: ${val}`;
    });
    lines.push('    ' + parts.join(', ') + ',');
  }
  lines.push('  },');
  const el = document.getElementById('np-output');
  if (el) el.textContent = lines.join('\n');
}

function copyNpOutput() {
  const el = document.getElementById('np-output');
  if (el) navigator.clipboard.writeText(el.textContent).then(() => {
    setStatus('Copied 9-patch entry!');
    setTimeout(() => setStatus('Ready'), 1500);
  });
}

function loadJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      Object.values(selections).forEach(s => s.clear());
      if (data.sheet) document.getElementById('sheet-name').value = data.sheet;
      for (const [label, keys] of Object.entries(data.selections || {})) {
        if (!selections[label]) addLabel(label, '#a8c0d0');
        keys.forEach(k => selections[label].add(k));
      }
      redraw(); updateOutput();
      setStatus(`Loaded ${file.name}`);
    } catch(err) { setStatus('Load failed: ' + err.message); }
  };
  reader.readAsText(file);
  input.value = '';
}

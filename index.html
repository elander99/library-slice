      inp.placeholder=field==='meaning'?'english meaning…':'';
      inp.value=""; inp.className=""; fb.textContent=""; fb.style.color="";
      const _res_key_sel=part_idx!=null?`${idx}p${part_idx}`:idx;
      const _saved_hint=_hint_by_key[_res_key_sel];
      if (_saved_hint) _show_hint(_saved_hint.reading, _saved_hint.meaning); else _clear_hint();
      if (!_activate_slot_inplace(idx, part_idx, _active_field)) _render_chips();
      _update_lkp();
      if (inp.parentElement!==panel_el) inp.focus();
      if (cur_sign_id==='__npc__') {
        if (part_idx!=null&&part_idx>=0&&token.parts) {
          const part=token.parts[part_idx];
          if (!part.romaji&&!part.furigana) {
            _npc_lookup(part.text).then(def=>{
              if (def&&cur_word_idx===idx&&cur_part_idx===part_idx&&cur_sign_id==='__npc__') {
                part.romaji=def.reading; part.furigana=def.reading; part.meaning=def.meaning;
              }
            });
          }
        } else if (part_idx==null&&!token.parts&&!token.romaji&&!token.furigana) {
          _npc_lookup(token.text).then(def=>{
            if (def&&cur_word_idx===idx&&cur_sign_id==='__npc__') {
              token.romaji=def.reading; token.furigana=def.reading; token.meaning=def.meaning;
            }
          });
        }
      }
    }

    function open_npc_sentence(jp_text, words, clicked_idx, npc_label, token_defs, en_text) {
      const tokens=words.map((text,i)=>{
        const td=token_defs&&token_defs[i];
        const _reading=LANG.current==='ko' ? romanizeKo(text) : (td?.reading||'').toLowerCase();
        if (td?.meaning) {
          const clean=text.replace(/^[.!?,\s]+|[.!?,\s]+$/g,'');
          if (clean) _npc_defs[clean]={reading:_reading,meaning:td?.meaning||''};
        }
        const tok={text, furigana:_reading, romaji:_reading, meaning:td?.meaning||''};
        if (td?.parts) tok.parts=td.parts;
        return tok;
      });
      _npc_line_id = jp_text || words.join('');
      SIGN_BY_ID['__npc__']={id:'__npc__', label:npc_label||'', japanese:jp_text||words.join(''), tokens, translation:en_text||''};
      open('__npc__');
      const _ct=tokens[clicked_idx];
      if (_ct?.parts?.length) {
        let fi=0,ff='romaji';
        for (let pi=0;pi<_ct.parts.length;pi++){const r=word_results[`${clicked_idx}p${pi}`]||{};if(!r.romaji){fi=pi;ff='romaji';break;}if(!r.meaning){fi=pi;ff='meaning';break;}}
        _select(clicked_idx,fi,ff);
      } else { _select(clicked_idx); }
    }

    function open(sign_id) {
      chips_row.style.display='';
      const sign=SIGN_BY_ID[sign_id]; if (!sign) return;
      cur_sign_id=sign_id; cur_word_idx=null; cur_part_idx=null; _active_field=null; _hint_by_key={};
      const saved=sign_id==='__npc__'?NPC_LINE_PROGRESS.get(_npc_line_id):WORD_PROGRESS.getSign(sign_id); word_results={};
      Object.keys(saved).forEach(k=>{
        if (/^\d+$/.test(k)) word_results[+k]={...saved[k]};
        else word_results[k]={...saved[k]};
      });
      sign.tokens.forEach((tok,i)=>{
        if (_isNumericToken(tok)) { word_results[i]=word_results[i]||{}; word_results[i].meaning=true; }
        if (tok.parts) tok.parts.forEach((part,pi)=>{
          if (_isNumericToken(part)) { const pk=`${i}p${pi}`; word_results[pk]=word_results[pk]||{}; word_results[pk].meaning=true; }
        });
      });
      // Migration: tokens that were saved as atomic before parts were added
      if (sign_id!=='__npc__') sign.tokens.forEach((tok,i)=>{
        if (!tok.parts||!tok.parts.length) return;
        const atomicRes=word_results[i]||{};
        if (!atomicRes.romaji&&!atomicRes.meaning) return;
        tok.parts.forEach((_,pi)=>{
          const pk=`${i}p${pi}`;
          word_results[pk]=word_results[pk]||{};
          if (atomicRes.romaji&&!word_results[pk].romaji) { word_results[pk].romaji=true; WORD_PROGRESS.unlock_part(sign_id,i,pi,'romaji'); }
          if (atomicRes.meaning&&!word_results[pk].meaning) { word_results[pk].meaning=true; WORD_PROGRESS.unlock_part(sign_id,i,pi,'meaning'); }
        });
      });
      if (sign_id==='__npc__') {
        const vocab=NPC_VOCAB.getAll(), sign=SIGN_BY_ID['__npc__'];
        if (sign) sign.tokens.forEach((tok,i)=>{
          if (tok.parts) {
            tok.parts.forEach((part,pi)=>{
              const e=vocab.find(v=>v.text===part.text);
              if (e) {
                if (e.romaji&&e.reading)          { part.romaji=e.reading; part.furigana=e.reading; }
                if (e.meaning_unlocked&&e.meaning) { part.meaning=e.meaning; }
              }
            });
          } else {
            const e=vocab.find(v=>v.text===tok.text);
            if (e) {
              if (e.romaji&&e.reading)          { tok.romaji=e.reading; tok.furigana=e.reading; }
              if (e.meaning_unlocked&&e.meaning) { tok.meaning=e.meaning; }
            }
          }
        });
      }
      lbl_el.textContent=sign.label||'';
      const koMode=LANG.current==='ko';
      speak_all.style.display=koMode?'':'none';
      fb.textContent=""; fb.style.color=""; hint_read.textContent=""; hint_mean.textContent="";
      empty_el.style.display="none";
      if (sign_id!=='__npc__') document.getElementById("ws-dialogue").classList.remove("open");
      panel_el.classList.add("open"); ws_el.classList.add("active");
      ws_el.classList.remove('done');
      const transl_el=document.getElementById("ws-translation");
      transl_el.classList.remove('visible'); transl_el.textContent='';
      if (sign_id!=='__npc__') renderer.sign_panel={sign_id};
      _render_chips(); _update_lkp();
      // Show done state immediately if already completed (saved progress)
      const alreadyDone=sign&&sign.tokens.every((t,i)=>{
        if (t.parts&&t.parts.length) return t.parts.every((_,pi)=>{ const r=word_results[`${i}p${pi}`]||{}; return r.romaji&&r.meaning; });
        const r=word_results[i]||{}; return r.romaji&&r.meaning;
      });
      if (alreadyDone&&sign.translation) {
        ws_el.classList.add('done');
        transl_el.textContent=sign.translation;
        transl_el.classList.add('visible');
      }
    }

    function clear() {
      chips_row.style.display='';
      cur_sign_id=null; cur_word_idx=null; cur_part_idx=null; _active_field=null;
      panel_el.classList.remove("open"); ws_el.classList.remove("active"); ws_el.classList.remove("done");
      empty_el.style.display="";
      renderer.sign_panel=null;
    }

    function _accept(token, matched, res) {
      res[matched]=true;
      if (cur_sign_id!=='__npc__') {
        if (cur_part_idx!=null&&cur_part_idx>=0) {
          WORD_PROGRESS.unlock_part(cur_sign_id,cur_word_idx,cur_part_idx,matched);
        } else if (cur_part_idx===-1) {
          // Whole-word answer: save token-level and propagate to all parts
          WORD_PROGRESS.unlock(cur_sign_id,cur_word_idx,matched);
          const _wsign=SIGN_BY_ID[cur_sign_id], _wtok=_wsign.tokens[cur_word_idx];
          if (_wtok?.parts) _wtok.parts.forEach((_,pi)=>{
            const pk=`${cur_word_idx}p${pi}`;
            word_results[pk]=word_results[pk]||{}; word_results[pk][matched]=true;
            WORD_PROGRESS.unlock_part(cur_sign_id,cur_word_idx,pi,matched);
          });
        } else {
          WORD_PROGRESS.unlock(cur_sign_id,cur_word_idx,matched);
        }
        if (typeof MapPanel !== 'undefined' && document.getElementById('map-panel')?.classList.contains('open')) MapPanel.refresh();
      } else { NPC_VOCAB.add(token, matched); NPC_LINE_PROGRESS.save(_npc_line_id, word_results); }
      // Advance to the other slot if one was just answered
      if (matched==='romaji'&&!res.meaning) { _active_field='meaning'; inp.placeholder=''; }
      if (matched==='meaning'&&!res.romaji) { _active_field='romaji';  inp.placeholder=''; }
      inp.value=""; inp.className="correct";
      setTimeout(()=>{ inp.className=""; },500);
      fb.textContent=""; fb.style.color="";
      _render_chips();
      if (cur_sign_id==='__npc__') DialoguePanel.refreshWordColors();
      const sign=SIGN_BY_ID[cur_sign_id];
      const allDone=sign&&sign.tokens.every((t,i)=>{
        if (t.parts&&t.parts.length) return t.parts.every((_,pi)=>{ const r=word_results[`${i}p${pi}`]||{}; return r.romaji&&r.meaning; });
        const r=word_results[i]||{}; return r.romaji&&r.meaning;
      });
      if (allDone) {
        ws_el.classList.add('done');
        if (sign.translation) {
          const transl_el=document.getElementById("ws-translation");
          transl_el.textContent=sign.translation;
          setTimeout(()=>transl_el.classList.add('visible'),20);
        }
        if (cur_sign_id==='__npc__') DialoguePanel.revealTranslation(sign.japanese);
        SoundFX.chime();
      } else { SoundFX.ding(); if (inp.parentElement!==panel_el) inp.focus(); }
    }

    inp.addEventListener("keydown", async e => {
      if (e.key==="Escape"){inp.blur();return;}
      if (e.key==="Tab") {
        e.preventDefault();
        const merged=chips_row.querySelector('.ws-merged-chip');
        if (!merged) return;
        const openSlots=[...merged.querySelectorAll('[data-field].slot-empty,[data-field].slot-active')];
        if (openSlots.length===0) return;
        const activeIdx=openSlots.findIndex(el=>el.classList.contains('slot-active'));
        const step=e.shiftKey?-1:1;
        const nextIdx=activeIdx===-1?(e.shiftKey?openSlots.length-1:0):(activeIdx+step+openSlots.length)%openSlots.length;
        const next=openSlots[nextIdx];
        const tok_idx=+next.dataset.tokIdx;
        const part_idx=next.dataset.whole==='1'?-1:(next.dataset.partIdx!==undefined?+next.dataset.partIdx:null);
        _select(tok_idx,part_idx,next.dataset.field);
        return;
      }
      if (e.key!=="Enter") return;
      if (cur_sign_id==null||cur_word_idx==null||_checking) return;
      const sign=SIGN_BY_ID[cur_sign_id], token=sign.tokens[cur_word_idx];
      const active=(cur_part_idx!=null&&cur_part_idx>=0&&token.parts)?token.parts[cur_part_idx]:token;
      const res_key=(cur_part_idx!=null&&cur_part_idx>=0)?`${cur_word_idx}p${cur_part_idx}`:cur_word_idx;
      word_results[res_key]=word_results[res_key]||{};
      const res=word_results[res_key], raw=inp.value;
      // Auto-match: pre-fill from NPC_VOCAB only (confirmed correct answers, not LLM guesses)
      const _kve=NPC_VOCAB.getAll().find(e=>e.text===active.text&&e.romaji&&e.meaning_unlocked);
      if (_kve) {
        if (!active.romaji&&_kve.reading)  { active.romaji=_kve.reading; active.furigana=_kve.reading; }
        if (!active.meaning&&_kve.meaning) { active.meaning=_kve.meaning; }
      }
      const matched=_checkWhat(active,raw,res);
      if (matched) { _accept(active,matched,res); }
      else if (res.romaji&&!res.meaning) {
        // Empty input: reject immediately — never reach LLM with blank answer
        if (!raw.trim()) { inp.className="wrong"; setTimeout(()=>{inp.className="";},700); inp.focus(); return; }
        // If the meaning is unknown (NPC token without a definition), look it up before judging
        if (cur_sign_id==='__npc__' && !active.meaning) {
          _checking=true;
          const def=await _npc_lookup(active.text, msg=>{ fb.textContent=msg; fb.style.color='#b8860b'; });
          _checking=false;
          if (def && def.meaning) {
            active.meaning=def.meaning;
            if (!active.romaji) { active.romaji=def.reading; active.furigana=def.reading; }
          } else {
            // No definition found; treat the player's typed answer as the canonical meaning
            active.meaning=raw.trim();
          }
          const m2=_checkWhat(active,raw,res);
          if (m2) { inp.value=""; _accept(active,m2,res); return; }
          if (!active.meaning) { inp.className="wrong"; setTimeout(()=>{inp.className="";},700); inp.focus(); return; }
        }
        _checking=true; fb.textContent="checking…"; fb.style.color="#b8860b";
        const ok=await _llama_judge_meaning(active,raw.trim(), msg=>{ fb.textContent=msg; fb.style.color="#b8860b"; });
        _checking=false;
        if (ok){ inp.value=""; _accept(active,"meaning",res); }
        else { inp.className="wrong"; setTimeout(()=>{inp.className="";},700); inp.focus(); }
      } else { inp.className="wrong"; setTimeout(()=>{inp.className="";},700); }
    });

    speak_all.addEventListener("click", () => {
      const sign = SIGN_BY_ID[cur_sign_id]; if (!sign) return;
      _speak(sign.japanese.replace(/\n/g, ' '));
    });

    let _copy_flash = null;
    copy_btn.addEventListener("click", () => {
      const sign = SIGN_BY_ID[cur_sign_id]; if (!sign) return;
      const tokens = sign.tokens || [];
      const text = (sign.japanese || tokens.map(t => t.text).join('')).replace(/\n/g, ' ');
      _copy_text(text, null);
      copy_btn.textContent = "✓";
      copy_btn.classList.add("copied");
      if (_copy_flash) clearTimeout(_copy_flash);
      _copy_flash = setTimeout(() => {
        copy_btn.textContent = "⎘";
        copy_btn.classList.remove("copied");
        _copy_flash = null;
      }, 1400);
    });

    lkp.addEventListener("click", async () => {
      if (cur_sign_id==null||cur_word_idx==null) return;
      const _token=SIGN_BY_ID[cur_sign_id==='__npc__'?'__npc__':cur_sign_id].tokens[cur_word_idx];
      const active=(cur_part_idx!=null&&_token.parts)?_token.parts[cur_part_idx]:_token;
      const res_key=cur_part_idx!=null?`${cur_word_idx}p${cur_part_idx}`:cur_word_idx;
      word_results[res_key]=word_results[res_key]||{};
      const res=word_results[res_key];
      if (res.romaji&&res.meaning) return;
      if (sim.state.phone.lookup_cooldown>0) return;
      if (cur_sign_id==='__npc__') {
        if ((!_token.romaji&&!_token.furigana)||!_token.meaning) {
          lkp.disabled=true;
          const def=await _npc_lookup(_token.text, msg=>{ fb.textContent=msg; fb.style.color='#b8860b'; });
          lkp.disabled=false;
          if (def) { if(!_token.romaji)_token.romaji=def.reading; if(!_token.furigana)_token.furigana=def.reading; if(!_token.meaning)_token.meaning=def.meaning; }
        }
        const reading=_token.romaji||_token.furigana;
        const meaning=(_token.meaning||'').split(/\s*[/,]\s*/)[0].trim().replace(/^to\s+/i,'');
        fb.textContent=''; fb.style.color='';
        if (!reading&&!meaning) { fb.textContent='not found'; fb.style.color='#888'; _update_lkp(); return; }
        const _hr=_fmt_read(_token.furigana||reading,reading);
        _hint_by_key[res_key]={reading:_hr, meaning};
        _show_hint(_hr, meaning);
        sim.perform("use_phone_lookup"); _update_lkp(); _start_lkp_timer();
        if (inp.parentElement!==panel_el) inp.focus();
        return;
      }
      // non-NPC: show reading+meaning as hint only — player must still type to get credit
      const reading=active.romaji||active.furigana;
      const meaning=(active.meaning||'').split(/\s*[/,]\s*/)[0].trim().replace(/^to\s+/i,'');
      const _hr2=_fmt_read(active.furigana,reading);
      _hint_by_key[res_key]={reading:_hr2, meaning};
      _show_hint(_hr2, meaning);
      sim.perform("use_phone_lookup"); _update_lkp(); _start_lkp_timer();
      if (inp.parentElement!==panel_el) inp.focus();
    });

    return { open, clear, open_npc_sentence, speak: _speak, prefetch: words => words.forEach(w => _npc_lookup(w)), split_ko_words: _ko_split_words, lookup: _npc_lookup };
  })();

  const sim      = new Sim2D();
  const renderer = new Renderer2D(canvas, sim);
  const input    = new Input2D(canvas, sim, renderer);

  document.getElementById("start-btn").addEventListener("click", () => {
    document.getElementById("start-screen").style.display = "none";
    document.getElementById("map-btn").style.display = "block";
    document.getElementById("vocab-btn").style.display = "block";
    document.getElementById("settings-btn").style.display = "block";
    sim.start();
  });

  const VocabPanel = (() => {
    const STORE_KEY = 'vocab-list-v1';
    const panel    = document.getElementById("vocab-panel");
    const content  = document.getElementById("vocab-content");
    const btn      = document.getElementById("vocab-btn");
    const closeBtn = document.getElementById("vocab-close");
    const clearBtn = document.getElementById("vocab-clear-btn");
    const sortBtn  = document.getElementById("vocab-sort-btn");
    const searchInput = document.getElementById("vocab-search");
    const titleEl  = document.getElementById("vocab-title");
    const dlg_inp  = document.getElementById("ws-dlg-input");
    const dlg_open = () => document.getElementById("ws-dialogue").classList.contains("open");

    let _words = []; // [{ text, reading, meaning }]

    function _load() {
      try { _words = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { _words = []; }
    }
    function _save() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(_words)); } catch {}
    }

    function _lookup(text) {
      const ko = LANG.current === 'ko';
      const signs = ko ? [...SIGNS_KO, ...WORLD_SIGNS_KO] : [...SIGNS, ...WORLD_SIGNS];
      for (const sign of signs) {
        for (const tok of (sign.tokens || [])) {
          const check = (t) => t.text === text ? { text, reading: t.romaji || t.furigana || '', meaning: t.meaning ? t.meaning.split('/')[0].trim() : '' } : null;
          const found = check(tok) || (tok.parts || []).reduce((a, p) => a || check(p), null);
          if (found) return found;
        }
      }
      if (ko && _KO_FALLBACK[text]) {
        const def = _KO_FALLBACK[text];
        return { text, reading: def.reading || '', meaning: def.meaning ? def.meaning.split('/')[0].trim() : '' };
      }
      const npe = NPC_VOCAB.getAll().find(e => e.text === text);
      if (npe) return { text, reading: npe.reading || '', meaning: npe.meaning ? npe.meaning.split('/')[0].trim() : '' };
      return { text, reading: '', meaning: '' };
    }

    function _play_add_sound() {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        [[880, 0, 0.22], [1320, 0.11, 0.28]].forEach(([freq, delay, dur]) => {
          const osc = ac.createOscillator(), g = ac.createGain();
          osc.connect(g); g.connect(ac.destination);
          osc.type = 'sine'; osc.frequency.value = freq;
          const t = ac.currentTime + delay;
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.15, t + 0.012);
          g.gain.exponentialRampToValueAtTime(0.001, t + dur);
          osc.start(t); osc.stop(t + dur);
        });
      } catch {}
    }

    function _sort() {
      _words.sort((a, b) => a.text.localeCompare(b.text, 'ko'));
    }
    function _add(text) {
      if (_words.some(w => w.text === text)) return;
      _words.push(_lookup(text));
      _sort();
      _play_add_sound();
      _save(); _render();
    }
    function _remove(text) {
      _words = _words.filter(w => w.text !== text);
      _save(); _render();
    }

    function _render() {
      const ko = LANG.current === 'ko';
      titleEl.textContent = ko ? '단어장 — Word List' : '単語帳 — Word List';
      const counterEl = document.getElementById('vocab-counter');
      if (ko && counterEl) {
        const npcMap = new Map(NPC_VOCAB.getAll().map(e => [e.text, e]));
        const total = _words.length;
        const found = _words.filter(w => { const e = npcMap.get(w.text); return e && e.romaji && e.meaning_unlocked; }).length;
        counterEl.textContent = `${found} / ${total} words found`;
        counterEl.style.display = total ? '' : 'none';
      } else if (counterEl) {
        counterEl.style.display = 'none';
      }
      clearBtn.style.display = _words.length ? '' : 'none';
      sortBtn.style.display  = _words.length ? '' : 'none';
      content.innerHTML = '';

      if (!_words.length) {
        const hint = document.createElement('div');
        hint.id = 'vocab-drop-hint';
        hint.textContent = 'Drag word chips here\nto add them to your list.';
        hint.style.whiteSpace = 'pre-line';
        content.appendChild(hint);
        return;
      }

      const q = searchInput.value.trim().toLowerCase();
      let visible = q ? _words.filter(w => (w.text + ' ' + w.reading + ' ' + w.meaning).toLowerCase().includes(q)) : _words.slice();

      const CHO_CHARS = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
      function _cho(text) {
        const cp = text && text.codePointAt(0);
        return (cp >= 0xAC00 && cp <= 0xD7A3) ? CHO_CHARS[Math.floor((cp - 0xAC00) / 588)] : null;
      }

      let _drag_idx = null;

      let lastCho = null;
      let prevWord = null;
      visible.forEach((w, vi) => {
        if (ko) {
          const wcho = _cho(w.text);
          if (wcho && wcho !== lastCho) {
            const div = document.createElement('div');
            div.className = 'vocab-cho-divider';
            div.textContent = wcho;
            content.appendChild(div);
            lastCho = wcho;
          }
        }

        const misplaced = ko && prevWord !== null && w.text.localeCompare(prevWord.text, 'ko') < 0;
        if (ko) prevWord = w;

        const row = document.createElement('div');
        row.className = 'vocab-row' + (misplaced ? ' vocab-row-misplaced' : '');
        row.dataset.idx = String(_words.indexOf(w));

        const handle = document.createElement('span');
        handle.className = 'vocab-drag-handle'; handle.textContent = '⠿'; handle.title = 'Drag to reorder';
        handle.draggable = true;
        handle.addEventListener('dragstart', e => {
          _drag_idx = _words.indexOf(w);
          e.dataTransfer.setData('vocab-reorder', String(_drag_idx));
          e.dataTransfer.effectAllowed = 'move';
          e.stopPropagation();
        });
        handle.addEventListener('dragend', () => {
          _drag_idx = null;
          content.querySelectorAll('.vocab-row').forEach(r => r.classList.remove('drag-over-above','drag-over-below'));
        });

        row.addEventListener('dragover', e => {
          if (!e.dataTransfer.types.includes('vocab-reorder')) return;
          e.preventDefault(); e.dataTransfer.dropEffect = 'move';
          const half = row.getBoundingClientRect().top + row.offsetHeight / 2;
          content.querySelectorAll('.vocab-row').forEach(r => r.classList.remove('drag-over-above','drag-over-below'));
          row.classList.add(e.clientY < half ? 'drag-over-above' : 'drag-over-below');
        });
        row.addEventListener('dragleave', e => {
          if (!row.contains(e.relatedTarget)) row.classList.remove('drag-over-above','drag-over-below');
        });
        row.addEventListener('drop', e => {
          if (!e.dataTransfer.types.includes('vocab-reorder')) return;
          e.preventDefault(); e.stopPropagation();
          row.classList.remove('drag-over-above','drag-over-below');

    const ROOM_ORDER = ['street','lobby','play_area','gallery','library','salon','cooking_room','outdoor','house'];

    function _sign_progress(room_id) {
      const room = ROOM_MAP_DATA[room_id];
      if (!room) return { done: 0, total: 0 };
      let done = 0, total = 0;
      for (const sr of (room.signs || [])) {
        const sign = SIGN_BY_ID[sr.sign_id];
        if (!sign) continue;
        const prog = WORD_PROGRESS.getSign(sr.sign_id);
        (sign.tokens || []).forEach((tok, i) => {
          total++;
          if (tok.parts && tok.parts.length) {
            // Compound token: progress lives on part keys ("0p0", "0p1", …), not the token key
            if (tok.parts.some((_, pi) => { const r = prog[`${i}p${pi}`] || {}; return r.romaji || r.meaning; }))
              done++;
          } else {
            const r = prog[i] || {};
            if (r.romaji || r.meaning) done++;
          }
        });
      }
      return { done, total };
    }

    function _render() {
      const ko = LANG.current === 'ko';
      title_el.textContent = ko ? '진행 상황' : '進捗マップ';
      const current = sim.state.room;
      content.innerHTML = '';
      for (const room_id of ROOM_ORDER) {
        const room = ROOM_MAP_DATA[room_id];
        if (!room) continue;
        const { done, total } = _sign_progress(room_id);
        const pct = total > 0 ? Math.round(done / total * 100) : 0;
        const is_here = room_id === current;

        const row = document.createElement('div');
        row.className = 'map-room-row';

        const hdr = document.createElement('div');
        hdr.className = 'map-room-header';

        const name = document.createElement('span');
        name.className = 'map-room-name' + (is_here ? ' current' : '');
        name.textContent = (is_here ? '▶ ' : '') + (ko ? room.name_ko : room.name_jp);

        const right = document.createElement('span');
        right.style.cssText = 'display:flex;align-items:baseline;gap:8px;';

        const count = document.createElement('span');
        count.className = 'map-room-sub';
        count.textContent = total > 0 ? `${done}/${total}` : '';

        const pct_el = document.createElement('span');
        pct_el.className = 'map-room-pct';
        pct_el.textContent = total > 0 ? `${pct}%` : '—';

        right.append(count, pct_el);

        const bar = document.createElement('div');
        bar.className = 'map-room-bar';

        fill.className = 'map-room-fill' + (pct === 100 && total > 0 ? ' done' : '');
        fill.style.width = pct + '%';
        bar.appendChild(fill);

        row.append(hdr, bar);

        row.addEventListener('click', () => {
          // Find first sign in the room that has any incomplete token
          const rm = ROOM_MAP_DATA[room_id];
          const room_signs = rm ? (rm.signs || []) : [];
          let target_col = null;
          for (const sr of room_signs) {
            const sign = SIGN_BY_ID[sr.sign_id];
            if (!sign) continue;
            const prog = WORD_PROGRESS.getSign(sr.sign_id);
            const incomplete = (sign.tokens || []).some((tok, i) => {
              const r = prog[i] || {};
              return !r.romaji || !r.meaning;
            });
            if (incomplete) { target_col = sr.col; break; }

          // Fall back to first sign if all done

          close_panel();
        });

        content.appendChild(row);

    function _snap_zone(x, y) { const sw = window.innerWidth, sh = window.innerHeight; if (x < sw*0.3) return 'left'; if (x > sw*0.7) return 'right'; return null; }
    _apply_anchor(_anchor);

      if (e.button !== 0 || e.target.closest('button')) return;

    window.addEventListener('mouseup', e => {

    btn.addEventListener('click', open);

    panel.addEventListener('click', e => { if (e.target === panel) close_panel(); });

    function _tokenize(text) {
      if (LANG.current === 'ko') {
        return text.replace(/[。、！？「」『』・…]/g,'').split(/\s+/).filter(Boolean);
      }
      const tokens = []; let buf = '', last = null;
      const script = c => { const n=c.charCodeAt(0);
        if (n>=0x4E00&&n<=0x9FFF||n>=0x3400&&n<=0x4DBF) return 'K';
        if (n>=0x3040&&n<=0x309F) return 'H';
        if (n>=0x30A0&&n<=0x30FF) return 'T';
        return 'O'; };
      for (const c of text) {
        if (/[\s。、！？「」『』・…]/.test(c)) { if (buf){tokens.push(buf);buf='';last=null;} continue; }
        const t=script(c); if (t!==last&&buf){tokens.push(buf);buf='';}
        buf+=c; last=t;
      }
      if (buf) tokens.push(buf);
      return tokens;
    }

    async function _lookup_word(word) {
      if (_lookup_cache[word]) return _lookup_cache[word];
      const lang_name = LANG.current==='ko'?'Korean':'Japanese';
      try {
        const res=await fetch(OLLAMA_URL,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:OLLAMA_MODEL,keep_alive:-1,messages:[{role:'user',content:
            `${lang_name} word: "${word}"\nReply ONLY with JSON: {"reading":"romanization","meaning":"English meaning"}`
          }],stream:false,options:{temperature:0,num_predict:40}})});
        if (!res.ok) throw new Error();
        const raw=(await res.json()).message?.content?.trim()||'';
        let p=null; try{p=JSON.parse(raw);}catch{}
        if (!p){const m=raw.match(/\{[\s\S]*?\}/);if(m)try{p=JSON.parse(m[0]);}catch{}}
        if (p?.reading) { if (p.meaning) { p.meaning=_first_meaning(p.meaning); p.meaning=p.meaning.charAt(0).toLowerCase()+p.meaning.slice(1); } _lookup_cache[word]=p; return p; }

    const _dlg_store=(()=>{ try{return JSON.parse(localStorage.getItem(DLG_KEY)||'{}');}catch{return{};} })();
    function _save_dlg(npc_id){ _dlg_store[_hk(npc_id)]=_histories[_hk(npc_id)]||[]; try{localStorage.setItem(DLG_KEY,JSON.stringify(_dlg_store));}catch{} }
    function _save_revealed(npc_id, jp){ const k=_hk(npc_id)+'_rev'; if(!_dlg_store[k])_dlg_store[k]=[]; if(!_dlg_store[k].includes(jp))_dlg_store[k].push(jp); try{localStorage.setItem(DLG_KEY,JSON.stringify(_dlg_store));}catch{} }
    function _is_revealed(npc_id, jp){ return (_dlg_store[_hk(npc_id)+'_rev']||[]).includes(jp); }

    function _system_prompt(npc_id) {
      const npc=NPC_DEFS[npc_id];
      const facts=(NPC_KNOWLEDGE[npc_id]||[]).map(f=>"- "+f).join("\n");
      const ko = LANG.current === 'ko';
      const npc_name = ko && npc.name_ko ? npc.name_ko : npc.name_jp;
      const lang = ko ? 'Korean' : 'Japanese';
      const style = ko ? '존댓말' : '丁寧語';
      const reading_label = ko ? 'romanization' : 'romaji';
      const format = ko
        ? `{"jp": "Korean response", "en": "English translation"}`
        : `{"jp": "Japanese response", "en": "English translation", "tokens": [{"text": "word", "reading": "${reading_label}", "meaning": "English meaning"}]}`;
      const token_instruction = ko ? '' : '\n- The tokens array must list every word/morpheme in your Japanese response in order';
      const script_rule = ko ? '\n- Write the Korean response entirely in Hangul — do not use any Latin/English characters in the Korean field' : '';
      return `You are ${npc_name} (${npc.name_en}). A visitor is speaking to you in ${lang}.\n\nWhat you know:\n${facts}\n\nInstructions:\n- Stay in character as a polite ${lang} staff member using ${style}\n- Keep your response to 1–2 sentences maximum\n- Reply ONLY with valid JSON: ${format}${token_instruction}${script_rule}\n- CRITICAL: never invent or confirm the existence of specific books, items, rooms, services, or locations that are not explicitly listed in "What you know" above — say you don't know instead\n- If asked about something not covered above, say politely that you don't know or cannot confirm\n- Do not include any text outside the JSON`;
    }

    const _hk = (npc_id) => `${npc_id}_${LANG.current}`;

    async function _generate(npc_id, text) {
      const history=_histories[_hk(npc_id)]||[];
      try {
        const ctl=new AbortController(); const tid=setTimeout(()=>ctl.abort(),45000);
        const res=await fetch(OLLAMA_URL,{method:"POST",headers:{"Content-Type":"application/json"},signal:ctl.signal,
          body:JSON.stringify({model:OLLAMA_MODEL,keep_alive:-1,format:"json",messages:[{role:"system",content:_system_prompt(npc_id)},...history,{role:"user",content:text}],stream:false,options:{temperature:0.3,num_predict:LANG.current==='ko'?128:512}})});
        clearTimeout(tid);
        if (!res.ok) throw new Error('http '+res.status);
        const json=await res.json();
        const raw=json.message?.content||'';
        let parsed=null;
        try{parsed=JSON.parse(raw);}catch{}
        if (!parsed){const m=raw.match(/\{[\s\S]*\}/);if(m)try{parsed=JSON.parse(m[0]);}catch{}}
        if (parsed?.jp&&parsed?.en){
          _histories[_hk(npc_id)]=[...history,{role:"user",content:text},{role:"assistant",content:raw}];
          _save_dlg(npc_id);
          const toks=Array.isArray(parsed.tokens)?parsed.tokens.map(t=>({...t,meaning:_first_meaning(t.meaning)})):null;
          return {jp:parsed.jp,en:parsed.en,tokens:toks};
        }
        throw new Error('parse: '+raw.slice(0,120));
      } catch(err) {
        console.error('[NPC] failed — error:', err?.message, '| type:', err?.name, '| npc:', npc_id, '| url:', OLLAMA_URL);
        const intent_id=npc_fallback_classify(npc_id,text);
        const intent=NPC_DEFS[npc_id]?.intents[intent_id];
        if (intent) return {jp:(LANG.current==='ko'&&intent.ko?intent.ko:intent.jp),en:intent.en,tokens:null};
        if (LANG.current==='ko') return {jp:'죄송해요, 잘 이해하지 못했어요. 다시 한번 말씀해 주시겠어요?', en:"Sorry, I didn't quite understand. Could you say that again?", tokens:null};
        return null;
      }
    }

    async function _send() {
      if (!cur_npc_id) return;
      const text=inp.value.trim(); if (!text) return;
      inp.value=""; inp.disabled=true; send_btn.disabled=true;
      _append_player_turn(text);
      WorkspacePanel.speak(text);

      // Pending follow-up: fire scripted intent immediately, skip Ollama
      const pend=_pending[cur_npc_id];
      if (pend) {
        delete _pending[cur_npc_id];
        if (_is_affirmative(text)) {
          const intent=NPC_DEFS[cur_npc_id]?.intents[pend.intent_id];
          if (intent) {
            const jp=(LANG.current==='ko'&&intent.ko?intent.ko:intent.jp), en=intent.en;
            _histories[_hk(cur_npc_id)]=[...(_histories[_hk(cur_npc_id)]||[]),{role:"user",content:text},{role:"assistant",content:JSON.stringify({jp,en})}];
            _save_dlg(cur_npc_id);
            _append_npc_turn(jp, en, null);
            send_btn.disabled=false; inp.disabled=false; inp.focus();
            return;
          }
        }
      }

      thinking.classList.add("visible");
      body_el.scrollTop = body_el.scrollHeight;
      const response=await _generate(cur_npc_id,text);
      thinking.classList.remove("visible");
      if (response) _append_npc_turn(response.jp, response.en, response.tokens);
      send_btn.disabled=false; inp.disabled=false; inp.focus();
    }

    function openConvo(convo_id) {
      const convo = (typeof CONVERSATIONS !== 'undefined') && CONVERSATIONS[convo_id];
      if (!convo) return;
      cur_npc_id = convo_id;
      const ko = LANG.current === 'ko';
      document.getElementById("ws-panel").classList.remove("open");
      dlg_el.style.transform=''; dlg_el.style.left=''; dlg_el.style.top='';
      dlg_el.classList.add("open", "convo-mode");
      avatar.style.background='';
      name_el.textContent = ko ? convo.title_ko : convo.title_en;
      body_el.querySelectorAll('.dlg-turn').forEach(el => el.remove());
      thinking.classList.remove("visible");
      inp.disabled = true;

      const first_npc = convo.turns[0]?.npc_id;
      convo.turns.forEach(turn => {
        const is_right = turn.npc_id !== first_npc;
        const speaker_name = ko ? turn.name_ko : turn.name_en;
        const text = turn.ko;
        const words = text.split(/\s+/);

        const turn_el = document.createElement('div');
        turn_el.className = 'dlg-turn' + (is_right ? ' dlg-turn-convo-right' : '');

        const speaker_el = document.createElement('div');
        speaker_el.className = 'dlg-convo-speaker';
        speaker_el.textContent = speaker_name;

        const already_revealed = _is_revealed(convo_id, turn.ko);

        const npc_el = document.createElement('div');
        npc_el.className = 'dlg-turn-npc';
        npc_el.dataset.jp = turn.ko;
        npc_el.dataset.en = turn.en;
        if (already_revealed) npc_el.classList.add('complete');

        const jp_row = document.createElement('div');
        jp_row.className = 'dlg-npc-jp';
        words.forEach((word, wi) => {
          if (wi > 0) jp_row.appendChild(document.createTextNode(' '));
          const span = document.createElement('span');
          span.className = 'dlg-word'; span.textContent = word; span.draggable = true;
          span.addEventListener('dragstart', ev => { ev.dataTransfer.setData('dlg-word', word); ev.dataTransfer.effectAllowed = 'copy'; });
          span.addEventListener('click', () => {
            jp_row.querySelectorAll('.dlg-word.active').forEach(c => c.classList.remove('active'));
            span.classList.add('active');
            WorkspacePanel.open_npc_sentence(text, words, wi, speaker_name, null, turn.en);
          });
          jp_row.appendChild(span);
        });
        npc_el.appendChild(jp_row);

        const en_el = document.createElement('div');
        en_el.className = 'dlg-convo-en';
        en_el.textContent = turn.en;
        npc_el.appendChild(en_el);

        // Portrait canvas — crops the character sprite from the loaded spritesheet
        const portrait = document.createElement('canvas');
        portrait.className = 'dlg-convo-portrait';
        const dpr = window.devicePixelRatio || 1;
        portrait.width  = Math.round(32 * dpr);
        portrait.height = Math.round(64 * dpr);
        const spr = (typeof CHARS !== 'undefined') && CHARS[turn.npc_id];
        if (spr && typeof renderer !== 'undefined') {
          const pimg = renderer._imgs[spr.img];
          if (pimg && pimg.complete && pimg.naturalWidth) {
            const pctx = portrait.getContext('2d');
            pctx.imageSmoothingEnabled = false;
            pctx.drawImage(pimg, spr.sx, spr.sy, spr.sw, spr.sh, 0, 0, portrait.width, portrait.height);
          }
        }

        const row_el = document.createElement('div');
        row_el.className = 'dlg-convo-row';
        row_el.append(portrait, npc_el);

        turn_el.append(speaker_el, row_el);
        body_el.insertBefore(turn_el, thinking);
      });
    }

    function open(npc_id) {
      const npc=NPC_DEFS[npc_id]; if (!npc) return;
      cur_npc_id=npc_id;
      const _gt = sim.state.game_time;
      const _isBirthday = npc.birthday && _gt && npc.birthday.month === _gt.month && npc.birthday.day === _gt.day;
      const greeting = _isBirthday && npc.greeting_birthday
        ? (LANG.current==='ko' && npc.greeting_birthday_ko ? npc.greeting_birthday_ko : npc.greeting_birthday)
        : (LANG.current==='ko' && npc.greeting_ko ? npc.greeting_ko : npc.greeting);
      document.getElementById("ws-panel").classList.remove("open");
      // Reset to default centered position
      dlg_el.style.transform=''; dlg_el.style.left=''; dlg_el.style.top='';
      dlg_el.classList.remove("convo-mode");
      dlg_el.classList.add("open");
      inp.disabled = false;
      avatar.style.background=npc.color; name_el.textContent='';
      body_el.querySelectorAll('.dlg-turn').forEach(el => el.remove());
      if (greeting.follow_up) _pending[npc_id]={intent_id:greeting.follow_up};
      const saved=_dlg_store[_hk(npc_id)];
      // "established" = player has formally opened this dialogue before (greeting was sent)
      const established=saved?.some(m=>m.greeting||m.role==='user');
      if (established) {
        delete _pending[npc_id];  // pending only for fresh conversations
        _histories[_hk(npc_id)]=saved;
        for (const msg of saved) {
          if (msg.role==='assistant') {
            let p=null; try{p=JSON.parse(msg.content);}catch{}
            if (p?.jp) _append_npc_turn(p.jp, p.en, Array.isArray(p.tokens)?p.tokens:null, _is_revealed(npc_id, p.jp));
          } else if (msg.role==='user') {
            _append_player_turn(msg.content);
          }
        }
      } else {
        // First interactive open — show any ambient lines seen so far, then greeting
        const ambient=saved||[];
        for (const msg of ambient) {
          let p=null; try{p=JSON.parse(msg.content);}catch{}
          if (p?.jp) _append_npc_turn(p.jp, p.en, null, false);
        }
        const greeting_msg={role:"assistant",content:JSON.stringify({jp:greeting.jp,en:greeting.en}),greeting:true};
        _histories[_hk(npc_id)]=[...ambient,greeting_msg];
        _append_npc_turn(greeting.jp, greeting.en, null);
        _save_dlg(npc_id);
      }
      inp.placeholder = '';
      thinking.classList.remove("visible"); inp.value=""; inp.disabled=false; send_btn.disabled=false; inp.focus();
      _koKbdShow();
    }

    function close() {
      if (cur_npc_id) delete _pending[cur_npc_id];
      cur_npc_id=null; dlg_el.classList.remove("open", "convo-mode");
      inp.disabled = false;
      _koKbdReset();
    }

    send_btn.addEventListener("click",_send);
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")_send();});
    close_btn.addEventListener("click",close);

    // ── Korean virtual keyboard + IME ─────────────────────────────────────────
    const _koKbd = document.getElementById('ko-kbd');
    // Syllable composition tables (Unicode Hangul block: 0xAC00 + (cho*21+jung)*28 + jong)
    const _CHO  = {ㄱ:0,ㄲ:1,ㄴ:2,ㄷ:3,ㄸ:4,ㄹ:5,ㅁ:6,ㅂ:7,ㅃ:8,ㅅ:9,ㅆ:10,ㅇ:11,ㅈ:12,ㅉ:13,ㅊ:14,ㅋ:15,ㅌ:16,ㅍ:17,ㅎ:18};
    const _JUNG = {ㅏ:0,ㅐ:1,ㅑ:2,ㅒ:3,ㅓ:4,ㅔ:5,ㅕ:6,ㅖ:7,ㅗ:8,ㅘ:9,ㅙ:10,ㅚ:11,ㅛ:12,ㅜ:13,ㅝ:14,ㅞ:15,ㅟ:16,ㅠ:17,ㅡ:18,ㅢ:19,ㅣ:20};
    const _JONG = {ㄱ:1,ㄲ:2,ㄴ:4,ㄷ:7,ㄹ:8,ㅁ:16,ㅂ:17,ㅅ:19,ㅆ:20,ㅇ:21,ㅈ:22,ㅊ:23,ㅋ:24,ㅌ:25,ㅍ:26,ㅎ:27};
    const _J2C  = {1:0,2:1,4:2,7:3,8:5,16:6,17:7,19:9,20:10,21:11,22:12,23:14,24:15,25:16,26:17,27:18};
    const _CCH  = 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ'.split('');
    const _CJONG = {}; // compound finals: {first_jong: {second_cho: result}}
    [[1,9,3],[4,12,5],[4,18,6],[8,0,9],[8,6,10],[8,7,11],[8,9,12],[8,16,13],[8,17,14],[8,18,15],[17,9,18]]
      .forEach(([j,c,r])=>{ (_CJONG[j]||(_CJONG[j]={}))[c]=r; });
    const _DJONG = {3:[1,9],5:[4,12],6:[4,18],9:[8,0],10:[8,6],11:[8,7],12:[8,9],13:[8,16],14:[8,17],15:[8,18],18:[17,9]};
    const _CJUNG = {8:{0:9,1:10,20:11},13:{4:14,5:15,20:16},18:{20:19}}; // compound vowels
    const _DJUNG = {9:8,10:8,11:8,14:13,15:13,16:13,19:18};
    const _syl = (c,v,f=0) => String.fromCharCode(0xAC00+(c*21+v)*28+f);

    let _ims = null; // {cho, jung(-1=consonant only), jong}
    let _koShifted = false;
    const _iv = () => inp.value;
    const _is = ch => { inp.value = _iv().slice(0,-1)+ch; };
    const _ip = ()  => { inp.value = _iv().slice(0,-1); };
    const _ia = ch  => { inp.value += ch; };

    function _imeType(jamo) {
      const isCons=jamo in _CHO, isVow=jamo in _JUNG;
      if (isCons) {
        const ci=_CHO[jamo];
        if (!_ims)                { _ims={cho:ci,jung:-1,jong:0}; _ia(_CCH[ci]); }
        else if (_ims.jung===-1)  { _ims={cho:ci,jung:-1,jong:0}; _ia(_CCH[ci]); }
        else if (_ims.jong===0)   { const ji=_JONG[jamo]||0; if(ji){_ims.jong=ji;_is(_syl(_ims.cho,_ims.jung,ji));}else{_ims={cho:ci,jung:-1,jong:0};_ia(_CCH[ci]);} }
        else { const comp=(_CJONG[_ims.jong]||{})[ci]; if(comp!==undefined){_ims.jong=comp;_is(_syl(_ims.cho,_ims.jung,comp));}else{_ims={cho:ci,jung:-1,jong:0};_ia(_CCH[ci]);} }
      } else if (isVow) {
        const vi=_JUNG[jamo];
        if (!_ims)               { _ims={cho:11,jung:vi,jong:0}; _ia(_syl(11,vi)); }
        else if (_ims.jung===-1) { _ims.jung=vi; _is(_syl(_ims.cho,vi)); }
        else if (_ims.jong===0)  { const cv=(_CJUNG[_ims.jung]||{})[vi]; if(cv!==undefined){_ims.jung=cv;_is(_syl(_ims.cho,cv));}else{_ims={cho:11,jung:vi,jong:0};_ia(_syl(11,vi));} }
        else { const d=_DJONG[_ims.jong]; if(d){_is(_syl(_ims.cho,_ims.jung,d[0]));_ims={cho:d[1],jung:vi,jong:0};_ia(_syl(d[1],vi));}else{const nc=_J2C[_ims.jong];_is(_syl(_ims.cho,_ims.jung,0));_ims={cho:nc,jung:vi,jong:0};_ia(_syl(nc,vi));} }
      }
    }
    function _imeBs() {
      if (!_ims) { _ip(); return; }
      if (_ims.jong) { const d=_DJONG[_ims.jong]; if(d){_ims.jong=d[0];_is(_syl(_ims.cho,_ims.jung,d[0]));}else{_ims.jong=0;_is(_syl(_ims.cho,_ims.jung,0));} }
      else if (_ims.jung!==-1) { const dv=_DJUNG[_ims.jung]; if(dv!==undefined){_ims.jung=dv;_is(_syl(_ims.cho,dv));}else{_ims.jung=-1;_is(_CCH[_ims.cho]);} }
      else { _ip(); _ims=null; }
    }
    function _koKbdSetShift(v) {
      _koShifted=v;
      document.getElementById('ko-shift').classList.toggle('active',v);
      _koKbd.querySelectorAll('.ko-key[data-ks]').forEach(k=>{ k.textContent=v?k.dataset.ks:k.dataset.k; });
    }
    function _koKbdReset() { _koKbd.classList.remove('visible'); _ims=null; _koKbdSetShift(false); }
    function _koKbdShow()  { if (LANG.current==='ko') _koKbd.classList.add('visible'); }

    // Prevent keys from stealing focus from input
    _koKbd.querySelectorAll('button').forEach(b=>{
      b.addEventListener('mousedown', e=>e.preventDefault());
      b.addEventListener('touchstart', e=>e.preventDefault(), {passive:false});
    });
    document.getElementById('ko-shift').addEventListener('click', ()=>_koKbdSetShift(!_koShifted));
    document.getElementById('ko-bs').addEventListener('click',    ()=>{ _imeBs(); inp.focus(); });
    document.getElementById('ko-space').addEventListener('click', ()=>{ _ims=null; _ia(' '); inp.focus(); });
    _koKbd.querySelectorAll('.ko-key[data-k]').forEach(k=>{
      k.addEventListener('click', ()=>{
        const jamo=_koShifted&&k.dataset.ks?k.dataset.ks:k.dataset.k;
        if (_koShifted&&k.dataset.ks) _koKbdSetShift(false);
        _imeType(jamo); inp.focus();
      });
    });
    inp.addEventListener('focus', _koKbdShow);
    inp.addEventListener('input', ()=>{ if (!inp.value) _ims=null; });

    function _reveal_translation(jp_text) {
      body_el.querySelectorAll('.dlg-turn-npc').forEach(turn => {
        if (turn.dataset.jp === jp_text) turn.classList.add('complete');
      });
      if (cur_npc_id) _save_revealed(cur_npc_id, jp_text);
    }

    // ── Drag to reposition ────────────────────────────────────────────────────
    const dlg_header = document.getElementById('ws-dlg-header');
    let _dlg_drag = null;
    dlg_header.addEventListener('pointerdown', e => {
      if (e.target.closest('button')) return;
      e.preventDefault();
      const rect = dlg_el.getBoundingClientRect();
      dlg_el.style.transform = 'none';
      dlg_el.style.top  = rect.top  + 'px';
      dlg_el.style.left = rect.left + 'px';
      _dlg_drag = { ox: e.clientX - rect.left, oy: e.clientY - rect.top };
      dlg_header.setPointerCapture(e.pointerId);
      dlg_header.classList.add('dragging');
    });
    dlg_header.addEventListener('pointermove', e => {
      if (!_dlg_drag) return;
      const x = Math.max(0, Math.min(e.clientX - _dlg_drag.ox, window.innerWidth  - dlg_el.offsetWidth));
      const y = Math.max(0, Math.min(e.clientY - _dlg_drag.oy, window.innerHeight - dlg_el.offsetHeight));
      dlg_el.style.left = x + 'px';
      dlg_el.style.top  = y + 'px';
    });
    dlg_header.addEventListener('pointerup',     () => { _dlg_drag = null; dlg_header.classList.remove('dragging'); });
    dlg_header.addEventListener('pointercancel', () => { _dlg_drag = null; dlg_header.classList.remove('dragging'); });

    function hasFresh(npc_id) { return !_dlg_store[_hk(npc_id)]?.some(m=>m.greeting||m.role==='user'); }

    // Save an ambient speech-bubble line to this NPC's persistent history.
    // Called from input2d._advance_convo() each time a convo_bubble is shown.
    function addAmbient(npc_id, ko, en) {
      const hk=_hk(npc_id);
      const msg={role:'assistant',content:JSON.stringify({jp:ko,en}),ambient:true};
      const hist=[...(_dlg_store[hk]||[]),msg];
      _dlg_store[hk]=hist;
      if (_histories[hk]) _histories[hk]=hist; // sync if panel is open for this NPC
      try{localStorage.setItem(DLG_KEY,JSON.stringify(_dlg_store));}catch{}
    }

    return {open, openConvo, close, refreshWordColors: _refresh_dlg_word_colors, revealTranslation: _reveal_translation, hasFresh, addAmbient};
  })();

  // ── Teaching language switch ───────────────────────────────────────────────

  function _migrateAtomicProgress() {
    for (const id of Object.keys(SIGN_BY_ID)) {
      const sign = SIGN_BY_ID[id];
      if (!sign.tokens) continue;
      const prog = WORD_PROGRESS.getSign(id);
      sign.tokens.forEach((tok, i) => {
        if (!tok.parts || !tok.parts.length) return;
        const atomicRes = prog[i] || {};
        if (!atomicRes.romaji && !atomicRes.meaning) return;
        tok.parts.forEach((_, pi) => {
          const pk = `${i}p${pi}`;
          const partRes = prog[pk] || {};
          if (atomicRes.romaji && !partRes.romaji) WORD_PROGRESS.unlock_part(id, i, pi, 'romaji');
          if (atomicRes.meaning && !partRes.meaning) WORD_PROGRESS.unlock_part(id, i, pi, 'meaning');
        });
      });
    }
  }

  function switchTeachingLang(lang) {
    try {
      LANG.set(lang);
      // Hot-swap SIGN_BY_ID: delete all current entries, re-populate from the right set
      Object.keys(SIGN_BY_ID).forEach(k => delete SIGN_BY_ID[k]);
      const signs = lang === 'ko' ? [...SIGNS_KO, ...WORLD_SIGNS_KO] : [...SIGNS, ...WORLD_SIGNS];
      signs.forEach(s => { SIGN_BY_ID[s.id] = s; });
      // Reload per-language vocab progress
      WORD_PROGRESS.reload();
      // Migrate any tokens that were saved as atomic before parts were added
      _migrateAtomicProgress();
      // Close any open panels so stale sign data isn't shown
      WorkspacePanel.clear();
    } catch(e) { console.error('switchTeachingLang error:', e); }

    // Update button: show the OTHER language as the switch target
    const btn = document.getElementById('lang-btn');
    if (btn) {
      btn.textContent   = lang === 'ko' ? '日本語' : '한국어';
      btn.style.color   = lang === 'ko' ? '#c0392b' : '#555';
      btn.style.borderColor = lang === 'ko' ? '#c0392b' : '#3a2810';
    }
    const h1 = document.querySelector('#start-screen h1');
    if (h1) h1.textContent = lang === 'ko' ? '도서관' : '図書館';
  }

  document.getElementById('lang-btn').addEventListener('click', () => {
    switchTeachingLang(LANG.current === 'ko' ? 'ja' : 'ko');
  });

  // Apply saved teaching language on load
  switchTeachingLang(LANG.current);

  // ── Game loop ──────────────────────────────────────────────────────────────
  let _last_t = 0;
  let _room_prev = null;

  function loop(now) {
    const dt = Math.min((now - _last_t) / 1000, 0.05);
    _last_t = now;

    if (sim.state.session_active) {
      input.update(dt, now);
      sim.tick_npcs(dt);

      if (sim.state.transition) {
        const changed = sim.advance_transition(dt);
        if (changed) {
          WorkspacePanel.clear();
          DialoguePanel.close();
        }
      }
    }

    renderer.draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>

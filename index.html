<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Slice — Japanese Sim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c49a1a;
      --gold-dim:   rgba(196,154,26,0.7);
      --gold-faint: rgba(196,154,26,0.1);
      --gold-glow:  rgba(196,154,26,0.2);
      --cream:      #ede4ce;
      --cream-dim:  #b8a888;
      --jade:       #52c98e;
      --jade-dim:   #2f6e4e;
      --ember:      #c0392b;
      --bg:         #0b0905;
      --border:     rgba(196,154,26,0.13);
      --border-md:  rgba(196,154,26,0.26);
    }

    body {
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--cream);
      overflow: hidden;
    }

    #game-wrap { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

    /* ── Start screen ───────────────────────────────────────────────────────── */
    #start-screen {
      position: fixed; inset: 0;
      background: rgba(10,8,4,0.97);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; z-index: 10;
    }
    #start-screen h1 { font-family: 'Noto Serif JP', serif; font-size: 30px; color: var(--gold); letter-spacing: 0.12em; }
    #start-btn {
      padding: 11px 38px; background: none; border: 1px solid var(--gold);
      color: var(--gold); font-family: 'DM Mono', monospace; font-size: 13px;
      cursor: pointer; letter-spacing: 0.12em; border-radius: 24px;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
    }
    #start-btn:hover { background: var(--gold); color: var(--bg); box-shadow: 0 0 22px rgba(196,154,26,0.35); }

    /* ── Workspace panel ────────────────────────────────────────────────────── */
    #workspace {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 0; background: transparent; pointer-events: none;
      z-index: 15; display: flex; flex-direction: column; overflow: hidden;
      transition: height 0.3s cubic-bezier(0.16,1,0.3,1), background 0.2s;
    }
    #workspace.active {
      height: 190px; pointer-events: auto;
      background: rgba(9,6,2,0.78);
      backdrop-filter: blur(22px) saturate(1.4); -webkit-backdrop-filter: blur(22px) saturate(1.4);
      border-top: 1px solid var(--border-md);
      box-shadow: 0 -1px 0 rgba(196,154,26,0.06), 0 -24px 60px rgba(0,0,0,0.45);
    }
    @keyframes ws-slide-up {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #ws-empty { display: none; }

    #ws-panel { display:none; flex:1; flex-direction:column; overflow:visible; position:relative; }
    #ws-panel.open { display:flex; animation: ws-slide-up 0.32s cubic-bezier(0.16,1,0.3,1) both; }

    /* chips row */
    #ws-chips-row {
      position:relative; display:flex; align-items:center; justify-content:center; gap:0;
      padding:10px 44px 8px;
      border-bottom:1px solid var(--border); overflow-x:auto; overflow-y:hidden;
      scrollbar-width:none; flex-shrink:0;
    }
    #ws-chips-row::-webkit-scrollbar { display:none; }
    #ws-sign-label {
      font-family:'DM Mono',monospace; font-size:12px; color:var(--gold-dim);
      white-space:nowrap; margin-right:16px; flex-shrink:0;
      letter-spacing:0.2em; text-transform:uppercase;
    }
    #ws-speak-all {
      position:absolute; left:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--gold-dim);
      font-size:18px; line-height:1; cursor:pointer; padding:4px 6px; border-radius:6px;
      transition:color 0.15s, background 0.15s;
    }
    #ws-speak-all:hover { color:var(--gold); background:var(--gold-faint); }

    /* ── Settings button & panel ─────────────────────────────────────────────── */
    #settings-btn {
      position:fixed; bottom:200px; left:18px; z-index:25;
      background:rgba(12,8,4,0.94); border:1px solid rgba(196,154,26,0.32); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:12px; padding:7px 16px;
      border-radius:20px; cursor:pointer; display:none; letter-spacing:0.08em;
      box-shadow:0 4px 18px rgba(0,0,0,0.4);
      transition:background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    #settings-btn:hover { background:rgba(12,8,4,0.94); border-color:var(--gold); box-shadow:0 4px 20px rgba(196,154,26,0.4); }
    #settings-panel {
      position:fixed; inset:0; z-index:30; background:rgba(8,5,2,0.94);
      display:none; flex-direction:column; align-items:center; justify-content:flex-start;
      padding:40px 20px; overflow-y:auto;
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    }
    #settings-panel.open { display:flex; }
    #settings-inner { width:100%; max-width:480px; }
    #settings-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; padding-bottom:12px; border-bottom:1px solid var(--border); }
    #settings-header h2 { font-family:'Noto Serif JP',serif; font-size:18px; color:var(--gold); font-weight:400; letter-spacing:0.1em; }
    #settings-close {
      background:rgba(255,255,255,0.04); border:1px solid var(--border-md); color:var(--cream-dim);
      font-family:'DM Mono',monospace; font-size:12px; padding:5px 14px; border-radius:20px; cursor:pointer;
      transition:border-color 0.15s, color 0.15s, background 0.15s;
    }
    #settings-close:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-faint); }
    .settings-row { display:flex; align-items:center; gap:16px; padding:14px 0; border-bottom:1px solid var(--border); }
    .settings-row:last-child { border-bottom:none; }
    .settings-label { font-family:'DM Mono',monospace; font-size:12px; color:var(--cream-dim); flex:1; letter-spacing:0.06em; }
    #ws-voice-pick {
      background:var(--gold-faint); border:1px solid var(--border-md); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:12px; padding:5px 10px; border-radius:8px;
      cursor:pointer; max-width:240px; transition:border-color 0.15s;
    }
    #ws-voice-pick:hover { border-color:var(--gold); }

    /* token display */
    .ws-merged-chip {
      font-family:'Noto Serif JP',serif; font-size:21px; color:#cfc0a0;
      display:inline-flex; align-items:flex-end; flex-shrink:0; white-space:nowrap;
      letter-spacing:0.03em; gap:8px;
    }
    .ws-token {
      cursor:pointer; padding:2px 5px; border-radius:6px;
      display:inline-flex; flex-direction:column; align-items:center;
      position:relative;
      transition:color 0.12s, background 0.12s;
      text-decoration:underline; text-underline-offset:6px;
      text-decoration-color:rgba(196,154,26,0.2); text-decoration-thickness:1px;
    }
    /* copy badge — shows on token hover */
    .ws-token-copy-btn {
      display:none; position:absolute; top:-11px; right:-8px;
      background:rgba(9,6,2,0.94); border:1px solid var(--border-md);
      color:var(--gold-dim); font-family:'DM Mono',monospace; font-size:13px;
      padding:3px 8px; border-radius:6px; cursor:pointer; z-index:4;
      letter-spacing:0; line-height:1.5; white-space:nowrap;
      transition:color 0.1s, border-color 0.1s, background 0.1s;
    }
    .ws-token:hover .ws-token-copy-btn { display:block; }
    .ws-token-copy-btn:hover { color:var(--gold); border-color:var(--gold-dim); background:rgba(196,154,26,0.08); }
    .ws-token-copy-btn.flash  { color:var(--jade); border-color:rgba(82,201,142,0.4); }
    .ws-token:hover    { color:var(--cream); background:rgba(196,154,26,0.07); text-decoration-color:rgba(196,154,26,0.4); }
    .ws-token.selected { color:#fff; background:rgba(148,54,24,0.72); border-radius:6px; text-decoration-color:transparent; box-shadow:inset 0 0 0 1px rgba(148,54,24,0.45); }
    .ws-token.done     { color:var(--jade); text-decoration-color:transparent; text-shadow:0 0 14px rgba(82,201,142,0.18); }
    /* ── token input slots ─────────────────────────────────────────────────── */
    /* reading slot — above the kanji */
    .ws-token-reading {
      font-family:'DM Mono',monospace; font-size:12px; color:rgba(196,154,26,0.8);
      letter-spacing:0.05em; min-height:16px; display:flex; align-items:center;
      justify-content:center; width:100%; border-radius:4px; padding:1px 3px;
      text-decoration:none; box-sizing:border-box;
      transition:background 0.1s, border-color 0.1s, min-height 0.15s ease;
    }
    .ws-token-reading.slot-active { min-height:26px; }
    .ws-token-reading.slot-empty {
      border:1px dashed rgba(196,154,26,0.22); cursor:pointer;
    }
    .ws-token-reading.slot-empty:hover {
      border-color:rgba(196,154,26,0.48); background:rgba(196,154,26,0.06);
    }
    /* meaning slot — below the kanji */
    .ws-token-meaning {
      font-family:'DM Mono',monospace; font-size:12px; color:#4aaa78;
      letter-spacing:0.03em; min-height:16px; display:flex; align-items:center;
      justify-content:center; width:100%; border-radius:4px; padding:1px 3px;
      text-decoration:none; box-sizing:border-box;
      transition:background 0.1s, border-color 0.1s, min-height 0.15s ease;
    }
    .ws-token-meaning.slot-active { min-height:26px; }
    .ws-token-meaning.slot-empty {
      border:1px dashed rgba(82,201,142,0.16); cursor:pointer;
    }
    .ws-token-meaning.slot-empty:hover {
      border-color:rgba(82,201,142,0.4); background:rgba(82,201,142,0.05);
    }
    .ws-token-meaning.slot-done { color:var(--jade-dim); }
    .ws-token.done .ws-token-meaning { color:var(--jade-dim); }
    .ws-token-parts    { display:flex; flex-direction:row; gap:1px; align-items:flex-end; }
    .ws-part {
      display:inline-flex; flex-direction:column; align-items:center;
      cursor:pointer; padding:2px 4px; border-radius:5px;
      transition:background 0.12s, color 0.12s; text-decoration:none;
    }
    .ws-part:hover    { background:var(--gold-faint); }
    .ws-part.selected { background:rgba(148,54,24,0.72); color:#fff; }
    .ws-part.done     { color:var(--jade); text-shadow:0 0 14px rgba(82,201,142,0.18); }
    .ws-part-reading {
      font-family:'DM Mono',monospace; font-size:11px; color:rgba(196,154,26,0.72);
      letter-spacing:0.05em; min-height:13px; display:flex; align-items:center;
      justify-content:center; width:100%; border-radius:3px; padding:1px 2px;
      box-sizing:border-box; transition:background 0.1s, min-height 0.15s ease;
    }
    .ws-part-reading.slot-active { min-height:26px; }
    .ws-part-reading.slot-empty { border:1px dashed rgba(196,154,26,0.18); cursor:pointer; }
    .ws-part-reading.slot-empty:hover { border-color:rgba(196,154,26,0.44); background:rgba(196,154,26,0.05); }
    .ws-part-meaning {
      font-family:'DM Mono',monospace; font-size:11px; color:#4aaa78;
      letter-spacing:0.03em; min-height:13px; display:flex; align-items:center;
      justify-content:center; width:100%; border-radius:3px; padding:1px 2px;
      box-sizing:border-box; transition:background 0.1s, min-height 0.15s ease;
    }
    .ws-part-meaning.slot-active { min-height:26px; }
    .ws-part-meaning.slot-empty { border:1px dashed rgba(82,201,142,0.13); cursor:pointer; }
    .ws-part-meaning.slot-empty:hover { border-color:rgba(82,201,142,0.38); background:rgba(82,201,142,0.04); }
    .ws-part-meaning.slot-done { color:var(--jade-dim); }
    .ws-particle { color:rgba(196,154,26,0.48); cursor:default; padding-top:17px; padding-bottom:17px; }

    /* ── inline input (shared; JS moves it into the active slot) ────────────── */
    #ws-input {
      width:100%; min-width:72px;
      background:rgba(255,255,255,0.03); border:1px solid rgba(196,154,26,0.38);
      color:var(--cream); font-family:'DM Mono',monospace; font-size:11px;
      padding:3px 6px; outline:none; border-radius:5px; letter-spacing:0.07em;
      caret-color:var(--gold); transition:border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    #ws-input:focus { border-color:rgba(196,154,26,0.6); background:rgba(196,154,26,0.05); box-shadow:0 0 0 2px rgba(196,154,26,0.07); }
    #ws-input::placeholder { color:#4a3820; letter-spacing:0.05em; }
    #ws-input.correct { border-color:rgba(82,201,142,0.45); background:rgba(82,201,142,0.04); caret-color:var(--jade); }
    @keyframes ws-wrong-flash {
      0%,100% { border-color:rgba(192,57,43,0.5); background:rgba(192,57,43,0.04); }
      40%     { border-color:rgba(192,57,43,0.9); background:rgba(192,57,43,0.18); }
    }
    #ws-input.wrong { animation: ws-wrong-flash 0.18s ease-in-out 2; }

    /* ── bottom bar ─────────────────────────────────────────────────────────── */
    #ws-hint-row {
      display:flex; align-items:center; gap:12px; padding:4px 16px 2px; flex-shrink:0;
    }
    #ws-hint-read { font-family:'DM Mono',monospace; font-size:13px; color:var(--gold); letter-spacing:0.07em; }
    #ws-hint-mean { font-family:'DM Mono',monospace; font-size:13px; color:var(--jade); letter-spacing:0.04em; }
    #ws-bottom-bar { display:flex; align-items:center; gap:10px; padding:3px 16px 8px; flex-shrink:0; }
    #ws-feedback { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.07em; flex:1; min-height:13px; }
    #ws-lookup, #ws-copy-sentence {
      background:var(--gold-faint); border:1px solid var(--border-md); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:11px; padding:4px 12px; border-radius:18px;
      cursor:pointer; white-space:nowrap; flex-shrink:0; letter-spacing:0.07em;
      transition:border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    #ws-lookup:disabled { color:#a07820; border-color:rgba(196,154,26,0.35); background:rgba(196,154,26,0.06); cursor:default; }
    #ws-lookup:not(:disabled):hover { border-color:var(--gold); background:var(--gold-glow); color:#f5c840; box-shadow:0 0 10px rgba(196,154,26,0.18); }
    #ws-lookup-wrap { position:relative; flex-shrink:0; }
    #ws-lookup-bar {
      position:absolute; bottom:0; left:3px; right:3px; height:3px;
      background:var(--gold); border-radius:0 0 18px 18px;
      transform-origin:left center; transition:width 0.95s linear;
      width:0; pointer-events:none;
    }
    #ws-copy-sentence:hover { border-color:var(--gold); background:var(--gold-glow); color:#f5c840; box-shadow:0 0 10px rgba(196,154,26,0.18); }
    #ws-copy-sentence.copied { color:var(--jade); border-color:rgba(82,201,142,0.4); }

    /* ── NPC dialogue ────────────────────────────────────────────────────────── */
    @keyframes dlg-appear {
      from { opacity:0; transform:translateX(-50%) translateY(10px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    #ws-dialogue {
      display:none; flex-direction:column;
      position:fixed; bottom:200px; left:50%; transform:translateX(-50%);
      width:min(500px, calc(100vw - 28px));
      background:rgba(8,5,2,0.96); border:1px solid var(--border-md);
      border-radius:14px; z-index:20; overflow:hidden;
      box-shadow:0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.35), inset 0 1px 0 rgba(196,154,26,0.07);
    }
    #ws-dialogue.open { display:flex; animation:dlg-appear 0.26s cubic-bezier(0.16,1,0.3,1) both; }
    #ws-dlg-header {
      display:flex; align-items:center; gap:10px; padding:10px 16px;
      border-bottom:1px solid var(--border); flex-shrink:0;
      background:rgba(196,154,26,0.04);
    }
    #ws-dlg-avatar { width:26px; height:26px; border-radius:50%; flex-shrink:0; }
    #ws-dlg-name   { font-family:'DM Mono',monospace; font-size:12px; color:var(--gold); flex:1; letter-spacing:0.18em; text-transform:uppercase; }
    #ws-dlg-close  {
      background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--cream-dim);
      font-size:12px; cursor:pointer; padding:3px 9px; border-radius:20px;
      transition:background 0.15s, border-color 0.15s, color 0.15s;
    }
    #ws-dlg-close:hover { background:var(--gold-faint); border-color:var(--gold-dim); color:var(--gold); }
    #ws-dlg-body {
      flex:1; display:flex; flex-direction:column; padding:8px 16px 10px;
      overflow-y:auto; gap:0; max-height:min(320px,44vh);
      scrollbar-width:thin; scrollbar-color:rgba(196,154,26,0.18) transparent;
    }
    #ws-dlg-body::-webkit-scrollbar { width:3px; }
    #ws-dlg-body::-webkit-scrollbar-thumb { background:rgba(196,154,26,0.2); border-radius:2px; }
    .dlg-turn { padding:6px 0; }
    .dlg-turn + .dlg-turn { border-top:1px solid rgba(196,154,26,0.06); margin-top:2px; padding-top:8px; }
    .dlg-turn-player { display:flex; justify-content:flex-end; }
    .dlg-copy-btn {
      display:inline-block; margin-left:8px;
      background:none; border:1px solid rgba(255,255,255,0.35); border-radius:3px;
      font-family:'DM Mono',monospace; font-size:12px;
      color:#ffffff; cursor:pointer; padding:1px 5px;
      transition:border-color 0.15s, background 0.15s; letter-spacing:0.05em;
      vertical-align:middle; opacity:1;
    }
    .dlg-copy-btn:hover { border-color:#fff; background:rgba(255,255,255,0.12); }
    .dlg-turn-player-text {
      font-family:'Noto Serif JP',serif; font-size:14px; color:#b09070;
      background:rgba(196,154,26,0.08); border-radius:10px 10px 3px 10px; padding:6px 12px;
      max-width:85%; line-height:1.5;
    }
    .dlg-npc-jp { font-family:'Noto Serif JP',serif; font-size:17px; color:var(--cream); line-height:1.7; flex-wrap:wrap; display:flex; gap:2px; align-items:baseline; }
    .dlg-npc-en { font-family:'DM Mono',monospace; font-size:12px; color:rgba(184,168,136,0.65); letter-spacing:0.04em; margin-top:2px; display:flex; align-items:center; gap:0; }
    #ws-dlg-thinking { display:none; gap:6px; align-items:center; margin-top:4px; }
    #ws-dlg-thinking.visible { display:flex; }
    #ws-dlg-thinking span { width:5px; height:5px; background:rgba(196,154,26,0.55); border-radius:50%; animation:dlg-pulse 1.4s ease-in-out infinite; }
    #ws-dlg-thinking span:nth-child(2) { animation-delay:0.25s; }
    #ws-dlg-thinking span:nth-child(3) { animation-delay:0.5s; }
    @keyframes dlg-pulse { 0%,80%,100%{transform:scale(0.6);opacity:0.3;} 40%{transform:scale(1);opacity:1;} }
    #ws-dlg-input-row { display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--border); flex-shrink:0; align-items:center; }
    #ws-dlg-input {
      flex:1; background:rgba(255,255,255,0.03); border:1px solid var(--border-md);
      color:var(--cream); font-family:'Noto Serif JP',serif; font-size:14px;
      padding:7px 12px; outline:none; border-radius:8px; caret-color:var(--gold);
      transition:border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    #ws-dlg-input:focus { border-color:rgba(196,154,26,0.48); background:rgba(196,154,26,0.04); box-shadow:0 0 0 3px rgba(196,154,26,0.07); }
    #ws-dlg-input::placeholder { color:rgba(196,154,26,0.32); }
    #ws-dlg-send {
      background:var(--gold-faint); border:1px solid var(--border-md);
      color:var(--gold); font-family:'DM Mono',monospace; font-size:15px;
      width:34px; height:34px; border-radius:50%; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.15s, border-color 0.15s, color 0.15s, box-shadow 0.15s;
    }
    #ws-dlg-send:hover    { background:var(--gold-glow); border-color:var(--gold); color:#f0c040; box-shadow:0 0 10px rgba(196,154,26,0.2); }
    #ws-dlg-send:disabled { opacity:0.2; cursor:default; }
    .dlg-word {
      cursor:grab; user-select:none; border-radius:4px; padding:0 2px;
      transition:background 0.1s, color 0.1s;
    }
    .dlg-word:hover { background:rgba(196,154,26,0.11); }
    .dlg-word.active { background:rgba(196,154,26,0.19); }
    .dlg-word.drag-src { opacity:0.4; }
    .dlg-word.done { color:var(--jade); text-shadow:0 0 14px rgba(82,201,142,0.18); }
    .dlg-word.done:hover { background:rgba(82,201,142,0.07); }
    .ws-token.drag-src { opacity:0.4; }
    #ws-dlg-input.drag-over { border-color:rgba(196,154,26,0.55); background:rgba(196,154,26,0.05); }

    /* ── Vocab button & panel ────────────────────────────────────────────────── */
    #vocab-btn {
      position:fixed; bottom:240px; left:18px; z-index:25;
      background:rgba(12,8,4,0.94); border:1px solid rgba(196,154,26,0.32); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:12px; padding:7px 16px;
      border-radius:20px; cursor:pointer; display:none; letter-spacing:0.08em;
      box-shadow:0 4px 18px rgba(0,0,0,0.4);
      transition:background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    #vocab-btn:hover { background:rgba(12,8,4,0.94); border-color:var(--gold); box-shadow:0 4px 20px rgba(196,154,26,0.4); }
    #vocab-panel {
      position:fixed; top:0; left:0; bottom:0; width:340px; z-index:30;
      background:rgba(8,5,2,0.97); border-right:1px solid var(--border);
      display:none; flex-direction:column; overflow:hidden;
      transition: bottom 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    body:has(#ws-panel.open) #vocab-panel { bottom: 190px; }
    #vocab-panel.open { display:flex; }
    #vocab-inner { flex:1; overflow-y:auto; padding:16px; }
    #vocab-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; padding:16px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
    #vocab-header h2 { font-family:'Noto Serif JP',serif; font-size:18px; color:var(--gold); font-weight:400; letter-spacing:0.1em; }
    #vocab-close {
      background:rgba(255,255,255,0.04); border:1px solid var(--border-md); color:var(--cream-dim);
      font-family:'DM Mono',monospace; font-size:12px; padding:5px 14px; border-radius:20px; cursor:pointer;
      transition:border-color 0.15s, color 0.15s, background 0.15s;
    }
    #vocab-close:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-faint); }
    .vocab-sign-header { font-family:'Noto Serif JP',serif; font-size:13px; color:#8a6838; margin:20px 0 6px; letter-spacing:0.05em; }
    .vocab-sign-header:first-child { margin-top:0; }
    .vocab-row {
      display:grid; grid-template-columns:60px 1fr 1fr; gap:8px; align-items:baseline;
      padding:7px 8px; border-radius:7px; margin-bottom:1px; transition:background 0.1s;
    }
    .vocab-row:hover { background:rgba(196,154,26,0.06); }
    .vocab-jp      { font-family:'Noto Serif JP',serif; font-size:18px; color:var(--cream); }
    .vocab-reading { font-family:'DM Mono',monospace; font-size:12px; color:var(--gold); }
    .vocab-reading.locked { color:#302818; }
    .vocab-meaning { font-family:'DM Mono',monospace; font-size:12px; color:var(--jade); }
    .vocab-meaning.locked { color:#1a3228; }
    #vocab-empty { font-size:12px; color:#444; text-align:center; margin-top:40px; }

    /* ── Lang button ─────────────────────────────────────────────────────────── */
    #lang-btn {
      position: fixed; top: 10px; right: 10px; z-index: 100;
      background: rgba(12,8,4,0.88); border: 1px solid rgba(196,154,26,0.26); color: var(--cream-dim);
      font-family: 'DM Mono', monospace; font-size: 12px;
      padding: 5px 14px; cursor: pointer; letter-spacing: 0.08em; border-radius: 20px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    #lang-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-faint); }
  </style>
</head>
<body>

  </div>
  <div id="ws-dlg-input-row">

    <button id="ws-dlg-send">→</button>
  </div>
</div>
<div id="workspace">
  <div id="ws-empty">walk up to a sign and press E · talk to characters to practice Japanese</div>
  <div id="ws-panel">

  </div>
</div>

<!-- Teaching language tracker (must load first) -->

<!-- Content -->

<!-- Engine (top-down) -->
<script src="engine/tiles.js"></script>
<script src="engine/tiles-labeler.js" onerror="void 0"></script>
<script src="engine/maps.js"></script>
<script src="engine/sim2d.js"></script>
<script src="engine/render2d.js"></script>
<script src="engine/input2d.js"></script>

<script>
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      const ra=Array.isArray(r)?r:[r,r,r,r];
      const[tl,tr,br,bl]=ra.length===4?ra:[ra[0],ra[0],ra[0],ra[0]];
      this.moveTo(x+tl,y); this.lineTo(x+w-tr,y);
      this.quadraticCurveTo(x+w,y,x+w,y+tr); this.lineTo(x+w,y+h-br);
      this.quadraticCurveTo(x+w,y+h,x+w-br,y+h); this.lineTo(x+bl,y+h);
      this.quadraticCurveTo(x,y+h,x,y+h-bl); this.lineTo(x,y+tl);
      this.quadraticCurveTo(x,y,x+tl,y); this.closePath(); return this;
    };
  }

  const WORD_PROGRESS = (() => {
    const KEY_PREFIX = "library-slice-progress-v1";
    function _key() { return KEY_PREFIX + '-' + LANG.current; }
    let _data = {};
    try { _data = JSON.parse(localStorage.getItem(_key()) || "{}"); } catch {}
    function _flush() { try { localStorage.setItem(_key(), JSON.stringify(_data)); } catch {} }
    return {
      getSign(id) { return _data[id] || {}; },
      getAll()    { return _data; },
      unlock(id, idx, key) {
        _data[id] = _data[id] || {}; _data[id][idx] = _data[id][idx] || {};
        _data[id][idx][key] = true; _flush();
      },
      unlock_part(id, tok_idx, part_idx, key) {
        const k = `${tok_idx}p${part_idx}`;
        _data[id] = _data[id] || {}; _data[id][k] = _data[id][k] || {};
        _data[id][k][key] = true; _flush();
      },
      reload() {
        try { _data = JSON.parse(localStorage.getItem(_key()) || "{}"); } catch { _data = {}; }
      }
    };
  })();

  const NPC_VOCAB = (() => {
    const KEY = 'library-slice-npc-vocab-v1';
    let _entries = [];
    try { _entries = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch {}
    function _flush() { try { localStorage.setItem(KEY, JSON.stringify(_entries)); } catch {} }
    return {
      getAll() { return _entries; },
      add(token, key) {
        let e = _entries.find(x => x.text === token.text);
        if (!e) { e = {text:token.text, reading:'', meaning:'', romaji:false, meaning_unlocked:false}; _entries.push(e); }
        if (token.romaji && !e.reading) e.reading = token.romaji;
        if (token.meaning && !e.meaning) e.meaning = token.meaning.split('/')[0].trim();
        if (key === 'romaji') e.romaji = true;
        if (key === 'meaning') e.meaning_unlocked = true;
        _flush();
      }
    };
  })();

  const canvas = document.getElementById("game");

  const SoundFX = (() => {
    let _ctx = null;
    function _ac() {
      if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
      return _ctx;
    }
    function _tone(freq, dur, vol, delay, type) {
      try {
        const ac = _ac();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
        gain.gain.setValueAtTime(vol, ac.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + delay + dur);
        osc.start(ac.currentTime + delay);
        osc.stop(ac.currentTime + delay + dur + 0.01);
      } catch(e) {}
    }
    return {
      ding()  { _tone(880, 0.18, 0.2, 0); },
      chime() {
        [[523, 0], [659, 0.1], [784, 0.2], [1047, 0.32]].forEach(([f, d]) => _tone(f, 0.4, 0.18, d));
      }
    };
  })();

  const WorkspacePanel = (() => {
    const panel_el  = document.getElementById("ws-panel");
    const ws_el     = document.getElementById("workspace");
    const empty_el  = document.getElementById("ws-empty");
    const chips_row = document.getElementById("ws-chips-row");
    const lbl_el    = document.getElementById("ws-sign-label");
    const speak_all = document.getElementById("ws-speak-all");
    const voice_pick = document.getElementById("ws-voice-pick");
    const inp       = document.getElementById("ws-input");
    inp.addEventListener("mousedown", e => e.stopPropagation());
    inp.addEventListener("click",     e => e.stopPropagation());
    const fb        = document.getElementById("ws-feedback");
    const hint_read = document.getElementById("ws-hint-read");
    const hint_mean = document.getElementById("ws-hint-mean");
    const lkp       = document.getElementById("ws-lookup");
    const lkp_bar   = document.getElementById("ws-lookup-bar");
    const copy_btn  = document.getElementById("ws-copy-sentence");

    function _show_hint(reading, meaning) {
      hint_read.textContent = reading || '';
      hint_mean.textContent = meaning  || '';
    }
    function _clear_hint() {
      hint_read.textContent=''; hint_mean.textContent='';
    }

    let cur_sign_id = null, cur_word_idx = null, cur_part_idx = null, word_results = {}, _lkp_timer = null, _checking = false;
    let _active_field = null; // 'romaji' | 'meaning'
    let _hint_by_key = {}; // res_key → {reading, meaning} — persists lookup results per word
    let _npc_defs = {};

    function _copy_text(text, flashEl) {
      if (!text) return;
      navigator.clipboard.writeText(text).catch(() => {
        const ta=document.createElement("textarea"); ta.value=text;
        ta.style.cssText="position:fixed;top:-999px;left:-999px;opacity:0;";
        document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      });
      if (flashEl) {
        flashEl.classList.add("flash","ws-popup-copied");
        setTimeout(() => flashEl.classList.remove("flash","ws-popup-copied"), 900);
      }
    }

    function _fmt_read(furi, rom) {
      const f=furi||'', r=rom||'';
      return (f && r && f!==r) ? `${f}  [${r}]` : (f||r);
    }

    const OLLAMA_URL = "/ollama/api/chat", OLLAMA_MODEL = "llama3.1:8b";

    async function _llama_judge_meaning(token, player_input, on_status) {
      const ctl = new AbortController();
      const tid = setTimeout(() => ctl.abort(), 30000);
      try {
        const lang = LANG.current === 'ko' ? 'Korean' : 'Japanese';
        on_status?.('asking LLM…');
        const res = await fetch(OLLAMA_URL, { method:"POST", headers:{"Content-Type":"application/json"},
          signal: ctl.signal,
          body: JSON.stringify({ model:OLLAMA_MODEL, messages:[{role:"user", content:
            `${lang} word: ${token.text}\nAccepted meanings: ${token.meaning}\nStudent answer: ${player_input}\nIs the student's answer close enough in meaning to be marked correct? Reply yes or no only.`
          }], stream:false, options:{temperature:0, num_predict:5} }) });
        clearTimeout(tid);
        if (!res.ok) { on_status?.(`LLM error: HTTP ${res.status}`); return false; }
        const reply = (await res.json()).message?.content?.trim() || '';
        const ok = reply.toLowerCase().startsWith("yes");
        on_status?.(`LLM: "${reply}" → ${ok ? '✓ correct' : '✗ wrong'}`);
        return ok;
      } catch(e) {
        clearTimeout(tid);
        on_status?.(e.name === 'AbortError' ? 'LLM timed out (30s)' : `LLM error: ${e.message}`);
        return false;
      }
    }

    function _normRomaji(s) { return s.toLowerCase().replace(/[-\s]+/g,"").replace(/ou/g,"o").replace(/uu/g,"u").replace(/aa/g,"a"); }
    function _isNumericToken(token) { return /^\d+$/.test(token.text); }
    function _checkWhat(word, raw, res) {
      const val=raw.trim().toLowerCase(), val_ns=val.replace(/\s+/g,"");
      if (!val) return null;
      if (!res.romaji) {
        if (word.romaji && _normRomaji(val_ns)===_normRomaji(word.romaji)) return "romaji";
        if (val_ns===(word.furigana||"").toLowerCase()) return "romaji";
      }
      if (!res.meaning) {
        const norm=s=>s.replace(/[?!.,]+$/,"");
        const parts=word.meaning.replace(/\(.*?\)/g,"").toLowerCase().split(/\s*[/,]\s*/).map(p=>norm(p.trim()).replace(/^to\s+/,'')).filter(Boolean);
        const v=norm(val), v_ns=norm(val_ns);
        if (parts.some(p=>v===p||v_ns===p.replace(/\s+/g,""))) return "meaning";
      }
      return null;
    }

    function _update_lkp() {
      const cd=sim.state.phone.lookup_cooldown;
      lkp.disabled=cd>0||cur_word_idx==null;
      lkp.textContent=cd>0?`📱 ${cd}s`:'📱 look up';
      lkp_bar.style.width=cd>0?`${(cd/60)*100}%`:'0%';
    }
    function _start_lkp_timer() {
      if (_lkp_timer) return;
      _lkp_timer=setInterval(()=>{ _update_lkp(); if(sim.state.phone.lookup_cooldown<=0){clearInterval(_lkp_timer);_lkp_timer=null;} },1000);
    }

    function _render_chips() {
      // Rescue inp from being removed along with old chips
      panel_el.appendChild(inp); inp.style.display='none';
      [...chips_row.querySelectorAll(".ws-merged-chip")].forEach(c=>c.remove());
      const merged=document.createElement("div"); merged.className="ws-merged-chip";
      const sign=SIGN_BY_ID[cur_sign_id]; if (!sign) return;
      const tokens=sign.tokens||[];
      const full=(sign.japanese||tokens.map(t=>t.text).join('')).replace(/\n/g,' ');
      let pos=0, tok_idx=0;

      // Helper: place inp in a slot (reading or meaning)
      function _placeInp(slotEl) {
        slotEl.appendChild(inp);
        inp.style.display='';
      }

      while (pos<=full.length && tok_idx<tokens.length) {
        const token=tokens[tok_idx];
        const found=full.indexOf(token.text, pos);
        if (found===-1) { tok_idx++; continue; }
        if (found>pos) {
          const p=document.createElement("span"); p.className="ws-particle";
          p.textContent=full.slice(pos,found); merged.appendChild(p);
        }
        const span=document.createElement("span"); span.className="ws-token";
        const res=word_results[tok_idx]||{};
        const hasParts=token.parts&&token.parts.length>0;
        const isDone=hasParts
          ? token.parts.every((_,pi)=>{ const r=word_results[`${tok_idx}p${pi}`]||{}; return r.romaji&&r.meaning; })
          : (res.romaji&&res.meaning);
        if (isDone) span.classList.add("done");
        const _i=tok_idx;

        if (!hasParts) {
          if (tok_idx===cur_word_idx&&cur_part_idx==null) span.classList.add("selected");

          // — reading slot (above kanji) —
          const rspan=document.createElement("span"); rspan.className="ws-token-reading";
          if (res.romaji&&(token.romaji||token.furigana)) {
            rspan.textContent=token.romaji||token.furigana;
          } else if (tok_idx===cur_word_idx&&cur_part_idx==null&&_active_field==='romaji') {
            rspan.classList.add("slot-active"); _placeInp(rspan);
          } else if (!res.romaji) {
            rspan.classList.add("slot-empty");
            rspan.addEventListener("click",e=>{ e.stopPropagation(); _select(_i,null,'romaji'); });
          }
          span.appendChild(rspan);

          // — kanji text —
          const textNode=document.createElement("span"); textNode.textContent=token.text;
          span.appendChild(textNode);

          // — meaning slot (below kanji) —
          const mspan=document.createElement("span"); mspan.className="ws-token-meaning";
          if (res.meaning&&token.meaning) {
            const raw=Array.isArray(token.meaning)?token.meaning[0]:token.meaning;
            mspan.textContent=raw.split("/")[0].trim(); mspan.classList.add("slot-done");
          } else if (tok_idx===cur_word_idx&&cur_part_idx==null&&_active_field==='meaning') {
            mspan.classList.add("slot-active"); _placeInp(mspan);
          } else if (!res.meaning) {
            mspan.classList.add("slot-empty");
            mspan.addEventListener("click",e=>{ e.stopPropagation(); _select(_i,null,'meaning'); });
          }
          span.appendChild(mspan);

        } else {
          // — parts token: each part gets its own reading + meaning slots —
          const partsRow=document.createElement("span"); partsRow.className="ws-token-parts";
          token.parts.forEach((part,pi)=>{
            const pres=word_results[`${tok_idx}p${pi}`]||{};
            const pspan=document.createElement("span"); pspan.className="ws-part";
            if (pres.romaji&&pres.meaning) pspan.classList.add("done");
            if (tok_idx===cur_word_idx&&pi===cur_part_idx) pspan.classList.add("selected");
            const _pi=pi;

            // part reading slot
            const prspan=document.createElement("span"); prspan.className="ws-part-reading";
            if (pres.romaji&&(part.romaji||part.furigana)) {
              prspan.textContent=part.romaji||part.furigana||'';
            } else if (tok_idx===cur_word_idx&&pi===cur_part_idx&&_active_field==='romaji') {
              prspan.classList.add("slot-active"); _placeInp(prspan);
            } else if (!pres.romaji) {
              prspan.classList.add("slot-empty");
              prspan.addEventListener("click",e=>{ e.stopPropagation(); _select(_i,_pi,'romaji'); });
            }
            pspan.appendChild(prspan);

            // part kanji text
            const ptspan=document.createElement("span"); ptspan.textContent=part.text;
            pspan.appendChild(ptspan);

            // part meaning slot
            const pmspan=document.createElement("span"); pmspan.className="ws-part-meaning";
            if (pres.meaning&&part.meaning) {
              const raw=Array.isArray(part.meaning)?part.meaning[0]:part.meaning;
              pmspan.textContent=raw.split("/")[0].trim(); pmspan.classList.add("slot-done");
            } else if (tok_idx===cur_word_idx&&pi===cur_part_idx&&_active_field==='meaning') {
              pmspan.classList.add("slot-active"); _placeInp(pmspan);
            } else if (!pres.meaning) {
              pmspan.classList.add("slot-empty");
              pmspan.addEventListener("click",e=>{ e.stopPropagation(); _select(_i,_pi,'meaning'); });
            }
            pspan.appendChild(pmspan);

            pspan.addEventListener("click",e=>{ e.stopPropagation(); _select(_i,_pi); });
            partsRow.appendChild(pspan);
          });
          span.appendChild(partsRow);

          // compound meaning — read-only, shown when all parts done
          const cmspan=document.createElement("span"); cmspan.className="ws-token-meaning slot-done";
          if (isDone&&token.meaning) {
            const raw=Array.isArray(token.meaning)?token.meaning[0]:token.meaning;
            cmspan.textContent=raw.split("/")[0].trim();
          }
          span.appendChild(cmspan);
        }

        // copy badge
        const copyBtn=document.createElement("span"); copyBtn.className="ws-token-copy-btn"; copyBtn.textContent="⎘";
        copyBtn.title="copy"; copyBtn.addEventListener("click",e=>{
          e.stopPropagation(); _copy_text(token.text, copyBtn);
        });
        span.appendChild(copyBtn);
        span.draggable=true;
        span.addEventListener("dragstart",e=>{ span.classList.add("drag-src"); e.dataTransfer.setData("dlg-word",token.text); e.dataTransfer.effectAllowed="copy"; });
        span.addEventListener("dragend",()=>span.classList.remove("drag-src"));
        span.addEventListener("click",()=>{
          if (hasParts) {
            // find first undone part + field
            let fi=-1, ff='romaji';
            for (let pi=0;pi<token.parts.length;pi++) {
              const r=word_results[`${_i}p${pi}`]||{};
              if (!r.romaji){fi=pi;ff='romaji';break;}
              if (!r.meaning){fi=pi;ff='meaning';break;}
            }
            _select(_i, fi>=0?fi:0, ff);
          } else {
            const r=word_results[_i]||{};
            _select(_i, null, !r.romaji?'romaji':'meaning');
          }
        });
        merged.appendChild(span);
        pos=found+token.text.length; tok_idx++;
      }
      if (pos<full.length) {
        const p=document.createElement("span"); p.className="ws-particle";
        p.textContent=full.slice(pos); merged.appendChild(p);
      }
      chips_row.appendChild(merged);
    }

    const _KO_FALLBACK = {
      // ── greetings & conversation ──────────────────────────────────────────
      '안녕하세요':{reading:'annyeonghaseyo',   meaning:'hello (formal)'},
      '안녕':      {reading:'annyeong',         meaning:'hi / bye (informal)'},
      '어서':      {reading:'eoseo',            meaning:'come / quickly'},
      '오세요':    {reading:'oseyo',            meaning:'please come'},

    // Compound verb endings listed longest-first so the greedy match works correctly
    const _KO_PARTICLES = [
      '하시려면','하려면','하시겠어요','하겠습니다','하겠어요','했습니다','했어요',
      '하십시오','하시면','하세요','합니까','합니다','해요','해서','하면','하다','하고',
      '시려면','겠습니다','겠어요','습니다','었어요','았어요','으면','려면',
      '에서','에게','으로','까지','부터','이라','라고','이나','으나','이고','이면',
      '를','을','가','이','는','은','에','로','와','과','도','만','의',
    ];
    const _KO_NO_SPLIT = new Set([
      '안녕하세요','안녕하십시오','감사합니다','감사해요','죄송합니다','죄송해요',
      '괜찮아요','괜찮습니다','실례합니다','어서오세요','잘부탁합니다',
    ]);
    function _ko_base_raw(w) {
      for (const p of _KO_PARTICLES) {
        if (w.length > p.length && w.endsWith(p)) return w.slice(0, -p.length);
      }
      return null;
    }
    function _ko_base(w) {
      if (_KO_NO_SPLIT.has(w)) return null;
      return _ko_base_raw(w);
    }
    function _ko_split_words(words, defs) {
      const out_words = [], out_defs = [];
      words.forEach((w, i) => {
        const clean = w.replace(/[.!?,;:…]+$/, '');
        const punct = w.slice(clean.length);
        if (_KO_NO_SPLIT.has(clean)) {
          // Keep as one word; attach sub-parts for interactive breakdown
          const base = _ko_base_raw(clean);
          out_words.push(w);
          out_defs.push({
            text: w, reading: '', meaning: '',
            parts: base ? [
              {text: base,                    reading: '', meaning: ''},
              {text: clean.slice(base.length), reading: '', meaning: ''}
            ] : null
          });
        } else {
          const base = _ko_base_raw(clean);
          if (base) {
            const suffix = clean.slice(base.length) + punct;
            out_words.push(base, suffix);
            out_defs.push(
              {text: base,   reading: '', meaning: ''},
              {text: suffix, reading: '', meaning: ''}
            );
          } else {
            out_words.push(w);
            out_defs.push(defs ? (defs[i] || {text:w, reading:'', meaning:''}) : {text:w, reading:'', meaning:''});
          }
        }
      });
      return {words: out_words, defs: out_defs};
    }
    function _sign_lookup(text) {
      for (const id of Object.keys(SIGN_BY_ID)) {
        const sign = SIGN_BY_ID[id]; if (!sign.tokens) continue;
        for (const tok of sign.tokens) {
          if (tok.text === text && (tok.romaji||tok.furigana) && tok.meaning)
            return {reading: tok.romaji||tok.furigana, meaning: tok.meaning};
        }
      }
      return null;
    }
    async function _npc_lookup(word) {
      const clean=word.replace(/^[.!?,\s]+|[.!?,\s]+$/g,'');
      if (LANG.current==='ko'&&_KO_FALLBACK[clean]) { _npc_defs[clean]=_KO_FALLBACK[clean]; return _KO_FALLBACK[clean]; }
      if (_npc_defs[clean]?.reading) return _npc_defs[clean];
      if (LANG.current==='ko') {
        const base=_ko_base(clean);
        if (base&&_KO_FALLBACK[base])  { const d=_KO_FALLBACK[base];  _npc_defs[clean]=d; return d; }
        const sd=_sign_lookup(clean);  if (sd) { _npc_defs[clean]=sd; return sd; }
        if (base) { const sb=_sign_lookup(base); if (sb) { _npc_defs[clean]=sb; return sb; } }
      } else {
        const sd=_sign_lookup(clean);  if (sd) { _npc_defs[clean]=sd; return sd; }
      }
      const lang_name = LANG.current==='ko'?'Korean':'Japanese';
      try {
        const ctl=new AbortController(); const tid=setTimeout(()=>ctl.abort(),65000);
        const res=await fetch(OLLAMA_URL,{method:'POST',headers:{'Content-Type':'application/json'},signal:ctl.signal,
          body:JSON.stringify({model:OLLAMA_MODEL,keep_alive:'10m',messages:[{role:'user',content:
            `${lang_name} word: "${clean}"\nReply ONLY with JSON: {"reading":"romanization","meaning":"English meaning"}`
          }],stream:false,options:{temperature:0,num_predict:40}})});
        clearTimeout(tid);
        if (!res.ok) throw new Error();
        const raw=(await res.json()).message?.content?.trim()||'';
        let p=null; try{p=JSON.parse(raw);}catch{}
        if (!p){const m=raw.match(/\{[\s\S]*\}/);if(m)try{p=JSON.parse(m[0]);}catch{}}
        const reading=p?.reading||p?.romanization||p?.pronunciation||'';
        const meaning=p?.meaning||p?.translation||p?.english||'';
        if (reading||meaning){const def={reading,meaning};_npc_defs[clean]=def;return def;}
      } catch {}
      return null;
    }

    function _populate_voices() {
      const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ko'));
      voice_pick.innerHTML = '';
      const googleIdx = voices.findIndex(v => v.name.toLowerCase().includes('google'));
      voices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = v.name;
        if (i === (googleIdx >= 0 ? googleIdx : 0)) opt.selected = true;
        voice_pick.appendChild(opt);
      });
    }
    _populate_voices();
    speechSynthesis.addEventListener('voiceschanged', _populate_voices);

    function _speak(text) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9;
      if (LANG.current === 'ko') {
        u.lang = 'ko-KR';
        const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ko'));
        const chosen = voices[parseInt(voice_pick.value)];
        if (chosen) u.voice = chosen;
      } else {
        u.lang = 'ja-JP';
      }
      speechSynthesis.speak(u);
    }

    function _select(idx, part_idx=null, field=null) {
      cur_word_idx=idx; cur_part_idx=part_idx;
      const sign=SIGN_BY_ID[cur_sign_id], token=sign.tokens[idx];
      const active=(part_idx!=null&&token.parts)?token.parts[part_idx]:token;
      const res_key=part_idx!=null?`${idx}p${part_idx}`:idx;
      const res=word_results[res_key]||{};
      if (!field) field=!res.romaji?'romaji':'meaning';
      _active_field=field;
      if (LANG.current==='ko') _speak(active.text);
      inp.placeholder=field==='meaning'?'english meaning…':'';
      inp.value=""; inp.className=""; fb.textContent=""; fb.style.color="";
      const _res_key_sel=part_idx!=null?`${idx}p${part_idx}`:idx;
      const _saved_hint=_hint_by_key[_res_key_sel];
      if (_saved_hint) _show_hint(_saved_hint.reading, _saved_hint.meaning); else _clear_hint();
      _render_chips();
      _update_lkp();
      if (inp.parentElement!==panel_el) inp.focus();
      if (cur_sign_id==='__npc__') {
        if (part_idx!=null&&token.parts) {
          const part=token.parts[part_idx];
          if (!part.romaji&&!part.furigana) {
            _npc_lookup(part.text).then(def=>{
              if (def&&cur_word_idx===idx&&cur_part_idx===part_idx&&cur_sign_id==='__npc__') {
                part.romaji=def.reading; part.furigana=def.reading; part.meaning=def.meaning;
              }
            });
          }
        } else if (part_idx==null&&!token.parts&&!token.romaji&&!token.furigana) {
          _npc_lookup(token.text).then(def=>{
            if (def&&cur_word_idx===idx&&cur_sign_id==='__npc__') {
              token.romaji=def.reading; token.furigana=def.reading; token.meaning=def.meaning;
            }
          });
        }
      }
    }

    function open_npc_sentence(jp_text, words, clicked_idx, npc_label, token_defs) {
      const tokens=words.map((text,i)=>{
        const td=token_defs&&token_defs[i];
        if (td?.reading) {
          const clean=text.replace(/^[.!?,\s]+|[.!?,\s]+$/g,'');
          if (clean) _npc_defs[clean]={reading:td.reading,meaning:td.meaning||''};
        }
        const tok={text, furigana:td?.reading||'', romaji:td?.reading||'', meaning:td?.meaning||''};
        if (td?.parts) tok.parts=td.parts;
        return tok;
      });
      SIGN_BY_ID['__npc__']={id:'__npc__', label:npc_label||'', japanese:jp_text||words.join(''), tokens};
      open('__npc__');
      const _ct=tokens[clicked_idx];
      if (_ct?.parts?.length) {
        let fi=0,ff='romaji';
        for (let pi=0;pi<_ct.parts.length;pi++){const r=word_results[`${clicked_idx}p${pi}`]||{};if(!r.romaji){fi=pi;ff='romaji';break;}if(!r.meaning){fi=pi;ff='meaning';break;}}
        _select(clicked_idx,fi,ff);
      } else { _select(clicked_idx); }
    }

    function open(sign_id) {
      chips_row.style.display='';
      const sign=SIGN_BY_ID[sign_id]; if (!sign) return;
      cur_sign_id=sign_id; cur_word_idx=null; cur_part_idx=null; _active_field=null; _hint_by_key={};
      const saved=sign_id==='__npc__'?{}:WORD_PROGRESS.getSign(sign_id); word_results={};
      Object.keys(saved).forEach(k=>{
        if (/^\d+$/.test(k)) word_results[+k]={...saved[k]};
        else word_results[k]={...saved[k]};
      });
      sign.tokens.forEach((tok,i)=>{
        if (_isNumericToken(tok)) { word_results[i]=word_results[i]||{}; word_results[i].meaning=true; }
        if (tok.parts) tok.parts.forEach((part,pi)=>{
          if (_isNumericToken(part)) { const pk=`${i}p${pi}`; word_results[pk]=word_results[pk]||{}; word_results[pk].meaning=true; }
        });
      });
      if (sign_id==='__npc__') {
        const vocab=NPC_VOCAB.getAll(), sign=SIGN_BY_ID['__npc__'];
        if (sign) sign.tokens.forEach((tok,i)=>{
          if (tok.parts) {
            tok.parts.forEach((part,pi)=>{
              const e=vocab.find(v=>v.text===part.text);
              if (e) {
                const pk=`${i}p${pi}`; word_results[pk]={};
                if (e.romaji)          { word_results[pk].romaji=true; part.romaji=e.reading; part.furigana=e.reading; }
                if (e.meaning_unlocked){ word_results[pk].meaning=true; part.meaning=e.meaning; }
              }
            });
          } else {
            const e=vocab.find(v=>v.text===tok.text);
            if (e) {
              word_results[i]={};
              if (e.romaji)          { word_results[i].romaji=true; tok.romaji=e.reading; tok.furigana=e.reading; }
              if (e.meaning_unlocked){ word_results[i].meaning=true; tok.meaning=e.meaning; }
            }
          }
        });
      }
      lbl_el.textContent=sign.label||'';
      const koMode=LANG.current==='ko';
      speak_all.style.display=koMode?'':'none';
      fb.textContent=""; fb.style.color=""; hint_read.textContent=""; hint_mean.textContent="";
      empty_el.style.display="none";
      if (sign_id!=='__npc__') document.getElementById("ws-dialogue").classList.remove("open");
      panel_el.classList.add("open"); ws_el.classList.add("active");
      if (sign_id!=='__npc__') renderer.sign_panel={sign_id};
      _render_chips(); _update_lkp();
    }

    function clear() {
      chips_row.style.display='';
      cur_sign_id=null; cur_word_idx=null; cur_part_idx=null; _active_field=null;
      panel_el.classList.remove("open"); ws_el.classList.remove("active");
      empty_el.style.display="";
      renderer.sign_panel=null;
    }

    function _accept(token, matched, res) {
      res[matched]=true;
      if (cur_sign_id!=='__npc__') {
        if (cur_part_idx!=null) WORD_PROGRESS.unlock_part(cur_sign_id,cur_word_idx,cur_part_idx,matched);
        else WORD_PROGRESS.unlock(cur_sign_id,cur_word_idx,matched);
      } else NPC_VOCAB.add(token, matched);
      // Advance to meaning slot if reading was just answered
      if (matched==='romaji'&&!res.meaning) {
        _active_field='meaning';
        inp.placeholder='';
      }
      inp.value=""; inp.className="correct";
      setTimeout(()=>{ inp.className=""; },500);
      fb.textContent=""; fb.style.color="";
      _render_chips();
      if (cur_sign_id==='__npc__') DialoguePanel.refreshWordColors();
      const sign=SIGN_BY_ID[cur_sign_id];
      const allDone=sign&&sign.tokens.every((t,i)=>{
        if (t.parts&&t.parts.length) return t.parts.every((_,pi)=>{ const r=word_results[`${i}p${pi}`]||{}; return r.romaji&&r.meaning; });
        const r=word_results[i]||{}; return r.romaji&&r.meaning;
      });
      if (allDone) SoundFX.chime(); else { SoundFX.ding(); if (inp.parentElement!==panel_el) inp.focus(); }
    }

    inp.addEventListener("keydown", async e => {
      if (e.key==="Escape"){inp.blur();return;}
      if (e.key!=="Enter") return;
      if (cur_sign_id==null||cur_word_idx==null||_checking) return;
      const sign=SIGN_BY_ID[cur_sign_id], token=sign.tokens[cur_word_idx];
      const active=(cur_part_idx!=null&&token.parts)?token.parts[cur_part_idx]:token;
      const res_key=cur_part_idx!=null?`${cur_word_idx}p${cur_part_idx}`:cur_word_idx;
      word_results[res_key]=word_results[res_key]||{};
      const res=word_results[res_key], raw=inp.value;
      const matched=_checkWhat(active,raw,res);
      if (matched) { _accept(active,matched,res); }
      else if (res.romaji&&!res.meaning) {
        _checking=true; fb.textContent="checking…"; fb.style.color="#b8860b";
        const ok=await _llama_judge_meaning(active,raw.trim(), msg=>{ fb.textContent=msg; fb.style.color="#b8860b"; });
        _checking=false;
        if (ok){ inp.value=""; _accept(active,"meaning",res); }
        else { inp.className="wrong"; setTimeout(()=>{inp.className="";},700); inp.focus(); }
      } else if (cur_sign_id==='__npc__'&&cur_part_idx==null&&!token.romaji&&!token.furigana&&!token.meaning) {
        _checking=true; fb.textContent='looking up…'; fb.style.color='#b8860b';
        const def=await _npc_lookup(token.text);
        _checking=false;
        if (def) { token.romaji=def.reading; token.furigana=def.reading; token.meaning=def.meaning; }
        const m2=_checkWhat(token,raw,res);
        if (m2) { _accept(token,m2,res); }
        else { inp.className="wrong"; setTimeout(()=>{inp.className="";},700); inp.focus(); }
      } else { inp.className="wrong"; setTimeout(()=>{inp.className="";},700); }
    });

    speak_all.addEventListener("click", () => {
      const sign = SIGN_BY_ID[cur_sign_id]; if (!sign) return;
      _speak(sign.japanese.replace(/\n/g, ' '));
    });

    let _copy_flash = null;
    copy_btn.addEventListener("click", () => {
      const sign = SIGN_BY_ID[cur_sign_id]; if (!sign) return;
      const tokens = sign.tokens || [];
      const text = (sign.japanese || tokens.map(t => t.text).join('')).replace(/\n/g, ' ');
      _copy_text(text, null);
      copy_btn.textContent = "✓ copied";
      copy_btn.classList.add("copied");
      if (_copy_flash) clearTimeout(_copy_flash);
      _copy_flash = setTimeout(() => {
        copy_btn.textContent = "⎘ copy";
        copy_btn.classList.remove("copied");
        _copy_flash = null;
      }, 1400);
    });

    lkp.addEventListener("click", async () => {
      if (cur_sign_id==null||cur_word_idx==null) return;
      const _token=SIGN_BY_ID[cur_sign_id==='__npc__'?'__npc__':cur_sign_id].tokens[cur_word_idx];
      const active=(cur_part_idx!=null&&_token.parts)?_token.parts[cur_part_idx]:_token;
      const res_key=cur_part_idx!=null?`${cur_word_idx}p${cur_part_idx}`:cur_word_idx;
      word_results[res_key]=word_results[res_key]||{};
      const res=word_results[res_key];
      if (res.romaji&&res.meaning) return;
      if (sim.state.phone.lookup_cooldown>0) return;
      if (cur_sign_id==='__npc__') {
        if ((!_token.romaji&&!_token.furigana)||!_token.meaning) {
          lkp.disabled=true; fb.textContent='looking up…'; fb.style.color='#b8860b';
          const def=await _npc_lookup(_token.text);
          lkp.disabled=false;
          if (def) { if(!_token.romaji)_token.romaji=def.reading; if(!_token.furigana)_token.furigana=def.reading; if(!_token.meaning)_token.meaning=def.meaning; }
        }
        const reading=_token.romaji||_token.furigana;
        const meaning=(_token.meaning||'').split(/\s*[/,]\s*/)[0].trim().replace(/^to\s+/i,'');
        fb.textContent=''; fb.style.color='';
        if (!reading&&!meaning) { fb.textContent='not found'; fb.style.color='#888'; _update_lkp(); return; }
        const _hr=_fmt_read(_token.furigana||reading,reading);
        _hint_by_key[res_key]={reading:_hr, meaning};
        _show_hint(_hr, meaning);
        sim.perform("use_phone_lookup"); _update_lkp(); _start_lkp_timer();
        if (inp.parentElement!==panel_el) inp.focus();
        return;
      }
      // non-NPC: show reading+meaning as hint only — player must still type to get credit
      const reading=active.romaji||active.furigana;
      const meaning=(active.meaning||'').split(/\s*[/,]\s*/)[0].trim().replace(/^to\s+/i,'');
      const _hr2=_fmt_read(active.furigana,reading);
      _hint_by_key[res_key]={reading:_hr2, meaning};
      _show_hint(_hr2, meaning);
      sim.perform("use_phone_lookup"); _update_lkp(); _start_lkp_timer();
      if (inp.parentElement!==panel_el) inp.focus();
    });

    return { open, clear, open_npc_sentence, speak: _speak, prefetch: words => words.forEach(w => _npc_lookup(w)), split_ko_words: _ko_split_words };
  })();

  const sim      = new Sim2D();

  const VocabPanel = (() => {
    const panel=document.getElementById("vocab-panel"), content=document.getElementById("vocab-content");
    const btn=document.getElementById("vocab-btn"), close=document.getElementById("vocab-close");
    function _populate() {

      const dlg_open = () => document.getElementById("ws-dialogue").classList.contains("open");
      function _vocab_jp(text) {

      SIGNS.forEach(sign=>{

          const row=document.createElement("div"); row.className="vocab-row";
          const reading=document.createElement("span"); reading.className="vocab-reading"+(res.romaji?"":" locked");
          reading.textContent=res.romaji?_fmt_read(token.furigana,token.romaji):"not yet unlocked";
          const meaning=document.createElement("span"); meaning.className="vocab-meaning"+(res.meaning?"":" locked");
          meaning.textContent=res.meaning?token.meaning.split("/")[0].trim():"not yet unlocked";
          row.appendChild(_vocab_jp(token.text)); row.appendChild(reading); row.appendChild(meaning); content.appendChild(row); total++;
        });
      });
      const npc_entries = NPC_VOCAB.getAll().filter(e => e.romaji || e.meaning_unlocked);
      if (npc_entries.length) {
        const hdr=document.createElement("div"); hdr.className="vocab-sign-header"; hdr.textContent="会話 — Dialogue"; content.appendChild(hdr);
        npc_entries.forEach(e => {

          reading.textContent=e.romaji&&e.reading?e.reading:"not yet unlocked";
          const meaning=document.createElement("span"); meaning.className="vocab-meaning"+(e.meaning_unlocked?"":" locked");
          meaning.textContent=e.meaning_unlocked&&e.meaning?e.meaning:"not yet unlocked";
          row.appendChild(_vocab_jp(e.text)); row.appendChild(reading); row.appendChild(meaning); content.appendChild(row); total++;
        });
      }
      if (!total){ const e=document.createElement("p"); e.id="vocab-empty"; e.textContent="No words unlocked yet."; content.appendChild(e); }
    }
    function _set_panel_w(w){ window._left_panel_w=w; window.dispatchEvent(new Event('resize')); }
    function open(){ _populate(); panel.classList.add("open"); _set_panel_w(340); }
    function close_panel(){ panel.classList.remove("open"); _set_panel_w(0); }
    btn.addEventListener("click",open); close.addEventListener("click",close_panel);

  const DialoguePanel = (() => {
    const dlg_el=document.getElementById("ws-dialogue"), avatar=document.getElementById("ws-dlg-avatar");
    const name_el=document.getElementById("ws-dlg-name"), body_el=document.getElementById("ws-dlg-body");
    const thinking=document.getElementById("ws-dlg-thinking");
    const inp=document.getElementById("ws-dlg-input"), send_btn=document.getElementById("ws-dlg-send");
    const close_btn=document.getElementById("ws-dlg-close");
    const _lookup_cache = {};

    function _insert_at_cursor(word) {
      const start = inp.selectionStart ?? inp.value.length;
      const end   = inp.selectionEnd   ?? inp.value.length;
      inp.value = inp.value.slice(0, start) + word + inp.value.slice(end);
      inp.selectionStart = inp.selectionEnd = start + word.length;
      inp.focus();
    }

    inp.addEventListener("dragover", e => {
      if (e.dataTransfer.types.includes("dlg-word")) { e.preventDefault(); inp.classList.add("drag-over"); }
    });
    inp.addEventListener("dragleave", () => inp.classList.remove("drag-over"));
    inp.addEventListener("drop", e => {
      const word = e.dataTransfer.getData("dlg-word");
      if (!word) return;
      e.preventDefault(); inp.classList.remove("drag-over");
      _insert_at_cursor(word);
    });

    function _tokenize(text) {
      if (LANG.current === 'ko') {
        return text.replace(/[。、！？「」『』・…]/g,'').split(/\s+/).filter(Boolean);
      }
      const tokens = []; let buf = '', last = null;
      const script = c => { const n=c.charCodeAt(0);
        if (n>=0x4E00&&n<=0x9FFF||n>=0x3400&&n<=0x4DBF) return 'K';
        if (n>=0x3040&&n<=0x309F) return 'H';
        if (n>=0x30A0&&n<=0x30FF) return 'T';
        return 'O'; };
      for (const c of text) {
        if (/[\s。、！？「」『』・…]/.test(c)) { if (buf){tokens.push(buf);buf='';last=null;} continue; }
        const t=script(c); if (t!==last&&buf){tokens.push(buf);buf='';}
        buf+=c; last=t;
      }
      if (buf) tokens.push(buf);
      return tokens;
    }

    async function _lookup_word(word) {
      if (_lookup_cache[word]) return _lookup_cache[word];
      const lang_name = LANG.current==='ko'?'Korean':'Japanese';
      try {
        const res=await fetch(OLLAMA_URL,{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:OLLAMA_MODEL,messages:[{role:'user',content:
            `${lang_name} word: "${word}"\nReply ONLY with JSON: {"reading":"romanization","meaning":"English meaning"}`
          }],stream:false,options:{temperature:0,num_predict:40}})});
        if (!res.ok) throw new Error();
        const raw=(await res.json()).message?.content?.trim()||'';
        let p=null; try{p=JSON.parse(raw);}catch{}
        if (!p){const m=raw.match(/\{[\s\S]*?\}/);if(m)try{p=JSON.parse(m[0]);}catch{}}
        if (p?.reading) { _lookup_cache[word]=p; return p; }
      } catch {}
      return null;
    }

    function _refresh_dlg_word_colors() {
      const vocab = NPC_VOCAB.getAll();
      body_el.querySelectorAll('.dlg-word').forEach(span => {
        const e = vocab.find(v => v.text === span.textContent);
        span.classList.toggle('done', !!(e && e.romaji && e.meaning_unlocked));
      });
    }

    function _append_npc_turn(jp, en, tokens) {
      const turn = document.createElement('div');
      turn.className = 'dlg-turn dlg-turn-npc';

      const jp_row = document.createElement('div');
      jp_row.className = 'dlg-npc-jp';
      let all_words = tokens ? tokens.map(t=>t.text) : _tokenize(jp);
      if (LANG.current === 'ko') {
        const split = WorkspacePanel.split_ko_words(all_words, tokens);
        all_words = split.words; tokens = split.defs;
      }
      if (!tokens) WorkspacePanel.prefetch(all_words);
      const vocab = NPC_VOCAB.getAll();
      all_words.forEach((word, i) => {
        const span = document.createElement('span');
        span.className = 'dlg-word'; span.textContent = word; span.draggable = true;
        const ve = vocab.find(v => v.text === word);
        if (ve && ve.romaji && ve.meaning_unlocked) span.classList.add('done');
        span.addEventListener('dragstart', ev => {
          span.classList.add('drag-src');
          ev.dataTransfer.setData('dlg-word', word);
          ev.dataTransfer.effectAllowed = 'copy';
        });
        span.addEventListener('dragend', () => span.classList.remove('drag-src'));
        span.addEventListener('click', () => {
          body_el.querySelectorAll('.dlg-word.active').forEach(c=>c.classList.remove('active'));
          span.classList.add('active');
          WorkspacePanel.open_npc_sentence(jp, all_words, i, name_el.textContent, tokens);
        });
        jp_row.appendChild(span);
      });
      turn.appendChild(jp_row);

      const copy_btn = document.createElement('button');
      copy_btn.className = 'dlg-copy-btn';
      copy_btn.textContent = 'copy';
      copy_btn.addEventListener('click', () => {
        navigator.clipboard.writeText(jp).then(() => {
          copy_btn.textContent = '✓';
          setTimeout(() => { copy_btn.textContent = 'copy'; }, 1200);
        });
      });
      turn.appendChild(copy_btn);

      body_el.insertBefore(turn, thinking);
      body_el.scrollTop = body_el.scrollHeight;
      WorkspacePanel.speak(jp);
    }

    function _append_player_turn(text) {
      const turn = document.createElement('div');
      turn.className = 'dlg-turn dlg-turn-player';
      const bubble = document.createElement('span');
      bubble.className = 'dlg-turn-player-text'; bubble.textContent = text;
      turn.appendChild(bubble);
      body_el.insertBefore(turn, thinking);
      body_el.scrollTop = body_el.scrollHeight;
    }
    let cur_npc_id=null; const _histories={};
    const OLLAMA_URL="/ollama/api/chat", OLLAMA_MODEL="llama3.1:8b";

    function _system_prompt(npc_id) {
      const npc=NPC_DEFS[npc_id];
      const facts=(NPC_KNOWLEDGE[npc_id]||[]).map(f=>"- "+f).join("\n");
      const ko = LANG.current === 'ko';
      const npc_name = ko && npc.name_ko ? npc.name_ko : npc.name_jp;
      const lang = ko ? 'Korean' : 'Japanese';
      const style = ko ? '존댓말' : '丁寧語';
      const reading_label = ko ? 'romanization' : 'romaji';
      const format = ko
        ? `{"jp": "Korean response", "en": "English translation"}`
        : `{"jp": "Japanese response", "en": "English translation", "tokens": [{"text": "word", "reading": "${reading_label}", "meaning": "English meaning"}]}`;
      const token_instruction = ko ? '' : '\n- The tokens array must list every word/morpheme in your Japanese response in order';
      return `You are ${npc_name} (${npc.name_en}). A visitor is speaking to you in ${lang}.\n\nWhat you know:\n${facts}\n\nInstructions:\n- Stay in character as a polite ${lang} staff member using ${style}\n- Keep your response to 1–2 sentences maximum\n- Reply ONLY with valid JSON: ${format}${token_instruction}\n- If asked about something not covered above, say politely that you don't know\n- Do not include any text outside the JSON`;
    }

    const _hk = (npc_id) => `${npc_id}_${LANG.current}`;

    async function _generate(npc_id, text) {
      const history=_histories[_hk(npc_id)]||[];
      try {
        const res=await fetch(OLLAMA_URL,{method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({model:OLLAMA_MODEL,keep_alive:"10m",format:"json",messages:[{role:"system",content:_system_prompt(npc_id)},...history,{role:"user",content:text}],stream:false,options:{temperature:0.3,num_predict:LANG.current==='ko'?128:512}})});
        if (!res.ok) throw new Error('http '+res.status);
        const json=await res.json();
        const raw=json.message?.content||'';
        let parsed=null;
        try{parsed=JSON.parse(raw);}catch{}
        if (!parsed){const m=raw.match(/\{[\s\S]*\}/);if(m)try{parsed=JSON.parse(m[0]);}catch{}}
        if (parsed?.jp&&parsed?.en){
          _histories[_hk(npc_id)]=[...history,{role:"user",content:text},{role:"assistant",content:raw}];
          return {jp:parsed.jp,en:parsed.en,tokens:Array.isArray(parsed.tokens)?parsed.tokens:null};
        }
        throw new Error('parse: '+raw.slice(0,120));
      } catch(err) {
        console.error('[NPC] failed — error:', err?.message, '| type:', err?.name, '| npc:', npc_id, '| url:', OLLAMA_URL);
        if (LANG.current==='ko') {
          return {jp:'죄송해요, 잘 이해하지 못했어요. 다시 한번 말씀해 주시겠어요?', en:"Sorry, I didn't quite understand. Could you say that again?", tokens:null};
        }
        const intent_id=npc_fallback_classify(npc_id,text);
        const intent=NPC_DEFS[npc_id]?.intents[intent_id];
        return intent?{jp:intent.jp,en:intent.en,tokens:null}:null;
      }
    }

    async function _send() {
      if (!cur_npc_id) return;
      const text=inp.value.trim(); if (!text) return;
      inp.value=""; inp.disabled=true; send_btn.disabled=true;
      _append_player_turn(text);
      WorkspacePanel.speak(text);
      thinking.classList.add("visible");
      body_el.scrollTop = body_el.scrollHeight;
      const response=await _generate(cur_npc_id,text);
      thinking.classList.remove("visible");
      if (response) _append_npc_turn(response.jp, response.en, response.tokens);
      send_btn.disabled=false; inp.disabled=false; inp.focus();
    }

    function open(npc_id) {
      const npc=NPC_DEFS[npc_id]; if (!npc) return;
      cur_npc_id=npc_id;
      const greeting = LANG.current==='ko' && npc.greeting_ko ? npc.greeting_ko : npc.greeting;
      _histories[_hk(npc_id)]=[{role:"assistant",content:JSON.stringify({jp:greeting.jp,en:greeting.en})}];
      document.getElementById("ws-panel").classList.remove("open");
      dlg_el.classList.add("open");
      avatar.style.background=npc.color; name_el.textContent='';
      body_el.querySelectorAll('.dlg-turn').forEach(el => el.remove());
      _append_npc_turn(greeting.jp, greeting.en, null);
      inp.placeholder = '';
      thinking.classList.remove("visible"); inp.value=""; inp.disabled=false; send_btn.disabled=false; inp.focus();
    }

    function close() {
      cur_npc_id=null; dlg_el.classList.remove("open");
    }

    send_btn.addEventListener("click",_send);
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")_send();});
    close_btn.addEventListener("click",close);
    return {open, close, refreshWordColors: _refresh_dlg_word_colors};
  })();

  // ── Teaching language switch ───────────────────────────────────────────────

  function switchTeachingLang(lang) {
    try {
      LANG.set(lang);
      // Hot-swap SIGN_BY_ID: delete all current entries, re-populate from the right set
      Object.keys(SIGN_BY_ID).forEach(k => delete SIGN_BY_ID[k]);
      const signs = lang === 'ko' ? [...SIGNS_KO, ...WORLD_SIGNS_KO] : [...SIGNS, ...WORLD_SIGNS];
      signs.forEach(s => { SIGN_BY_ID[s.id] = s; });
      // Reload per-language vocab progress
      WORD_PROGRESS.reload();
      // Close any open panels so stale sign data isn't shown
      WorkspacePanel.clear();
    } catch(e) { console.error('switchTeachingLang error:', e); }

    // Update button: show the OTHER language as the switch target
    const btn = document.getElementById('lang-btn');
    if (btn) {
      btn.textContent   = lang === 'ko' ? '日本語' : '한국어';
      btn.style.color   = lang === 'ko' ? '#c0392b' : '#555';
      btn.style.borderColor = lang === 'ko' ? '#c0392b' : '#3a2810';
    }
    const h1 = document.querySelector('#start-screen h1');
    if (h1) h1.textContent = lang === 'ko' ? '도서관' : '図書館';
  }

  document.getElementById('lang-btn').addEventListener('click', () => {
    switchTeachingLang(LANG.current === 'ko' ? 'ja' : 'ko');
  });

  // Apply saved teaching language on load
  switchTeachingLang(LANG.current);

  // ── Game loop ──────────────────────────────────────────────────────────────
  let _last_t = 0;
  let _room_prev = null;

  function loop(now) {
    const dt = Math.min((now - _last_t) / 1000, 0.05);
    _last_t = now;

    if (sim.state.session_active) {
      input.update(dt, now);

      if (sim.state.transition) {
        const changed = sim.advance_transition(dt);
        if (changed) {
          WorkspacePanel.clear();
          DialoguePanel.close();
        }
      }
    }

    renderer.draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
</script>
</body>
</html>

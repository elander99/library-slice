<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Slice — Japanese Sim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="start-screen">
  <h1>図書館</h1>
  <button id="start-btn">Start game</button>
</div>

<div id="game-wrap">
  <canvas id="game"></canvas>
</div>

<div id="ws-dialogue">
  <div id="ws-dlg-header">
    <div id="ws-dlg-avatar"></div>
    <div id="ws-dlg-name"></div>
    <button id="ws-dlg-copy-all">⎘ copy all</button>
    <button id="ws-dlg-close">✕</button>
  </div>
  <div id="ws-dlg-body">
    <div id="ws-dlg-thinking"><span></span><span></span><span></span></div>
  </div>
  <div id="ws-dlg-input-row">
    <input id="ws-dlg-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="">
    <button id="ws-dlg-mic" title="Speak">🎤</button>
    <button id="ws-dlg-send">→</button>
  </div>
  <div id="ko-kbd">
    <div class="ko-row">
      <button class="ko-key" data-k="ㅂ" data-ks="ㅃ">ㅂ</button>
      <button class="ko-key" data-k="ㅈ" data-ks="ㅉ">ㅈ</button>
      <button class="ko-key" data-k="ㄷ" data-ks="ㄸ">ㄷ</button>
      <button class="ko-key" data-k="ㄱ" data-ks="ㄲ">ㄱ</button>
      <button class="ko-key" data-k="ㅅ" data-ks="ㅆ">ㅅ</button>
      <button class="ko-key" data-k="ㅛ">ㅛ</button>
      <button class="ko-key" data-k="ㅕ">ㅕ</button>
      <button class="ko-key" data-k="ㅑ">ㅑ</button>
      <button class="ko-key" data-k="ㅐ" data-ks="ㅒ">ㅐ</button>
      <button class="ko-key" data-k="ㅔ" data-ks="ㅖ">ㅔ</button>
    </div>
    <div class="ko-row">
      <button class="ko-key" data-k="ㅁ">ㅁ</button>
      <button class="ko-key" data-k="ㄴ">ㄴ</button>
      <button class="ko-key" data-k="ㅇ">ㅇ</button>
      <button class="ko-key" data-k="ㄹ">ㄹ</button>
      <button class="ko-key" data-k="ㅎ">ㅎ</button>
      <button class="ko-key" data-k="ㅗ">ㅗ</button>
      <button class="ko-key" data-k="ㅓ">ㅓ</button>
      <button class="ko-key" data-k="ㅏ">ㅏ</button>
      <button class="ko-key" data-k="ㅣ">ㅣ</button>
    </div>
    <div class="ko-row">
      <button class="ko-key" id="ko-shift">⇧</button>
      <button class="ko-key" data-k="ㅋ">ㅋ</button>
      <button class="ko-key" data-k="ㅌ">ㅌ</button>
      <button class="ko-key" data-k="ㅊ">ㅊ</button>
      <button class="ko-key" data-k="ㅍ">ㅍ</button>
      <button class="ko-key" data-k="ㅠ">ㅠ</button>
      <button class="ko-key" data-k="ㅜ">ㅜ</button>
      <button class="ko-key" data-k="ㅡ">ㅡ</button>
      <button class="ko-key" id="ko-bs">⌫</button>
    </div>
    <div class="ko-row">
      <button class="ko-key" id="ko-space">SPACE</button>
    </div>
  </div>
</div>
<div id="ws-dlg-tail"></div>
<div id="speech-bubble">
  <button id="speech-bubble-close">×</button>
  <div id="speech-bubble-text"></div>
</div>
<div id="obj-popup">
  <span id="obj-popup-word"></span>
  <div id="obj-popup-en"></div>
  <span id="obj-popup-desc"></span>
</div>
<div id="workspace">
  <div id="ws-empty">walk up to a sign and press E · talk to characters to practice Japanese</div>
  <div id="ws-panel">
    <div id="ws-chips-row">
      <button id="ws-speak-all" style="display:none">🔊</button>
      <div id="ws-chips-inner"><span id="ws-sign-label"></span></div>
      <button id="ws-copy-sentence">⎘</button>
    </div>
    <div id="ws-translation"></div>
    <input id="ws-input" type="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="" style="display:none">
    <div id="ws-hint-row">
      <div id="ws-lookup-wrap"><button id="ws-lookup" disabled>📱 look up</button><div id="ws-lookup-bar"></div></div>
      <span id="ws-hint-read"></span>
      <span id="ws-hint-mean"></span>
    </div>
    <div id="ws-bottom-bar">
      <span id="ws-feedback"></span>
    </div>
  </div>
</div>
<button id="map-btn">🗺 map</button>
<button id="vocab-btn">📓 vocab</button>
<button id="journal-btn">📋 기록</button>
<button id="settings-btn">⚙ settings</button>

<div id="journal-panel">
  <div id="journal-header">
    <div id="journal-title-block">
      <span id="journal-title">주민 기록</span>
      <span id="journal-subtitle">Resident Record</span>
    </div>
    <span id="journal-progress-indicator"></span>
    <button id="journal-close">✕ close</button>
  </div>
  <div id="journal-content"></div>
</div>

<div id="map-panel">
  <div id="map-header">
    <h2 id="map-title">진행 상황</h2>
    <button id="map-zoom">⤢ zoom</button>
    <button id="map-close">✕ close</button>
  </div>
  <div id="map-inner">
    <div id="map-minimap"></div>
    <div id="map-list"><div id="map-content"></div></div>
  </div>
</div>
<div id="settings-panel">
  <div id="settings-inner">
    <div id="settings-header">
      <h2>設定 — Settings</h2>
      <button id="settings-close">✕ close</button>
    </div>
    <div id="settings-content">
      <div class="settings-row">
        <span class="settings-label">Teaching language</span>
        <button id="lang-btn" style="background:rgba(12,8,4,0.88);border:1px solid rgba(196,154,26,0.26);color:var(--cream-dim);font-family:'DM Mono',monospace;font-size:12px;padding:5px 14px;cursor:pointer;letter-spacing:0.08em;border-radius:20px;transition:border-color 0.15s,color 0.15s,background 0.15s;"></button>
      </div>
      <div class="settings-row" id="settings-voice-row" style="display:none">
        <span class="settings-label">Korean voice</span>
        <select id="ws-voice-pick"></select>
      </div>
      <div class="settings-row">
        <span class="settings-label">Stuck or can't move?</span>
        <button id="settings-reset-pos" style="background:rgba(192,57,43,0.12);border:1px solid rgba(192,57,43,0.4);color:#c0392b;font-family:'DM Mono',monospace;font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;letter-spacing:0.06em;transition:background 0.15s,border-color 0.15s;">Reset position</button>
      </div>
    </div>
  </div>
</div>
<div id="vocab-panel">
  <div id="vocab-header">
    <div style="display:flex;flex-direction:column;gap:2px">
      <h2 id="vocab-title">単語帳 — Word List</h2>
      <span id="vocab-counter" style="display:none;font-size:12px;color:#888;font-family:'DM Mono',monospace;letter-spacing:0.03em"></span>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button id="vocab-sort-btn">A→Z</button>
<button id="vocab-close">✕ close</button>
    </div>
  </div>
  <div id="vocab-tabs">
    <button id="vocab-tab-words" class="vocab-tab vocab-tab-active">Words</button>
    <button id="vocab-tab-log" class="vocab-tab">Log</button>
  </div>
  <div id="vocab-search-wrap">
    <input id="vocab-search" type="text" placeholder="filter or type Korean + Enter to add…" autocomplete="off" spellcheck="false">
    <div id="vocab-add-status"></div>
  </div>
  <div id="vocab-inner">
    <div id="vocab-content"></div>
    <div id="vocab-log-content" style="display:none"></div>
  </div>
</div>

<div id="convo-panel">
  <div id="convo-header">
    <span id="convo-title">대화</span>
    <button id="convo-close">✕</button>
  </div>
  <div id="convo-body"></div>
</div>

<!-- Teaching language tracker (must load first) -->
<script src="content/i18n.js"></script>

<script src="content/conversations.js"></script>
<script src="content/signs.js"></script>
<script src="content/signs_ko.js"></script>
<script src="content/world_signs.js"></script>
<script src="content/world_signs_ko.js"></script>
<script src="content/rooms.js"></script>
<script src="content/npcs.js"></script>
<script src="content/lore.js"></script>
<script src="content/entities.js"></script>
<script src="content/dialogue.js"></script>
<script src="content/knowledge.js"></script>

<script src="engine/romanize_ko.js"></script>
<script src="engine/tiles.js"></script>
<script src="engine/tiles-labeler.js" onerror="void 0"></script>
<script src="engine/maps.js"></script>
<script src="content/npc_schedules.js"></script>
<script src="engine/sim2d.js"></script>
<script src="engine/render2d.js"></script>
<script src="engine/input2d.js"></script>

<script src="engine/sound.js"></script>
<script src="engine/progress.js"></script>

<script src="ui/speech_bubble.js"></script>
<script src="ui/obj_popup.js"></script>
<script src="ui/workspace.js"></script>
<script src="ui/vocab_panel.js"></script>
<script src="ui/convo_panel.js"></script>
<script src="ui/map_panel.js"></script>
<script src="ui/settings_panel.js"></script>
<script src="ui/journal_panel.js"></script>
<script src="ui/dialogue_panel.js"></script>

<script src="engine/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library Slice — Japanese Sim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=DM+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #c49a1a;
      --gold-dim:   rgba(196,154,26,0.7);
      --gold-faint: rgba(196,154,26,0.1);
      --gold-glow:  rgba(196,154,26,0.2);
      --cream:      #ede4ce;
      --cream-dim:  #b8a888;
      --jade:       #52c98e;
      --jade-dim:   #2f6e4e;
      --ember:      #c0392b;
      --bg:         #0b0905;
      --border:     rgba(196,154,26,0.13);
      --border-md:  rgba(196,154,26,0.26);
    }

    body {
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--cream);
      overflow: hidden;
    }

    #game-wrap { position: fixed; inset: 0; }
    canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

    /* ── Start screen ───────────────────────────────────────────────────────── */
    #start-screen {
      position: fixed; inset: 0;
      background: rgba(10,8,4,0.97);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; z-index: 10;
    }
    #start-screen h1 { font-family: 'Noto Serif JP', serif; font-size: 30px; color: var(--gold); letter-spacing: 0.12em; }
    #start-btn {
      padding: 11px 38px; background: none; border: 1px solid var(--gold);
      color: var(--gold); font-family: 'DM Mono', monospace; font-size: 13px;
      cursor: pointer; letter-spacing: 0.12em; border-radius: 24px;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
    }
    #start-btn:hover { background: var(--gold); color: var(--bg); box-shadow: 0 0 22px rgba(196,154,26,0.35); }

    /* ── Workspace panel ────────────────────────────────────────────────────── */
    #workspace {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 0; background: transparent; pointer-events: none;
      z-index: 15; display: flex; flex-direction: column; overflow: hidden;
      transition: height 0.3s cubic-bezier(0.16,1,0.3,1), background 0.2s;
    }
    #workspace.active {
      height: 190px; pointer-events: auto;
      background: rgba(9,6,2,0.78);
      backdrop-filter: blur(22px) saturate(1.4); -webkit-backdrop-filter: blur(22px) saturate(1.4);
      border-top: 1px solid var(--border-md);
      box-shadow: 0 -1px 0 rgba(196,154,26,0.06), 0 -24px 60px rgba(0,0,0,0.45);
    }
    #workspace.active.done {
      background: rgba(8,32,18,0.90);
      border-top-color: rgba(82,201,142,0.22);
      box-shadow: 0 -1px 0 rgba(82,201,142,0.1), 0 -24px 60px rgba(0,0,0,0.45);
    }
    #ws-translation {
      font-family:'DM Mono',monospace; font-size:14px; color:rgba(82,201,142,0.75);
      text-align:center; padding:3px 20px 0; letter-spacing:0.04em; line-height:1.5;
      flex-shrink:0; opacity:0; transition:opacity 0.6s ease; pointer-events:none;
    }
    #ws-translation.visible { opacity:1; }
    @keyframes ws-slide-up {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #ws-empty { display: none; }

    #ws-panel { display:none; flex:1; flex-direction:column; overflow:visible; position:relative; }
    #ws-panel.open { display:flex; animation: ws-slide-up 0.32s cubic-bezier(0.16,1,0.3,1) both; }

    /* chips row */
    #ws-chips-row {
      position:relative; display:flex; align-items:center; justify-content:center; gap:0;
      padding:10px 44px 8px;
      border-bottom:1px solid var(--border); overflow-x:auto; overflow-y:hidden;
      scrollbar-width:none; flex-shrink:0;
      touch-action:pan-x; cursor:grab;
    }
    #ws-chips-row.dragging { cursor:grabbing; }
    #ws-chips-row::-webkit-scrollbar { display:none; }
    #ws-sign-label {
      font-family:'DM Mono',monospace; font-size:12px; color:var(--gold-dim);
      white-space:nowrap; margin-right:16px; flex-shrink:0;
      letter-spacing:0.2em; text-transform:uppercase;
    }
    #ws-speak-all {
      position:absolute; left:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--gold-dim);
      font-size:18px; line-height:1; cursor:pointer; padding:4px 6px; border-radius:6px;
      transition:color 0.15s, background 0.15s;
    }
    #ws-speak-all:hover { color:var(--gold); background:var(--gold-faint); }

    /* ── Settings button & panel ─────────────────────────────────────────────── */
    #settings-btn {
      position:fixed; bottom:200px; left:18px; z-index:25;
      background:rgba(12,8,4,0.94); border:1px solid rgba(196,154,26,0.32); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:12px; padding:7px 16px;
      border-radius:20px; cursor:pointer; display:none; letter-spacing:0.08em;
      box-shadow:0 4px 18px rgba(0,0,0,0.4);
      transition:background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    #settings-btn:hover { background:rgba(12,8,4,0.94); border-color:var(--gold); box-shadow:0 4px 20px rgba(196,154,26,0.4); }
    #settings-panel {
      position:fixed; inset:0; z-index:30; background:rgba(8,5,2,0.94);
      display:none; flex-direction:column; align-items:center; justify-content:flex-start;
      padding:40px 20px; overflow-y:auto;
      backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    }
    #settings-panel.open { display:flex; }
    #settings-inner { width:100%; max-width:480px; }
    #settings-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; padding-bottom:12px; border-bottom:1px solid var(--border); }
    #settings-header h2 { font-family:'Noto Serif JP',serif; font-size:18px; color:var(--gold); font-weight:400; letter-spacing:0.1em; }
    #settings-close {
      background:rgba(255,255,255,0.04); border:1px solid var(--border-md); color:var(--cream-dim);
      font-family:'DM Mono',monospace; font-size:12px; padding:5px 14px; border-radius:20px; cursor:pointer;
      transition:border-color 0.15s, color 0.15s, background 0.15s;
    }
    #settings-close:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-faint); }
    .settings-row { display:flex; align-items:center; gap:16px; padding:14px 0; border-bottom:1px solid var(--border); }
    .settings-row:last-child { border-bottom:none; }
    .settings-label { font-family:'DM Mono',monospace; font-size:12px; color:var(--cream-dim); flex:1; letter-spacing:0.06em; }
    #ws-voice-pick {
      background:var(--gold-faint); border:1px solid var(--border-md); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:12px; padding:5px 10px; border-radius:8px;
      cursor:pointer; max-width:240px; transition:border-color 0.15s;
    }
    #ws-voice-pick:hover { border-color:var(--gold); }

    /* token display */
    .ws-merged-chip {
      font-family:'Noto Serif JP',serif; font-size:21px; color:#cfc0a0;
      display:inline-flex; align-items:center; flex-shrink:0; white-space:nowrap;
      letter-spacing:0.03em; gap:8px;
    }
    .ws-token {
      cursor:pointer; padding:2px 5px; border-radius:6px;
      display:inline-flex; flex-direction:column; align-items:center;
      position:relative;
      transition:color 0.12s, background 0.12s;
      text-decoration:underline; text-underline-offset:6px;
      text-decoration-color:rgba(196,154,26,0.2); text-decoration-thickness:1px;
    }
    /* copy badge — shows on token hover */
    .ws-token-copy-btn {
      display:none; position:absolute; top:-11px; right:-8px;
      background:rgba(9,6,2,0.94); border:1px solid var(--border-md);
      color:var(--gold-dim); font-family:'DM Mono',monospace; font-size:13px;
      padding:3px 8px; border-radius:6px; cursor:pointer; z-index:4;
      letter-spacing:0; line-height:1.5; white-space:nowrap;
      transition:color 0.1s, border-color 0.1s, background 0.1s;
    }
    .ws-token:hover .ws-token-copy-btn { display:block; }
    .ws-token-copy-btn:hover { color:var(--gold); border-color:var(--gold-dim); background:rgba(196,154,26,0.08); }
    .ws-token-copy-btn.flash  { color:var(--jade); border-color:rgba(82,201,142,0.4); }
    .ws-nav-btn {
      display:block; margin-top:3px; padding:1px 6px; font-size:10px;
      font-family:'DM Mono',monospace; color:var(--jade); border-radius:4px;
      background:rgba(82,201,142,0.08); border:1px solid rgba(82,201,142,0.22);
      cursor:pointer; white-space:nowrap; line-height:1.6;
      transition:background 0.1s, border-color 0.1s;
    }
    .ws-nav-btn:hover { background:rgba(82,201,142,0.18); border-color:rgba(82,201,142,0.5); }
    .dlg-nav-row { display:flex; gap:6px; flex-wrap:wrap; margin-top:6px; }
    .dlg-nav-btn {
      padding:2px 9px; border-radius:6px; font-family:'Noto Serif JP',serif; font-size:13px;
      color:var(--jade); border:1px solid rgba(82,201,142,0.25); background:rgba(82,201,142,0.06);
      cursor:pointer; transition:background 0.1s, border-color 0.1s;
    }
    .dlg-nav-btn:hover { background:rgba(82,201,142,0.15); border-color:rgba(82,201,142,0.5); }
    .ws-token:hover    { color:var(--cream); background:rgba(196,154,26,0.07); text-decoration-color:rgba(196,154,26,0.4); }
    .ws-token.selected { color:#fff; background:rgba(148,54,24,0.72); border-radius:6px; text-decoration-color:transparent; box-shadow:inset 0 0 0 1px rgba(148,54,24,0.45); }
    .ws-token.done     { color:var(--jade); text-decoration-color:transparent; text-shadow:0 0 14px rgba(82,201,142,0.18); }
    /* ── token input slots ─────────────────────────────────────────────────── */
    /* reading slot — above the kanji */
    .ws-token-reading {
      font-family:'DM Mono',monospace; font-size:12px; color:rgba(196,154,26,0.8);
      letter-spacing:0.05em; min-height:22px; display:flex; align-items:center;
      justify-content:center; width:100%; border-radius:4px; padding:1px 3px;
      text-decoration:none; box-sizing:border-box;
      transition:background 0.1s, border-color 0.1s, min-height 0.18s ease;
    }
    .ws-token-reading.slot-active { min-height:26px; }
    .ws-token-reading.slot-empty {
      border:1.5px dashed rgba(196,154,26,0.35); cursor:pointer;
    }
    .ws-token-reading.slot-empty:hover {
      border-color:rgba(196,154,26,0.62); background:rgba(196,154,26,0.06);
    }
    /* meaning slot — below the kanji */
    .ws-token-meaning {
      font-family:'DM Mono',monospace; font-size:12px; color:#4aaa78;
      letter-spacing:0.03em; min-height:22px; display:flex; align-items:center;
      justify-content:center; width:100%; border-radius:4px; padding:1px 3px;
      text-decoration:none; box-sizing:border-box;
      transition:background 0.1s, border-color 0.1s, min-height 0.18s ease;
    }
    .ws-token-meaning.slot-active { min-height:26px; }
    .ws-token-meaning.slot-empty {
      border:1.5px dashed rgba(82,201,142,0.28); cursor:pointer;
    }
    .ws-token-meaning.slot-empty:hover {
      border-color:rgba(82,201,142,0.55); background:rgba(82,201,142,0.05);
    }
    .ws-token-meaning.slot-done { color:var(--jade-dim); }
    .ws-token.done .ws-token-meaning { color:var(--jade-dim); }
    .ws-token-parts    { display:flex; flex-direction:row; gap:1px; align-items:flex-end; }
    .ws-part {
      display:inline-flex; flex-direction:column; align-items:center;
      cursor:pointer; padding:2px 4px; border-radius:5px;
      transition:background 0.12s, color 0.12s; text-decoration:none;
    }
    .ws-part:hover    { background:var(--gold-faint); }
    .ws-part.selected { background:rgba(148,54,24,0.72); color:#fff; }
    .ws-part.done     { color:var(--jade); text-shadow:0 0 14px rgba(82,201,142,0.18); }
    .ws-part-reading {
      font-family:'DM Mono',monospace; font-size:11px; color:rgba(196,154,26,0.72);
      letter-spacing:0.05em; min-height:22px; display:flex; align-items:center;
      justify-content:center; width:100%; border-radius:3px; padding:1px 2px;
      box-sizing:border-box; transition:background 0.1s, min-height 0.18s ease;
    }
    .ws-part-reading.slot-active { min-height:26px; }
    .ws-part-reading.slot-empty { border:1.5px dashed rgba(196,154,26,0.3); cursor:pointer; }
    .ws-part-reading.slot-empty:hover { border-color:rgba(196,154,26,0.58); background:rgba(196,154,26,0.05); }
    .ws-part-meaning {
      font-family:'DM Mono',monospace; font-size:11px; color:#4aaa78;
      letter-spacing:0.03em; min-height:22px; display:flex; align-items:center;
      justify-content:center; width:100%; border-radius:3px; padding:1px 2px;
      box-sizing:border-box; transition:background 0.1s, min-height 0.18s ease;
    }
    .ws-part-meaning.slot-active { min-height:26px; }
    .ws-part-meaning.slot-empty { border:1.5px dashed rgba(82,201,142,0.22); cursor:pointer; }
    .ws-part-meaning.slot-empty:hover { border-color:rgba(82,201,142,0.5); background:rgba(82,201,142,0.04); }
    .ws-part-meaning.slot-done { color:var(--jade-dim); }
    .ws-particle { color:rgba(196,154,26,0.48); cursor:default; padding-top:17px; padding-bottom:17px; }

    /* ── inline input (shared; JS moves it into the active slot) ────────────── */
    #ws-input {
      width:100%; min-width:72px;
      background:rgba(255,255,255,0.03); border:2px solid rgba(196,154,26,0.55);
      color:var(--cream); font-family:'DM Mono',monospace; font-size:11px;
      padding:2px 6px; outline:none; border-radius:5px; letter-spacing:0.07em;
      caret-color:var(--gold); transition:border-color 0.2s, background 0.2s, box-shadow 0.2s, opacity 0.18s ease;
      text-align:center;
    }
    #ws-input:focus { border-color:rgba(196,154,26,0.82); background:rgba(196,154,26,0.05); box-shadow:0 0 0 2px rgba(196,154,26,0.1); }
    #ws-input::placeholder { color:rgba(196,154,26,0.48); letter-spacing:0.05em; }
    #ws-input.correct { border-color:rgba(82,201,142,0.45); background:rgba(82,201,142,0.04); caret-color:var(--jade); }
    #ws-input.drag-over { border-color:rgba(82,201,142,0.55); background:rgba(82,201,142,0.05); }
    @keyframes ws-wrong-flash {
      0%,100% { border-color:rgba(192,57,43,0.5); background:rgba(192,57,43,0.04); }
      40%     { border-color:rgba(192,57,43,0.9); background:rgba(192,57,43,0.18); }
    }
    #ws-input.wrong { animation: ws-wrong-flash 0.18s ease-in-out 2; }

    /* ── bottom bar ─────────────────────────────────────────────────────────── */
    #ws-hint-row {
      display:flex; align-items:center; gap:12px; padding:4px 16px 2px; flex-shrink:0;
    }
    #ws-hint-read { font-family:'DM Mono',monospace; font-size:13px; color:var(--gold); letter-spacing:0.07em; }
    #ws-hint-mean { font-family:'DM Mono',monospace; font-size:13px; color:var(--jade); letter-spacing:0.04em; }
    #ws-bottom-bar { display:flex; align-items:center; gap:10px; padding:3px 16px 8px; flex-shrink:0; }
    #ws-feedback { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:0.07em; flex:1; min-height:13px; }
    #ws-lookup {
      background:var(--gold-faint); border:1px solid var(--border-md); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:11px; padding:4px 12px; border-radius:18px;
      cursor:pointer; white-space:nowrap; flex-shrink:0; letter-spacing:0.07em;
      transition:border-color 0.15s, color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    #ws-lookup:disabled { color:#a07820; border-color:rgba(196,154,26,0.35); background:rgba(196,154,26,0.06); cursor:default; }
    #ws-lookup:not(:disabled):hover { border-color:var(--gold); background:var(--gold-glow); color:#f5c840; box-shadow:0 0 10px rgba(196,154,26,0.18); }
    #ws-lookup-wrap { position:relative; flex-shrink:0; }
    #ws-lookup-bar {
      position:absolute; bottom:0; left:3px; right:3px; height:3px;
      background:var(--gold); border-radius:0 0 18px 18px;
      transform-origin:left center; transition:width 0.95s linear;
      width:0; pointer-events:none;
    }
    #ws-copy-sentence {
      position:absolute; right:10px; top:50%; transform:translateY(-50%);
      background:none; border:none; color:var(--gold-dim);
      font-family:'DM Mono',monospace; font-size:12px; line-height:1;
      cursor:pointer; padding:4px 6px; border-radius:6px; letter-spacing:0.04em;
      transition:color 0.15s, background 0.15s;
    }
    #ws-copy-sentence:hover { color:var(--gold); background:var(--gold-faint); }
    #ws-copy-sentence.copied { color:var(--jade); }

    /* ── NPC dialogue ────────────────────────────────────────────────────────── */
    @keyframes dlg-appear {
      from { opacity:0; transform:translateX(-50%) translateY(10px); }
      to   { opacity:1; transform:translateX(-50%) translateY(0); }
    }
    #ws-dialogue {
      display:none; flex-direction:column;
      position:fixed; top:60px; left:50%; transform:translateX(-50%);
      width:min(500px, calc(100vw - 28px));
      max-height:calc(100vh - 270px);
      background:rgba(8,5,2,0.96); border:1px solid var(--border-md);
      border-radius:14px; z-index:50; overflow:hidden;
      box-shadow:0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.35), inset 0 1px 0 rgba(196,154,26,0.07);
    }
    #ws-dialogue.open { display:flex; animation:dlg-appear 0.26s cubic-bezier(0.16,1,0.3,1) both; }
    #ws-dlg-header {
      display:flex; align-items:center; gap:10px; padding:10px 16px;
      border-bottom:1px solid var(--border); flex-shrink:0;
      background:rgba(196,154,26,0.04);
      cursor:grab; user-select:none;
    }
    #ws-dlg-header.dragging { cursor:grabbing; }
    #ws-dlg-header button { cursor:pointer; }
    #ws-dlg-avatar { width:26px; height:26px; border-radius:50%; flex-shrink:0; }
    #ws-dlg-name   { font-family:'DM Mono',monospace; font-size:12px; color:var(--gold); flex:1; letter-spacing:0.18em; text-transform:uppercase; }
    #ws-dlg-close, #ws-dlg-copy-all {
      background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--cream-dim);
      font-size:12px; cursor:pointer; padding:3px 9px; border-radius:20px;
      transition:background 0.15s, border-color 0.15s, color 0.15s;
    }
    #ws-dlg-close:hover, #ws-dlg-copy-all:hover { background:var(--gold-faint); border-color:var(--gold-dim); color:var(--gold); }
    #ws-dlg-copy-all.copied { color:var(--jade); border-color:rgba(82,201,142,0.35); }
    #ws-dlg-body {
      flex:1; display:flex; flex-direction:column; padding:8px 16px 10px;
      overflow-y:auto; gap:0;
      scrollbar-width:thin; scrollbar-color:rgba(196,154,26,0.18) transparent;
    }
    #ws-dlg-body::-webkit-scrollbar { width:3px; }
    #ws-dlg-body::-webkit-scrollbar-thumb { background:rgba(196,154,26,0.2); border-radius:2px; }
    .dlg-turn { padding:6px 0; }
    .dlg-turn + .dlg-turn { border-top:1px solid rgba(196,154,26,0.06); margin-top:2px; padding-top:8px; }
    .dlg-turn-player { display:flex; justify-content:flex-end; }
    .dlg-turn-npc { background:rgba(255,255,255,0.025); border-radius:8px; padding:6px 8px; margin:-2px 0; }
    .dlg-copy-btn {
      display:inline-block; margin-left:10px;
      background:none; border:1px solid rgba(255,255,255,0.35); border-radius:5px;
      font-family:'DM Mono',monospace; font-size:15px;
      color:#ffffff; cursor:pointer; padding:5px 14px;
      transition:border-color 0.15s, background 0.15s; letter-spacing:0.05em;
      vertical-align:middle; opacity:1;
    }
    .dlg-copy-btn:hover { border-color:#fff; background:rgba(255,255,255,0.12); }
    .dlg-turn-player-text {
      font-family:'Noto Serif JP',serif; font-size:14px; color:#9bbfe0;
      background:rgba(60,110,200,0.18); border-radius:10px 10px 3px 10px; padding:6px 12px;
      max-width:85%; line-height:1.5; display:inline-flex; flex-wrap:wrap; gap:1px; align-items:baseline;
    }
    .dlg-player-word {
      cursor:pointer; border-radius:3px; padding:0 2px;
      transition:background 0.12s, color 0.12s;
    }
    .dlg-player-word:hover { background:rgba(155,191,224,0.22); color:#cde4f5; text-shadow:0 0 8px rgba(155,191,224,0.35); }
    .dlg-player-word.active { background:rgba(155,191,224,0.28); color:#cde4f5; }
    .dlg-npc-jp { font-family:'Noto Serif JP',serif; font-size:17px; color:var(--cream); line-height:1.7; flex-wrap:wrap; display:flex; gap:2px; align-items:baseline; }
    .dlg-turn-npc.complete { background:rgba(45,106,79,0.18); box-shadow:inset 0 0 0 1px rgba(82,201,142,0.22); transition:background 0.6s ease, box-shadow 0.6s ease; }
    #ws-dlg-thinking { display:none; gap:6px; align-items:center; margin-top:4px; }

    #ws-dlg-thinking span:nth-child(3) { animation-delay:0.5s; }
    @keyframes dlg-pulse { 0%,80%,100%{transform:scale(0.6);opacity:0.3;} 40%{transform:scale(1);opacity:1;} }
    #ws-dlg-input-row { display:flex; gap:8px; padding:10px 14px; border-top:1px solid var(--border); flex-shrink:0; align-items:center; }
    #ws-dlg-input {
      flex:1; background:rgba(255,255,255,0.03); border:1px solid var(--border-md);

    #ws-dlg-input:focus { border-color:rgba(196,154,26,0.48); background:rgba(196,154,26,0.04); box-shadow:0 0 0 3px rgba(196,154,26,0.07); }
    #ws-dlg-input::placeholder { color:rgba(196,154,26,0.32); }
    #ws-dlg-send {
      background:var(--gold-faint); border:1px solid var(--border-md);
      color:var(--gold); font-family:'DM Mono',monospace; font-size:15px;

    #ws-dlg-send:disabled { opacity:0.2; cursor:default; }
    .dlg-word {

    .dlg-word.active { background:rgba(196,154,26,0.24); color:#e8c460; }
    .dlg-word.drag-src { opacity:0.4; }
    .dlg-word.done { color:var(--jade); text-shadow:0 0 14px rgba(82,201,142,0.18); }
    .dlg-word.done:hover {
      background:rgba(82,201,142,0.13); color:#6ee8a8;
      text-shadow:0 0 10px rgba(82,201,142,0.4);
      box-shadow:0 1px 0 rgba(82,201,142,0.4);
    }
    .ws-token.drag-src { opacity:0.4; }
    #ws-dlg-input.drag-over { border-color:rgba(196,154,26,0.55); background:rgba(196,154,26,0.05); }
    #ws-dialogue.convo-mode #ws-dlg-input-row { display:none; }
    #ws-dialogue.convo-mode #ws-dlg-avatar { display:none; }
    #ws-dialogue.convo-mode #ws-dlg-copy-all { display:none; }
    .dlg-convo-speaker { font-family:'DM Mono',monospace; font-size:11px; color:#666; letter-spacing:0.04em; margin-bottom:2px; }
    .dlg-convo-en { font-family:'DM Mono',monospace; font-size:11px; color:#444; font-style:italic; margin-top:3px; display:none; }

    .dlg-convo-row { display:flex; gap:8px; align-items:flex-start; }
    .dlg-convo-portrait { image-rendering:pixelated; flex-shrink:0; border-radius:3px; width:32px; height:64px; }

    .dlg-turn-convo-right .dlg-convo-row { flex-direction:row-reverse; }
    .dlg-turn-convo-right .dlg-turn-npc { background:rgba(196,154,26,0.06); box-shadow:inset 0 0 0 1px rgba(196,154,26,0.14); }
    .dlg-turn-convo-right .dlg-npc-jp { justify-content:flex-end; }
    .dlg-turn-convo-right .dlg-convo-en { text-align:right; }

    /* ── Vocab button & panel ────────────────────────────────────────────────── */
    #vocab-btn {
      position:fixed; bottom:240px; left:18px; z-index:25;
      background:rgba(12,8,4,0.94); border:1px solid rgba(196,154,26,0.32); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:12px; padding:7px 16px;
      border-radius:20px; cursor:pointer; display:none; letter-spacing:0.08em;
      box-shadow:0 4px 18px rgba(0,0,0,0.4);
      transition:background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    #vocab-btn:hover { background:rgba(12,8,4,0.94); border-color:var(--gold); box-shadow:0 4px 20px rgba(196,154,26,0.4); }
    #vocab-panel {
      position:fixed; top:16px; left:12px; bottom:16px; width:320px; z-index:30;
      background:rgba(8,5,2,0.97); border:1px solid var(--border-md);
      border-radius:14px;
      display:none; flex-direction:column; overflow:hidden;
      box-shadow:0 8px 48px rgba(0,0,0,0.6);
      transition: bottom 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    #vocab-panel[data-anchor="right"] { left:auto; right:12px; }
    #vocab-panel[data-anchor="top"]   { left:12px; right:12px; bottom:auto; height:220px; width:auto; }
    body:has(#ws-panel.open) #vocab-panel:not([data-anchor="top"]) { bottom: 206px; }
    #vocab-panel.open { display:flex; }
    #vocab-panel.dragging { opacity:0.85; }
    #vocab-header { cursor:grab; user-select:none; }
    #vocab-header button { cursor:pointer; }
    #vocab-panel.dragging #vocab-header { cursor:grabbing; }
    #vocab-panel[data-anchor="top"] #vocab-content { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:2px 24px; align-content:start; }
    #vocab-panel[data-anchor="top"] .vocab-sign-header { grid-column:1/-1; }
    #vocab-snap-preview {
      position:fixed; pointer-events:none; z-index:29;
      border:2px dashed rgba(196,154,26,0.4); border-radius:14px;
      background:rgba(196,154,26,0.04); opacity:0; transition:opacity 0.12s;
    }
    #vocab-snap-preview[data-zone="left"]  { top:16px; left:12px; bottom:16px; width:320px; opacity:1; }
    #vocab-snap-preview[data-zone="right"] { top:16px; right:12px; bottom:16px; width:320px; opacity:1; }
    #vocab-snap-preview[data-zone="top"]   { top:12px; left:12px; right:12px; height:220px; opacity:1; }
    body:has(#ws-panel.open) #vocab-snap-preview:is([data-zone="left"],[data-zone="right"]) { bottom:206px; }
    #vocab-inner { flex:1; min-height:0; overflow-y:auto; padding:8px 16px 16px; }
    #vocab-header { display:flex; align-items:center; justify-content:space-between; padding:16px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; }
    #vocab-header h2 { font-family:'Noto Serif JP',serif; font-size:18px; color:var(--gold); font-weight:400; letter-spacing:0.1em; }
    #vocab-close {
      background:rgba(255,255,255,0.04); border:1px solid var(--border-md); color:var(--cream-dim);
      font-family:'DM Mono',monospace; font-size:12px; padding:5px 14px; border-radius:20px; cursor:pointer;
      transition:border-color 0.15s, color 0.15s, background 0.15s;
    }
    #vocab-close:hover { border-color:var(--gold); color:var(--gold); background:var(--gold-faint); }
    #vocab-search-wrap { padding:10px 16px 0; flex-shrink:0; }
    #vocab-search {
      width:100%; box-sizing:border-box;
      background:rgba(255,255,255,0.04); border:1px solid var(--border-md); border-radius:8px;
      color:var(--cream); font-family:'DM Mono',monospace; font-size:12px; padding:7px 12px;
      outline:none; transition:border-color 0.15s;
    }
    #vocab-search:focus { border-color:rgba(196,154,26,0.6); }
    #vocab-search.drag-over { border-color:rgba(196,154,26,0.55); background:rgba(196,154,26,0.05); }
    #vocab-search::placeholder { color:#444; }
    #vocab-add-status { font-family:'DM Mono',monospace; font-size:11px; min-height:14px; margin-top:4px; padding:0 2px; transition:opacity 0.4s; }
    .vocab-sign-header { font-family:'Noto Serif JP',serif; font-size:13px; color:#8a6838; margin:16px 0 6px; letter-spacing:0.05em; }
    .vocab-section:first-child .vocab-sign-header { margin-top:0; }
    .vocab-cho-divider { font-family:'Noto Serif JP',serif; font-size:15px; color:var(--gold); padding:10px 4px 2px; margin-top:4px; border-bottom:1px solid rgba(196,154,26,0.2); letter-spacing:0.08em; user-select:none; }
    .vocab-cho-divider:first-child { padding-top:0; margin-top:0; }
    .vocab-row-misplaced .vocab-jp { color:#c0392b; }
    .vocab-row-misplaced { border-left:2px solid rgba(192,57,43,0.5); padding-left:6px; }
    #vocab-panel.drop-active { outline:2px dashed rgba(196,154,26,0.55); outline-offset:-3px; }
    #vocab-drop-hint {
      margin:32px 16px; padding:28px 16px;
      border:1px dashed rgba(196,154,26,0.22); border-radius:10px;
      color:#444; font-family:'DM Mono',monospace; font-size:12px;
      text-align:center; line-height:1.7; pointer-events:none;
    }
    #vocab-panel.drop-active #vocab-drop-hint { border-color:rgba(196,154,26,0.55); color:#8a6838; }
    #vocab-clear-btn, #vocab-sort-btn {
      background:none; border:none; color:#444; font-family:'DM Mono',monospace;
      font-size:11px; padding:4px 8px; cursor:pointer; border-radius:4px;
      transition:color 0.15s;
    }
    #vocab-clear-btn:hover { color:#c0392b; }
    #vocab-sort-btn { display:none; }
    #vocab-sort-btn:hover { color:var(--gold); }
    .vocab-row {
      display:grid; grid-template-columns:16px 60px 1fr 1fr 20px; gap:8px; align-items:baseline;
      padding:7px 8px; border-radius:7px; margin-bottom:1px; transition:background 0.1s;
    }
    .vocab-row:hover { background:rgba(196,154,26,0.06); }
    .vocab-row.drag-over-above { border-top:2px solid rgba(196,154,26,0.6); }
    .vocab-row.drag-over-below { border-bottom:2px solid rgba(196,154,26,0.6); }
    .vocab-drag-handle {
      font-size:12px; color:#333; cursor:grab; user-select:none; opacity:0;
      transition:opacity 0.1s; align-self:center; line-height:1;
    }
    .vocab-row:hover .vocab-drag-handle { opacity:1; }
    .vocab-jp      { font-family:'Noto Serif JP',serif; font-size:18px; color:var(--cream); cursor:grab; }
    .vocab-reading { font-family:'DM Mono',monospace; font-size:12px; color:var(--gold); }
    .vocab-meaning { font-family:'DM Mono',monospace; font-size:12px; color:var(--jade); }
    .vocab-remove-btn {
      background:none; border:none; color:#333; font-size:14px; padding:0;
      cursor:pointer; opacity:0; transition:opacity 0.1s, color 0.1s; line-height:1;
    }
    .vocab-row:hover .vocab-remove-btn { opacity:1; }
    .vocab-remove-btn:hover { color:#c0392b; }
    #vocab-empty { font-size:12px; color:#444; text-align:center; margin-top:40px; }

    /* ── Conversation panel ──────────────────────────────────────────────────── */
    #convo-panel {
      position:fixed; bottom:210px; left:50%; transform:translateX(-50%);
      width:520px; max-height:340px; z-index:40;
      background:rgba(8,5,2,0.97); border:1px solid rgba(196,154,26,0.32);
      border-radius:14px; display:none; flex-direction:column; overflow:hidden;
      box-shadow:0 8px 48px rgba(0,0,0,0.65);
    }
    #convo-panel.open { display:flex; }
    body:has(#ws-panel.open) #convo-panel { bottom:206px; }
    #convo-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px 10px; border-bottom:1px solid rgba(196,154,26,0.14); flex-shrink:0;
    }
    #convo-title { font-family:'Noto Serif JP',serif; font-size:15px; color:var(--gold); letter-spacing:0.06em; }
    #convo-close {
      background:rgba(255,255,255,0.04); border:1px solid rgba(196,154,26,0.2);
      color:var(--cream-dim); font-family:'DM Mono',monospace; font-size:12px;
      padding:4px 12px; border-radius:20px; cursor:pointer; transition:border-color 0.15s, color 0.15s;
    }
    #convo-close:hover { border-color:var(--gold); color:var(--gold); }
    #convo-body { flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:12px; }
    .convo-turn { display:flex; flex-direction:column; gap:4px; }
    .convo-turn-right { align-items:flex-end; }
    .convo-speaker { font-family:'DM Mono',monospace; font-size:11px; color:#666; letter-spacing:0.04em; }
    .convo-row { display:flex; gap:8px; align-items:flex-start; }
    .convo-turn-right .convo-row { flex-direction:row-reverse; }
    .convo-portrait {
      image-rendering:pixelated; flex-shrink:0;
      border-radius:4px; background:rgba(255,255,255,0.03);
      width:32px; height:64px;
    }
    .convo-bubble {
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
      border-radius:10px; padding:8px 12px; max-width:86%;
      font-family:'Noto Serif JP',serif; font-size:16px; line-height:1.65; color:var(--cream);
    }
    .convo-turn-right .convo-bubble {
      background:rgba(196,154,26,0.08); border-color:rgba(196,154,26,0.2);
    }
    .convo-en {
      font-family:'DM Mono',monospace; font-size:11px; color:#444;
      max-width:86%; font-style:italic;
    }
    .convo-turn-right .convo-en { text-align:right; }

    /* ── Map panel ───────────────────────────────────────────────────────────── */
    #map-btn {
      position:fixed; bottom:280px; left:18px; z-index:25; display:none;
      background:rgba(12,8,4,0.94); border:1px solid rgba(196,154,26,0.32); color:var(--gold);
      font-family:'DM Mono',monospace; font-size:12px; padding:7px 16px;
      border-radius:20px; cursor:pointer; letter-spacing:0.08em;
      box-shadow:0 4px 18px rgba(0,0,0,0.4);
      transition:background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }
    #map-btn:hover { border-color:var(--gold); box-shadow:0 4px 20px rgba(196,154,26,0.4); }
    #map-panel {
      position:fixed; top:16px; left:12px; bottom:16px; width:300px; z-index:30;
      background:rgba(8,5,2,0.97); border:1px solid var(--border-md);
      border-radius:14px; display:none; flex-direction:column; overflow:hidden;
      box-shadow:0 8px 48px rgba(0,0,0,0.6);
      transition:bottom 0.3s cubic-bezier(0.16,1,0.3,1);
    }
    #map-panel[data-anchor="right"] { left:auto; right:12px; }
    body:has(#ws-panel.open) #map-panel { bottom:206px; }
    #map-panel.open { display:flex; }
    #map-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 16px 12px; border-bottom:1px solid var(--border); flex-shrink:0; cursor:grab; user-select:none;
    }
    #map-header button { cursor:pointer; }
    #map-header h2 { font-family:'Noto Serif JP',serif; font-size:18px; color:var(--gold); font-weight:400; letter-spacing:0.1em; }
    #map-close {
      background:rgba(255,255,255,0.04); border:1px solid var(--border-md); color:var(--cream-dim);
      font-family:'DM Mono',monospace; font-size:12px; padding:5px 14px; border-radius:20px; cursor:pointer;
      transition:border-color 0.15s, color 0.15s;
    }
    #map-close:hover { border-color:var(--gold); color:var(--gold); }
    #map-inner { flex:1; overflow-y:auto; padding:8px 16px 16px; }
    .map-room-row {
      padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; flex-direction:column; gap:6px;
      cursor:pointer; border-radius:6px; transition:background 0.12s;
    }
    .map-room-row:hover { background:rgba(196,154,26,0.07); }
    .map-room-row:last-child { border-bottom:none; }
    .map-room-header { display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
    .map-room-name { font-family:'Noto Serif JP',serif; font-size:15px; color:var(--cream-dim); }
    .map-room-name.current { color:var(--gold); font-size:16px; }
    .map-room-sub { font-family:'DM Mono',monospace; font-size:11px; color:#555; }
    .map-room-pct { font-family:'DM Mono',monospace; font-size:12px; color:#666; white-space:nowrap; }
    .map-room-bar { height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
    .map-room-fill { height:100%; border-radius:3px; background:#2d6a4f; transition:width 0.4s ease; }
    .map-room-fill.done { background:var(--gold); }


    /* ── Korean virtual keyboard ────────────────────────────────────────────── */
    #ko-kbd { display:none; flex-direction:column; gap:4px; padding:8px 10px 10px; border-top:1px solid var(--border); background:rgba(6,4,2,0.55); flex-shrink:0; }
    #ko-kbd.visible { display:flex; }
    .ko-row { display:flex; gap:3px; justify-content:center; }
    .ko-key {
      height:34px; flex:1; min-width:0; max-width:38px; padding:0;
      background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.13);
      color:var(--cream); font-family:'Noto Serif JP',serif; font-size:15px; line-height:1;
      border-radius:5px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.08s, border-color 0.08s;
    }
    .ko-key:active { background:rgba(196,154,26,0.32); border-color:rgba(196,154,26,0.55); }
    #ko-shift, #ko-bs { max-width:50px; font-size:13px; color:var(--gold-dim); }
    #ko-shift.active { background:rgba(196,154,26,0.22); border-color:rgba(196,154,26,0.5); color:var(--gold); }
    #ko-space { max-width:none; flex:8; font-family:'DM Mono',monospace; font-size:11px; color:var(--gold-dim); letter-spacing:0.1em; }

    /* ── Speech bubble (librarian alert) ──────────────────────────────────── */
    #speech-bubble {
      position:fixed; z-index:19;
      background:rgba(250,248,240,0.97); border:1.5px solid #5c3317;
      border-radius:8px; padding:10px 36px 12px 12px;
      min-width:160px; max-width:240px;
      font-family:'Noto Serif JP',serif; font-size:13px; color:#1a1209;
      line-height:1.6; cursor:grab;
      box-shadow:0 2px 14px rgba(0,0,0,0.25);
      opacity:0; pointer-events:none;
      transition:opacity 0.15s ease;
      user-select:none;
    }
    #speech-bubble.visible { opacity:1; pointer-events:auto; }
    #speech-bubble.sb-dragging { cursor:grabbing; }
    #speech-bubble::after {
      content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
      border-left:7px solid transparent; border-right:7px solid transparent;
      border-top:8px solid #5c3317; pointer-events:none;
    }
    #speech-bubble-close {
      position:absolute; top:5px; right:5px;
      width:22px; height:22px; padding:0;
      background:rgba(92,51,23,0.10); border:1px solid rgba(92,51,23,0.28);
      border-radius:4px; cursor:pointer; color:#5c3317;
      font-size:13px; line-height:1;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.12s, border-color 0.12s;
    }
    #speech-bubble-close:hover { background:rgba(92,51,23,0.22); border-color:#5c3317; }
    #speech-bubble-text .sb-word { cursor:pointer; border-radius:2px; }
    #speech-bubble-text .sb-word:hover { background:rgba(192,57,43,0.12); text-decoration:underline; }

    /* ── Object description popup ──────────────────────────────────────────── */
    #obj-popup {
      position:fixed; z-index:22; text-align:center;
      background:rgba(8,5,2,0.97); border:1px solid var(--border-md);
      border-radius:10px; padding:12px 18px 14px;
      box-shadow:0 4px 28px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.25);
      min-width:130px;
      pointer-events:none; opacity:0;
      transition:opacity 0.16s ease, transform 0.16s ease;
      transform:translateY(6px) scale(0.95);
    }
    #obj-popup.visible { opacity:1; pointer-events:auto; transform:translateY(0) scale(1); }
    #obj-popup-word { display:none; }
    #obj-popup-en {
      display:flex; flex-wrap:wrap; gap:4px; justify-content:center;
    }
    .obj-word {
      font-family:'DM Mono',monospace;
      font-size:12px; color:rgba(82,201,142,0.9);
      cursor:grab; padding:3px 11px; border-radius:14px;
      border:1px solid rgba(82,201,142,0.28);
      transition:background 0.12s, border-color 0.12s;
    }

<script>
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
      const ra=Array.isArray(r)?r:[r,r,r,r];
      const[tl,tr,br,bl]=ra.length===4?ra:[ra[0],ra[0],ra[0],ra[0]];
      this.moveTo(x+tl,y); this.lineTo(x+w-tr,y);
      this.quadraticCurveTo(x+w,y,x+w,y+tr); this.lineTo(x+w,y+h-br);
      this.quadraticCurveTo(x+w,y+h,x+w-br,y+h); this.lineTo(x+bl,y+h);
      this.quadraticCurveTo(x,y+h,x,y+h-bl); this.lineTo(x,y+tl);
      this.quadraticCurveTo(x,y,x+tl,y); this.closePath(); return this;
    };
  }

  const WORD_PROGRESS = (() => {
    const KEY_PREFIX = "library-slice-progress-v1";
    function _key() { return KEY_PREFIX + '-' + LANG.current; }
    let _data = {};
    try { _data = JSON.parse(localStorage.getItem(_key()) || "{}"); } catch {}
    function _flush() { try { localStorage.setItem(_key(), JSON.stringify(_data)); } catch {} }
    return {
      getSign(id) { return _data[id] || {}; },
      getAll()    { return _data; },
      unlock(id, idx, key) {
        _data[id] = _data[id] || {}; _data[id][idx] = _data[id][idx] || {};
        _data[id][idx][key] = true; _flush();
      },
      unlock_part(id, tok_idx, part_idx, key) {
        const k = `${tok_idx}p${part_idx}`;
        _data[id] = _data[id] || {}; _data[id][k] = _data[id][k] || {};
        _data[id][k][key] = true; _flush();
      },
      reload() {
        try { _data = JSON.parse(localStorage.getItem(_key()) || "{}"); } catch { _data = {}; }
      }
    };
  })();

  const NPC_LINE_PROGRESS = (() => {
    const KEY = 'library-slice-npc-lines-v1';
    let _data = {};
    try { _data = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch {}
    function _flush() { try { localStorage.setItem(KEY, JSON.stringify(_data)); } catch {} }
    return {
      has(line_id) { return !!(line_id && line_id in _data); },
      get(line_id) { return line_id ? (_data[line_id] || {}) : {}; },
      save(line_id, results) { if (!line_id) return; _data[line_id] = {}; Object.keys(results).forEach(k => { _data[line_id][k] = {...results[k]}; }); _flush(); }
    };
  })();

  const NPC_VOCAB = (() => {
    const KEY = 'library-slice-npc-vocab-v1';
    const _norm = s => s ? s.split(/\s*[/,]\s*/)[0].trim() : s;
    let _entries = [];
    try { _entries = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch {}
    _entries.forEach(e => { if (e.meaning) e.meaning = _norm(e.meaning); });
    function _flush() { try { localStorage.setItem(KEY, JSON.stringify(_entries)); } catch {} }
    return {
      getAll() { return _entries; },
      add(token, key) {
        let e = _entries.find(x => x.text === token.text);
        const isNew = !e;
        if (!e) { e = {text:token.text, reading:'', meaning:'', romaji:false, meaning_unlocked:false}; _entries.push(e); }
        if (token.romaji && !e.reading) e.reading = token.romaji;
        if (token.meaning && !e.meaning) e.meaning = _norm(token.meaning);
        if (key === 'romaji') e.romaji = true;
        if (key === 'meaning' && e.meaning) e.meaning_unlocked = true;
        _flush();
        if (isNew) SoundFX.vocab();
      }
    };
  })();

  const canvas = document.getElementById("game");

  const SoundFX = (() => {
    let _ctx = null;
    function _ac() {
      if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
      return _ctx;
    }
    function _tone(freq, dur, vol, delay, type) {
      try {
        const ac = _ac();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = type || 'sine';
        osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
        gain.gain.setValueAtTime(vol, ac.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + delay + dur);
        osc.start(ac.currentTime + delay);
        osc.stop(ac.currentTime + delay + dur + 0.01);
      } catch(e) {}
    }
    return {
      ding()  { _tone(880, 0.18, 0.2, 0); },
      chime() {
        [[523, 0], [659, 0.1], [784, 0.2], [1047, 0.32]].forEach(([f, d]) => _tone(f, 0.4, 0.18, d));
      },
      vocab() {
        [[660, 0], [990, 0.12]].forEach(([f, d]) => _tone(f, 0.25, 0.15, d));
      }
    };
  })();

  const SpeechBubble = (() => {
    const el       = document.getElementById('speech-bubble');
    const text_el  = document.getElementById('speech-bubble-text');
    const close_el = document.getElementById('speech-bubble-close');

    let _visible = false;
    let _dragging = false;
    let _drag_ox = 0, _drag_oy = 0;
    let _anchor_x = 0, _anchor_y = 0;
    let _user_dx = 0, _user_dy = 0; // persistent offset applied by user drag
    let _alert_key = null;
    let _cur_text = null;

    function _render_words(text, meta) {
      text_el.innerHTML = '';
      const words = text.split(/\s+/);
      words.forEach((word, wi) => {
        if (wi > 0) text_el.appendChild(document.createTextNode(' '));
        const span = document.createElement('span');
        span.className = 'sb-word';
        span.textContent = word;
        span.addEventListener('click', e => {
          e.stopPropagation();
          if (_dragging) return;
          const npc = typeof NPC_DEFS !== 'undefined' ? NPC_DEFS[meta?.npc_id] : null;
          const ko = typeof LANG !== 'undefined' && LANG.current === 'ko';
          const npc_label = ko ? (npc?.name_ko || '') : (npc?.name_en || '');
          if (typeof WorkspacePanel !== 'undefined')
            WorkspacePanel.open_npc_sentence(text, words, wi, npc_label, null, meta?.text_en || '');
        });
        text_el.appendChild(span);
      });
    }

    function _reposition() {
      const bw = el.offsetWidth, bh = el.offsetHeight;
      const HUD_H = 60, WS_H = 200;
      const nat_x = _anchor_x + _user_dx - bw / 2;
      const nat_y = _anchor_y + _user_dy - bh - 14;
      const x = Math.min(Math.max(nat_x, 8), window.innerWidth  - bw - 8);
      const y = Math.min(Math.max(nat_y, HUD_H), window.innerHeight - bh - WS_H);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
    }

    // Called every frame by render2d when alert is active.
    // alert may have { key } (looks up DIALOGUE) or { text } (raw string).
    // meta (optional): { npc_id, text_en } — used for word-click context.
    function update(alert, screen_x, screen_y, meta) {
      let text, text_en;
      if (alert.text) {
        text = alert.text;
        text_en = meta?.text_en || '';
      } else {
        const dl = DIALOGUE[alert.key];
        if (!dl) return;
        text = LANG.current === 'ko' && dl.korean ? dl.korean : dl.japanese;
        text_en = dl.english || '';
      }
      const cache_key = alert.key || alert.text;
      if (text !== _cur_text) {
        _cur_text = text;
        _render_words(text, meta ? { ...meta, text_en } : { text_en });
      }
      if (cache_key !== _alert_key) {
        _alert_key = cache_key;
        _user_dx = 0; _user_dy = 0;
      }
      _anchor_x = screen_x;
      _anchor_y = screen_y;
      if (!_visible) { _visible = true; el.classList.add('visible'); }
      if (!_dragging) _reposition();
    }

    function hide() {
      if (!_visible) return;
      _visible = false; _dragging = false; _alert_key = null; _cur_text = null;
      el.classList.remove('visible', 'sb-dragging');
    }

    // Dragging
    el.addEventListener('pointerdown', e => {
      if (e.target === close_el) return;
      e.preventDefault();
      _dragging = true;
      el.setPointerCapture(e.pointerId);
      _drag_ox = e.clientX - el.offsetLeft;
      _drag_oy = e.clientY - el.offsetTop;
      el.classList.add('sb-dragging');
    });

    el.addEventListener('pointermove', e => {
      if (!_dragging) return;
      const bw = el.offsetWidth, bh = el.offsetHeight;
      const HUD_H = 60, WS_H = 200;
      const nx = e.clientX - _drag_ox;
      const ny = e.clientY - _drag_oy;
      const x = Math.min(Math.max(nx, 8), window.innerWidth  - bw - 8);
      const y = Math.min(Math.max(ny, HUD_H), window.innerHeight - bh - WS_H);
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      // Track user offset so reposition() respects where user dragged it
      _user_dx = (x + bw / 2) - _anchor_x;
      _user_dy = (y + bh + 14) - _anchor_y;
    });

    el.addEventListener('pointerup', () => {
      _dragging = false;
      el.classList.remove('sb-dragging');
    });

    close_el.addEventListener('click', () => {
      if (typeof sim !== 'undefined') {
        sim.state.librarian.alert = null;
        sim.state.convo_bubble = null;
      }
      hide();
    });

    return { update, hide };
  })();

  const ObjectDescPopup = (() => {
    const popup  = document.getElementById('obj-popup');
    const wordEl = document.getElementById('obj-popup-word');
    const enEl   = document.getElementById('obj-popup-en');
    const descEl = document.getElementById('obj-popup-desc');
    let _timer   = null;

    function show(target_word, en_word, sx, sy, desc) {
      if (_timer) { clearTimeout(_timer); _timer = null; }
      wordEl.textContent = target_word;
      enEl.innerHTML = '';
      (en_word || '').split(/\s+/).filter(Boolean).forEach(w => {
        const span = document.createElement('span');
        span.className = 'obj-word';
        span.textContent = w;
        span.draggable = true;
        span.addEventListener('dragstart', e => {
          span.classList.add('drag-src');
          e.dataTransfer.setData('obj-label', w);
          e.dataTransfer.effectAllowed = 'copy';
        });
        span.addEventListener('dragend', () => span.classList.remove('drag-src'));
        enEl.appendChild(span);
      });
      descEl.textContent = desc || '';
      descEl.style.display = desc ? '' : 'none';
      popup.style.left = '-9999px'; popup.style.top = '-9999px';
      popup.classList.add('visible');
      const pw = popup.offsetWidth, ph = popup.offsetHeight;
      const x = Math.min(Math.max(sx - pw / 2, 8), window.innerWidth  - pw - 8);
      const y = Math.max(sy - ph - 20, 60);
      popup.style.left = x + 'px';
      popup.style.top  = y + 'px';
      _timer = setTimeout(hide, 5000);
    }

    function hide() {
      popup.classList.remove('visible');
      if (_timer) { clearTimeout(_timer); _timer = null; }
    }

    function show_for(id, sx, sy) {
      const npc = NPC_DEFS[id];
      if (npc) {
        const word = LANG.current === 'ko' && npc.name_ko ? npc.name_ko : npc.name_jp;
        show(word, npc.name_en, sx, sy, npc.desc_en);
        return;
      }
      const def = ENTITY_DEFS[id];
      if (def) {
        const word = LANG.current === 'ko' && def.label_ko ? def.label_ko : def.label;
        show(word, def.label_en, sx, sy, def.desc_en);
        return;
      }
      const tile = TILE_DEFS[id];
      if (tile) {
        const word = LANG.current === 'ko' && tile.label_ko ? tile.label_ko : tile.label;
        show(word, tile.label_en, sx, sy, tile.desc_en);
      }
    }

    return { show, show_for, hide };
  })();

  function _fmt_read(furi, rom) {
    const f=furi||'', r=rom||'';
    return (f && r && f!==r) ? `${f}  [${r}]` : (f||r);
  }

  let _KO_FALLBACK; // populated by WorkspacePanel, shared with VocabPanel

  const WorkspacePanel = (() => {
    const panel_el  = document.getElementById("ws-panel");
    const ws_el     = document.getElementById("workspace");
    const empty_el  = document.getElementById("ws-empty");
    const chips_row = document.getElementById("ws-chips-row");
    // Drag-to-scroll the chips row (pointer drag on desktop; touch scrolls natively via overflow-x)
    let _cr_sx=0, _cr_sl=0, _cr_down=false, _cr_moved=false;
    chips_row.addEventListener('pointerdown', e => {
      if (e.target===inp || e.button) return;
      if (e.target.closest('.ws-token')) return; // let HTML5 drag handle token dragging
      _cr_down=true; _cr_moved=false; _cr_sx=e.clientX; _cr_sl=chips_row.scrollLeft;
      chips_row.classList.add('dragging');
    });
    document.addEventListener('pointermove', e => {
      if (!_cr_down) return;
      const dx=e.clientX-_cr_sx;
      if (Math.abs(dx)>4) _cr_moved=true;
      chips_row.scrollLeft=_cr_sl-dx;
    });
    const _cr_up=()=>{ _cr_down=false; chips_row.classList.remove('dragging'); };
    document.addEventListener('pointerup',     _cr_up);
    document.addEventListener('pointercancel', _cr_up);
    // Swallow click if we moved, so dragging doesn't accidentally select a word
    chips_row.addEventListener('click', e=>{ if (_cr_moved){ e.stopPropagation(); _cr_moved=false; } }, true);

    // ── Drag-to-slot: drop obj-label (English meaning) onto a meaning slot ──
    chips_row.addEventListener('dragover', e => {
      if (!e.dataTransfer.types.includes('obj-label')) return;
      const slot = e.target?.closest?.('.ws-token-meaning.slot-empty, .ws-part-meaning.slot-empty');
      if (!slot) {
        chips_row.querySelectorAll('.slot-drop-over').forEach(s => s.classList.remove('slot-drop-over'));
        return;
      }
      e.preventDefault();
      chips_row.querySelectorAll('.slot-drop-over').forEach(s => { if (s !== slot) s.classList.remove('slot-drop-over'); });
      slot.classList.add('slot-drop-over');

    const OLLAMA_URL = "/ollama/api/chat", OLLAMA_MODEL = "llama3.1:8b";

    async function _llama_judge_meaning(token, player_input, on_status) {
      const ctl = new AbortController();
      const tid = setTimeout(() => ctl.abort(), 60000);
      let elapsed = 0;
      const pulse = setInterval(() => { elapsed++; on_status?.(`asking LLM… ${elapsed}s`); }, 1000);
      try {
        const lang = LANG.current === 'ko' ? 'Korean' : 'Japanese';
        on_status?.('asking LLM…');
        const res = await fetch(OLLAMA_URL, { method:"POST", headers:{"Content-Type":"application/json"},
          signal: ctl.signal,
          body: JSON.stringify({ model:OLLAMA_MODEL, messages:[{role:"user", content:
            `${lang} word: ${token.text}\nAccepted meanings: ${token.meaning}\nStudent answer: ${player_input}\nIs the student's answer close enough in meaning to be marked correct? Reply yes or no only.`
          }], stream:false, keep_alive:-1, options:{temperature:0, num_predict:5} }) });
        clearTimeout(tid); clearInterval(pulse);
        if (!res.ok) { on_status?.(`LLM error: HTTP ${res.status}`); return false; }
        const reply = (await res.json()).message?.content?.trim() || '';
        const ok = reply.toLowerCase().startsWith("yes");
        on_status?.(`LLM: ${ok ? '✓ correct' : '✗ wrong'}`);
        return ok;
      } catch(e) {
        clearTimeout(tid); clearInterval(pulse);
        on_status?.(e.name === 'AbortError' ? 'LLM timed out' : `LLM error: ${e.message}`);
        return false;
      }
    }

    function _normRomaji(s) { return s.toLowerCase().replace(/[-\s]+/g,"").replace(/ou/g,"o").replace(/uu/g,"u").replace(/aa/g,"a"); }
    function _isNumericToken(token) { return /^\d+$/.test(token.text); }
    function _checkWhat(word, raw, res) {
      const val=raw.trim().toLowerCase(), val_ns=val.replace(/\s+/g,"");
      if (!val) return null;
      if (!res.romaji) {
        if (word.romaji && _normRomaji(val_ns)===_normRomaji(word.romaji)) return "romaji";
        if (val_ns===(word.furigana||"").toLowerCase()) return "romaji";
      }
      if (!res.meaning) {
        const norm=s=>s.replace(/[?!.,]+$/,"");
        const depolite=s=>s.replace(/^(please|to|is)\s+/,'');
        const parts=word.meaning.replace(/\(.*?\)/g,"").toLowerCase().split(/\s*[/,]\s*/).map(p=>depolite(norm(p.trim()))).filter(Boolean);
        const v=depolite(norm(val)), v_ns=depolite(norm(val_ns));
        if (parts.some(p=>v===p||v_ns===p.replace(/\s+/g,""))) return "meaning";
        // Accept base adjective/adverb form of -ly adverbs:
        //   quietly→quiet  slowly→slow  strictly→strict  comfortably→comfortable
        if (parts.some(p => {
          if (p.length < 6 || !p.endsWith('ly')) return false;
          const base = p.endsWith('ably') ? p.slice(0,-4)+'able'
                     : p.endsWith('ibly') ? p.slice(0,-4)+'ible'
                     : p.slice(0,-2);
          return base.length >= 4 && base !== 'friend' && (v===base || v_ns===base);
        })) return "meaning";
        // Accept base verb of -ing gerunds; split on " and " within a part first.
        if (parts.some(p=>p.split(' and ').some(piece=>{
          if (piece.endsWith('ing')) {
            const base=piece.slice(0,-3);
            if (base.length>=3&&(v===base||v_ns===base)) return true;
            const baseE=base+'e';
            return base.length>=2&&baseE!=='please'&&(v===baseE||v_ns===baseE);
          }
          // Compound gerund: "bringing in" → accept "bring in"
          const words=piece.split(' ');
          if (words.length>=2&&words[0].endsWith('ing')) {
            const gerund=words[0], rest=words.slice(1).join(' ');
            const base=gerund.slice(0,-3);
            if (base.length>=3&&(v===base+' '+rest||v_ns===(base+rest))) return true;
            const baseE=base+'e';
            if (base.length>=2&&(v===baseE+' '+rest||v_ns===(baseE+rest))) return true;
          }
          return false;
        }))) return "meaning";
        // Accept head noun of "X particle" / "X marker": "topic particle" → "topic"
        if (parts.some(p => {
          const m = p.match(/^(.+)\s+(particle|marker)$/);
          return m && (v === m[1] || v_ns === m[1].replace(/\s+/g,''));
        })) return "meaning";
        // Accept singular↔plural: strip trailing -s (not -ss, min 4 chars)
        {const depl=s=>s.endsWith('s')&&!s.endsWith('ss')&&s.length>3?s.slice(0,-1):s;
        if (parts.some(p=>depl(v)===depl(p)||depl(v_ns)===depl(p.replace(/\s+/g,'')))) return "meaning";}
        // Accept base form of -es verb conjugations: does→do, goes→go, watches→watch
        if (parts.some(p=>{
          if (!p.endsWith('es')||p.length<=3) return false;
          const base=p.slice(0,-2);
          return base.length>=2&&(v===base||v_ns===base);
        })) return "meaning";
        // Accept base verb of -ment nominalizations: replenishment→replenish, movement→move.
        if (parts.some(p=>{
          if (!p.endsWith('ment')) return false;
          const base=p.slice(0,-4);
          return base.length>=4&&(v===base||v_ns===base);
        })) return "meaning";
        // Accept base verb of -ed past participles (depolite already strips "is "):
        //   allowed→allow  prohibited→prohibit  closed→close  related→relate  permitted→permit
        if (parts.some(p=>{
          if (p.endsWith('ed')) {
            const base=p.slice(0,-2);
            if (base.length>=3&&(v===base||v_ns===base)) return true;
            if (base.length>=2&&base[base.length-1]===base[base.length-2]) {
              const base2=base.slice(0,-1);
              if (base2.length>=3&&(v===base2||v_ns===base2)) return true;
            }
          }
          if (p.endsWith('d')) {
            const base=p.slice(0,-1);
            if (base.endsWith('e')&&base.length>=4&&(v===base||v_ns===base)) return true;
          }
          return false;
        })) return "meaning";
      }
      return null;
    }

    function _render_chips() {
      // Rescue inp from being removed along with old chips
      panel_el.appendChild(inp); inp.style.display='none';
      [...chips_row.querySelectorAll(".ws-merged-chip")].forEach(c=>c.remove());
      const merged=document.createElement("div"); merged.className="ws-merged-chip";
      const sign=SIGN_BY_ID[cur_sign_id]; if (!sign) return;
      const tokens=sign.tokens||[];
      const full=(sign.japanese||tokens.map(t=>t.text).join('')).replace(/\n/g,' ');
      let pos=0, tok_idx=0;

      // Helper: place inp in a slot (reading or meaning)
      function _placeInp(slotEl) {
        slotEl.appendChild(inp);
        inp.style.display='';
      }

      while (pos<=full.length && tok_idx<tokens.length) {
        const token=tokens[tok_idx];
        const found=full.indexOf(token.text, pos);
        if (found===-1) { tok_idx++; continue; }
        if (found>pos) {
          const p=document.createElement("span"); p.className="ws-particle";
          p.textContent=full.slice(pos,found); merged.appendChild(p);
        }
        const span=document.createElement("span"); span.className="ws-token";
        const res=word_results[tok_idx]||{};
        const hasParts=token.parts&&token.parts.length>0;
        const isDone=hasParts
          ? token.parts.every((_,pi)=>{ const r=word_results[`${tok_idx}p${pi}`]||{}; return r.romaji&&r.meaning; })
          : (res.romaji&&res.meaning);
        if (isDone) span.classList.add("done");
        span.dataset.tokSpan=tok_idx;
        if (hasParts) span.dataset.hasParts='1';
        const _i=tok_idx;

        if (!hasParts) {
          if (tok_idx===cur_word_idx&&cur_part_idx==null) span.classList.add("selected");

          // — reading slot (above kanji) —
          const rspan=document.createElement("span"); rspan.className="ws-token-reading";
          rspan.dataset.tokIdx=tok_idx; rspan.dataset.field='romaji';
          if (res.romaji&&(token.romaji||token.furigana)) {
            rspan.textContent=token.romaji||token.furigana;
          } else if (tok_idx===cur_word_idx&&cur_part_idx==null&&_active_field==='romaji') {
            rspan.classList.add("slot-active"); _placeInp(rspan);
          } else if (!res.romaji) {
            rspan.classList.add("slot-empty");
            const rClick=e=>{ e.stopPropagation(); _select(_i,null,'romaji'); };
            rspan.addEventListener("click",rClick); rspan._slotClick=rClick;
          }
          span.appendChild(rspan);

          // — kanji text —
          const textNode=document.createElement("span"); textNode.textContent=token.text;
          span.appendChild(textNode);

          // — meaning slot (below kanji) —
          const mspan=document.createElement("span"); mspan.className="ws-token-meaning";
          mspan.dataset.tokIdx=tok_idx; mspan.dataset.field='meaning';
          if (res.meaning) {
            if (token.meaning) { const raw=Array.isArray(token.meaning)?token.meaning[0]:token.meaning; mspan.textContent=raw.split("/")[0].trim(); }
            mspan.classList.add("slot-done");
          } else if (tok_idx===cur_word_idx&&cur_part_idx==null&&_active_field==='meaning') {
            mspan.classList.add("slot-active"); _placeInp(mspan);
          } else {
            mspan.classList.add("slot-empty");
            const mClick=e=>{ e.stopPropagation(); _select(_i,null,'meaning'); };
            mspan.addEventListener("click",mClick); mspan._slotClick=mClick;
          }
          span.appendChild(mspan);

        } else {
          const allPRomaji=token.parts.every((_,pi)=>(word_results[`${tok_idx}p${pi}`]||{}).romaji);
          const allPMeaning=token.parts.every((_,pi)=>(word_results[`${tok_idx}p${pi}`]||{}).meaning);

          // — whole-word reading slot (above parts row) —
          const wrspan=document.createElement("span"); wrspan.className="ws-token-reading";
          wrspan.dataset.tokIdx=tok_idx; wrspan.dataset.field='romaji'; wrspan.dataset.whole='1';
          if (allPRomaji&&(token.romaji||token.furigana)) {
            wrspan.textContent=token.romaji||token.furigana;
          } else if (tok_idx===cur_word_idx&&cur_part_idx===-1&&_active_field==='romaji') {
            wrspan.classList.add("slot-active"); _placeInp(wrspan);
          } else if (!allPRomaji) {
            wrspan.classList.add("slot-empty");
            const wrClick=e=>{ e.stopPropagation(); _select(_i,-1,'romaji'); };
            wrspan.addEventListener("click",wrClick); wrspan._slotClick=wrClick;
          }
          span.appendChild(wrspan);

          // — parts token: each part gets its own reading + meaning slots —
          const partsRow=document.createElement("span"); partsRow.className="ws-token-parts";
          token.parts.forEach((part,pi)=>{
            const pres=word_results[`${tok_idx}p${pi}`]||{};
            const pspan=document.createElement("span"); pspan.className="ws-part";
            if (pres.romaji&&pres.meaning) pspan.classList.add("done");
            if (tok_idx===cur_word_idx&&pi===cur_part_idx) pspan.classList.add("selected");
            pspan.dataset.tokSpan=tok_idx; pspan.dataset.partSpan=pi;
            const _pi=pi;

            // part reading slot
            const prspan=document.createElement("span"); prspan.className="ws-part-reading";
            prspan.dataset.tokIdx=tok_idx; prspan.dataset.partIdx=pi; prspan.dataset.field='romaji';
            if (pres.romaji&&(part.romaji||part.furigana)) {
              prspan.textContent=part.romaji||part.furigana||'';
            } else if (tok_idx===cur_word_idx&&pi===cur_part_idx&&_active_field==='romaji') {
              prspan.classList.add("slot-active"); _placeInp(prspan);
            } else if (!pres.romaji) {
              prspan.classList.add("slot-empty");
              const prClick=e=>{ e.stopPropagation(); _select(_i,_pi,'romaji'); };
              prspan.addEventListener("click",prClick); prspan._slotClick=prClick;
            }
            pspan.appendChild(prspan);

            // part kanji text
            const ptspan=document.createElement("span"); ptspan.textContent=part.text;
            pspan.appendChild(ptspan);

            // part meaning slot
            const pmspan=document.createElement("span"); pmspan.className="ws-part-meaning";
            pmspan.dataset.tokIdx=tok_idx; pmspan.dataset.partIdx=pi; pmspan.dataset.field='meaning';
            if (pres.meaning) {
              if (part.meaning) { const raw=Array.isArray(part.meaning)?part.meaning[0]:part.meaning; pmspan.textContent=raw.split("/")[0].trim(); }
              pmspan.classList.add("slot-done");
            } else if (tok_idx===cur_word_idx&&pi===cur_part_idx&&_active_field==='meaning') {
              pmspan.classList.add("slot-active"); _placeInp(pmspan);
            } else {
              pmspan.classList.add("slot-empty");
              const pmClick=e=>{ e.stopPropagation(); _select(_i,_pi,'meaning'); };
              pmspan.addEventListener("click",pmClick); pmspan._slotClick=pmClick;
            }
            pspan.appendChild(pmspan);

            pspan.addEventListener("click",e=>{ e.stopPropagation(); _select(_i,_pi); });
            partsRow.appendChild(pspan);
          });
          span.appendChild(partsRow);

          // — whole-word meaning slot (below parts row) —
          const wmspan=document.createElement("span"); wmspan.className="ws-token-meaning";
          wmspan.dataset.tokIdx=tok_idx; wmspan.dataset.field='meaning'; wmspan.dataset.whole='1';
          if (allPMeaning) {
            if (token.meaning) { const raw=Array.isArray(token.meaning)?token.meaning[0]:token.meaning; wmspan.textContent=raw.split("/")[0].trim(); }
            wmspan.classList.add("slot-done");
          } else if (tok_idx===cur_word_idx&&cur_part_idx===-1&&_active_field==='meaning') {
            wmspan.classList.add("slot-active"); _placeInp(wmspan);
          } else {
            wmspan.classList.add("slot-empty");
            const wmClick=e=>{ e.stopPropagation(); _select(_i,-1,'meaning'); };
            wmspan.addEventListener("click",wmClick); wmspan._slotClick=wmClick;
          }
          span.appendChild(wmspan);
        }

        // copy badge
        const copyBtn=document.createElement("span"); copyBtn.className="ws-token-copy-btn"; copyBtn.textContent="⎘";
        copyBtn.title="copy"; copyBtn.addEventListener("click",e=>{
          e.stopPropagation(); _copy_text(token.text, copyBtn);
        });
        span.appendChild(copyBtn);
        // navigation button (wayfinding tokens only)
        if (token.points_to) {
          const dest=ROOM_DEFS[token.points_to];
          const navBtn=document.createElement("button"); navBtn.className="ws-nav-btn";
          navBtn.textContent="→ "+(dest?dest.name_en:token.points_to);
          navBtn.addEventListener("click",e=>{ e.stopPropagation(); clear(); sim.navigate_to_room(token.points_to); });
          span.appendChild(navBtn);
        }
        span.draggable=true;
        span.addEventListener("dragstart",e=>{ if(_inp_pd){e.preventDefault();return;} span.classList.add("drag-src"); e.dataTransfer.setData("dlg-word",token.text); e.dataTransfer.effectAllowed="copy"; });
        span.addEventListener("dragend",()=>span.classList.remove("drag-src"));
        span.addEventListener("click",()=>{
          if (hasParts) {
            // find first undone part + field
            let fi=-1, ff='romaji';
            for (let pi=0;pi<token.parts.length;pi++) {
              const r=word_results[`${_i}p${pi}`]||{};
              if (!r.romaji){fi=pi;ff='romaji';break;}
              if (!r.meaning){fi=pi;ff='meaning';break;}
            }
            _select(_i, fi>=0?fi:0, ff);
          } else {
            const r=word_results[_i]||{};
            _select(_i, null, !r.romaji?'romaji':'meaning');
          }
        });
        merged.appendChild(span);
        pos=found+token.text.length; tok_idx++;
      }
      if (pos<full.length) {
        const p=document.createElement("span"); p.className="ws-particle";
        p.textContent=full.slice(pos); merged.appendChild(p);
      }
      chips_row.appendChild(merged);
    }

    function _activate_slot_inplace(idx, part_idx, field) {
      const merged=chips_row.querySelector('.ws-merged-chip');
      if (!merged) return false;
      const isWholeSlot=part_idx===-1;
      const isPartSlot=part_idx!=null&&part_idx>=0;
      const newSlot=isWholeSlot
        ? merged.querySelector(`[data-tok-idx="${idx}"][data-whole="1"][data-field="${field}"]`)
        : isPartSlot
          ? merged.querySelector(`[data-tok-idx="${idx}"][data-part-idx="${part_idx}"][data-field="${field}"]`)
          : merged.querySelector(`[data-tok-idx="${idx}"][data-field="${field}"]:not([data-part-idx]):not([data-whole])`);
      if (!newSlot||newSlot.classList.contains('slot-done')) return false;
      const oldSlot=merged.querySelector('.slot-active');
      // Activate new slot (moves inp away from old slot automatically)
      if (!newSlot.classList.contains('slot-active')) {
        inp.style.opacity='0';
        newSlot.classList.remove('slot-empty');
        newSlot.appendChild(inp);
        inp.style.display='';
        // Force reflow so browser records the pre-active height, enabling the min-height transition
        void newSlot.getBoundingClientRect();
        newSlot.classList.add('slot-active');
        requestAnimationFrame(()=>{ inp.style.opacity=''; });
      }
      // Deactivate old slot
      if (oldSlot&&oldSlot!==newSlot) {
        oldSlot.classList.remove('slot-active');
        oldSlot.classList.add('slot-empty');
        if (oldSlot._slotClick) oldSlot.addEventListener('click',oldSlot._slotClick);
      }
      // Update selected state
      merged.querySelectorAll('.selected').forEach(el=>el.classList.remove('selected'));
      if (isWholeSlot) {
        const tokSpan=merged.querySelector(`.ws-token[data-tok-span="${idx}"]`);
        if (tokSpan) tokSpan.classList.add('selected');
      } else if (part_idx==null) {
        const tokSpan=merged.querySelector(`.ws-token[data-tok-span="${idx}"]:not([data-has-parts])`);
        if (tokSpan) tokSpan.classList.add('selected');
      } else {
        const partSpan=merged.querySelector(`.ws-part[data-tok-span="${idx}"][data-part-span="${part_idx}"]`);
        if (partSpan) partSpan.classList.add('selected');
      }
      return true;
    }

    // Compound verb endings listed longest-first so the greedy match works correctly
    const _KO_PARTICLES = [

      '에서부터','에서도','에서만','에서는',
      '에서','에게','으로','까지도','까지만','까지','부터','이라','라고','이나','으나','이고','이면','예요',

      '를','을','가','이','는','은','에','로','와','과','도','만','의',
    ];
    const _KO_NO_SPLIT = new Set([
      '안녕하세요','안녕하십시오','감사합니다','감사해요','죄송합니다','죄송해요',
      '괜찮아요','괜찮습니다','실례합니다','어서오세요','잘부탁합니다',
    ]);
    function _ko_base_raw(w) {
      for (const p of _KO_PARTICLES) {
        if (w.length > p.length && w.endsWith(p)) return w.slice(0, -p.length);
      }
      return null;
    }
    function _ko_base(w) {
      if (_KO_NO_SPLIT.has(w)) return null;
      return _ko_base_raw(w);
    }
    function _ko_split_words(words, defs) {
      const out_words = [], out_defs = [];
      words.forEach((w, i) => {
        const clean = w.replace(/[.!?,;:…]+$/, '');
        const punct = w.slice(clean.length);
        if (_KO_NO_SPLIT.has(clean)) {
          // Treat as atomic — no subpart breakdown for common set phrases
          out_words.push(w);
          out_defs.push(defs ? (defs[i] || {text:w, reading:'', meaning:''}) : {text:w, reading:'', meaning:''});
        } else {
          const base = _ko_base_raw(clean);
          if (base) {
            const suffix = clean.slice(base.length) + punct;
            const suffix_clean = suffix.replace(/[.!?,;:…]+$/, '');
            out_words.push(base, suffix);
            out_defs.push(
              {text: base,   reading: romanizeKo(base),         meaning: ''},
              {text: suffix, reading: romanizeKo(suffix_clean), meaning: ''}
            );
          } else {
            out_words.push(w);
            const _fb = _KO_FALLBACK?.[clean];
            const _def = defs ? (defs[i] || {text:w, reading:romanizeKo(clean), meaning:''}) : {text:w, reading:romanizeKo(clean), meaning:''};
            if (_fb?.parts) _def.parts = _fb.parts;
            out_defs.push(_def);

      for (const id of Object.keys(SIGN_BY_ID)) {
        const sign = SIGN_BY_ID[id]; if (!sign.tokens) continue;
        for (const tok of sign.tokens) {
          if (tok.text === text && (tok.romaji||tok.furigana) && tok.meaning)

    function _first_meaning(s) { return s ? s.split(/\s*[,\/]\s*|\s+or\s+/)[0] : s; }

    async function _npc_lookup(word, on_status) {
      const clean=word.replace(/^[.!?,\s]+|[.!?,\s]+$/g,'');
      if (LANG.current==='ko'&&_KO_FALLBACK[clean]) { const def={reading:romanizeKo(clean),meaning:_KO_FALLBACK[clean].meaning}; _npc_defs[clean]=def; return def; }
      if (_npc_defs[clean]?.reading) return _npc_defs[clean];
      if (LANG.current==='ko') {
        const base=_ko_base(clean);
        if (base&&_KO_FALLBACK[base])  { const d={reading:romanizeKo(clean),meaning:_KO_FALLBACK[base].meaning}; _npc_defs[clean]=d; return d; }
        const sd=_sign_lookup(clean);  if (sd) { const d={reading:romanizeKo(clean),meaning:sd.meaning}; _npc_defs[clean]=d; return d; }
        if (base) { const sb=_sign_lookup(base); if (sb) { const d={reading:romanizeKo(clean),meaning:sb.meaning}; _npc_defs[clean]=d; return d; } }
      } else {
        const sd=_sign_lookup(clean);  if (sd) { _npc_defs[clean]=sd; return sd; }
      }
      const lang_name = LANG.current==='ko'?'Korean':'Japanese';
      let elapsed=0;
      const pulse=on_status?setInterval(()=>{ elapsed++; on_status(`looking up… ${elapsed}s`); },1000):null;
      on_status?.('looking up…');
      try {
        const ctl=new AbortController(); const tid=setTimeout(()=>ctl.abort(),15000);
        const res=await fetch(OLLAMA_URL,{method:'POST',headers:{'Content-Type':'application/json'},signal:ctl.signal,
          body:JSON.stringify({model:OLLAMA_MODEL,keep_alive:-1,messages:[{role:'user',content:
            `${lang_name} word: "${clean}"\nReply ONLY with JSON: {"reading":"romanization","meaning":"core English word or short phrase (3 words max)"}`
          }],stream:false,options:{temperature:0,num_predict:40}})});
        clearTimeout(tid); if(pulse)clearInterval(pulse);
        if (!res.ok) throw new Error();
        const raw=(await res.json()).message?.content?.trim()||'';
        let p=null; try{p=JSON.parse(raw);}catch{}
        if (!p){const m=raw.match(/\{[\s\S]*\}/);if(m)try{p=JSON.parse(m[0]);}catch{}}
        const reading=LANG.current==='ko' ? romanizeKo(clean) : (p?.reading||p?.romanization||p?.pronunciation||'').toLowerCase();
        const meaning=_first_meaning(p?.meaning||p?.translation||p?.english||'');
        if (reading||meaning){const def={reading,meaning};_npc_defs[clean]=def;return def;}
      } catch { if(pulse)clearInterval(pulse); }
      return null;
    }

    function _populate_voices() {
      const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ko'));
      voice_pick.innerHTML = '';
      const googleIdx = voices.findIndex(v => v.name.toLowerCase().includes('google'));
      voices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = v.name;
        if (i === (googleIdx >= 0 ? googleIdx : 0)) opt.selected = true;
        voice_pick.appendChild(opt);
      });
    }
    _populate_voices();
    speechSynthesis.addEventListener('voiceschanged', _populate_voices);

    const _NATIVE_HOUR_KO = [null,'한','두','세','네','다섯','여섯','일곱','여덟','아홉','열','열한','열두','열세','열네','열다섯','열여섯','열일곱','열여덟','열아홉','스무','스물한','스물두','스물세','스물네'];
    function _speak(text) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();
      if (LANG.current === 'ko') text = text.replace(/(\d+)시/g, (_,n) => { const h=_NATIVE_HOUR_KO[+n]; return (h||n)+'시'; });
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9;
      if (LANG.current === 'ko') {
        u.lang = 'ko-KR';
        const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('ko'));
        const chosen = voices[parseInt(voice_pick.value)];
        if (chosen) u.voice = chosen;
      } else {
        u.lang = 'ja-JP';
      }
      speechSynthesis.speak(u);
    }
